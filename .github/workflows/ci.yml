name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets

  version-sync:
    name: Version Sync Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all package versions match
        run: |
          RUST=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          PYTHON=$(grep -m1 '^version' sdks/python/pyproject.toml | sed 's/.*"\(.*\)"/\1/')
          NODE=$(node -p "require('./sdks/typescript/package.json').version")
          echo "Rust:       $RUST"
          echo "Python:     $PYTHON"
          echo "TypeScript: $NODE"
          if [ "$RUST" != "$PYTHON" ] || [ "$RUST" != "$NODE" ]; then
            echo "::error::Version mismatch! All packages must have the same version."
            exit 1
          fi
          echo "All versions in sync: $RUST"

  sdk-sync:
    name: SDK Sync Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: taiki-e/install-action@v2
        with:
          # extractions/setup-just@v2 has been failing release-lookup even for
          # exact pinned versions (`no release for just matching version
          # specifier 1.50.0`). taiki-e/install-action downloads prebuilt
          # binaries from a curated index — fast and reliable.
          tool: just
      - run: pip install datamodel-code-generator
      - run: cd sdks/typescript && npm install
      - name: Generate schema, SDK models, and docs
        run: just venv="$(python3 -c 'import sys; print(sys.prefix)')" schema python-models node-models docs
      - name: Check generated files are in sync
        run: git diff --exit-code schema/ sdks/python/python/openpx/_models.py sdks/typescript/types/models.d.ts docs/reference/
      # Smoke checks: a regen can produce a syntactically degenerate file
      # (e.g. an empty stub) that drifts undetectably under git diff alone.
      # PR #26 hid for an indeterminate amount of time because models.d.ts
      # was a 13-line stub that never changed regardless of schema edits.
      # These two checks make the drift impossible to hide.
      #
      # --skipLibCheck: only validate models.d.ts itself, not transitive
      # third-party type defs in node_modules (json-schema-to-typescript
      # pulls in @types/lodash which needs es2015+ lib settings we don't
      # care about for this smoke check).
      - name: Smoke-check generated Python models parse
        run: python -m py_compile sdks/python/python/openpx/_models.py
      - name: Smoke-check generated TS models type-check
        run: cd sdks/typescript && npx tsc --noEmit --skipLibCheck types/models.d.ts

  python-sdk-build:
    name: Python SDK Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      # maturin develop refuses to run outside a venv. Create one at the
      # justfile's default location (.venv at repo root) so the recipe
      # picks it up without needing the venv= override.
      - name: Set up .venv with maturin + datamodel-code-generator
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install datamodel-code-generator maturin pydantic
      - name: Build Python SDK against current Rust core
        run: just python-build
      - name: Smoke-import the built package
        run: |
          ../../.venv/bin/python -c "import openpx; assert 'Exchange' in dir(openpx) and 'WebSocket' in dir(openpx), f'unexpected exports: {sorted(a for a in dir(openpx) if not a.startswith(chr(95)))}'; print('ok')"
        working-directory: sdks/python

  node-sdk-build:
    name: Node.js SDK Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: pip install datamodel-code-generator
      - run: cd sdks/typescript && npm install
      - name: Build Node SDK against current Rust core
        run: just venv="$(python3 -c 'import sys; print(sys.prefix)')" node-build
      # node-build runs `npm run build` which invokes `napi build --release`.
      # The smoke import below confirms the native binary loads.
      - name: Smoke-import the built package
        run: cd sdks/typescript && node -e "const o = require('./index.js'); const keys = Object.keys(o).sort(); console.log(keys); if (keys.length === 0) { console.error('no exports'); process.exit(1); }"

  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run benchmarks (detect panics / compilation regressions)
        run: cargo bench -p px-core --bench orderbook --bench normalizers --bench price_utils -- --warm-up-time 1 --measurement-time 2

  manifest-coverage:
    name: Manifest Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify every JSON key read in exchange.rs is declared in the manifest or allowlist
        run: cargo test -p px-core --test manifest_coverage

  # ci-success aggregator removed — it was a needless wrapper. Each underlying
  # job (fmt, clippy, test, check, version-sync, sdk-sync, bench, manifest-coverage)
  # is required independently by branch protection, which is the actual gate.
  # The aggregator's status-check name also drifted from what GitHub Actions
  # reported, leaving branch protection waiting on a context that was never
  # emitted.
