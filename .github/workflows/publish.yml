name: Publish

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

jobs:
  # ---------------------------------------------------------------------------
  # 1. Rust crates → crates.io
  # ---------------------------------------------------------------------------
  publish-crates:
    name: Publish Crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Publish all crates in dependency order, skipping already-published versions
      - name: Publish crates
        run: |
          publish() {
            echo "Publishing $1..."
            if cargo publish -p "$1" 2>&1 | tee /dev/stderr | grep -q "already exists"; then
              echo "$1 already published — skipping"
            fi
          }

          # Tier 1: no internal deps
          publish px-core
          sleep 30

          # Tier 2: depends on px-core
          for crate in px-exchange-kalshi px-exchange-polymarket px-exchange-opinion px-crypto px-sports; do
            publish "$crate"
            sleep 10
          done
          sleep 30

          # Tier 3: depends on everything above
          publish openpx
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  # ---------------------------------------------------------------------------
  # 2. Python wheels (per-platform)
  # ---------------------------------------------------------------------------
  build-python:
    name: Python (${{ matrix.os }} / ${{ matrix.target }})
    needs: publish-crates
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,     target: x86_64 }
          - { os: ubuntu-24.04-arm,  target: aarch64 }
          - { os: macos-14,           target: x86_64 }
          - { os: macos-latest,      target: aarch64 }
          - { os: windows-latest,    target: x86_64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          working-directory: sdks/python
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ matrix.os }}-${{ matrix.target }}
          path: sdks/python/dist/*.whl

  build-python-sdist:
    name: Python sdist
    needs: publish-crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: sdks/python
      - uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: sdks/python/dist/*.tar.gz

  # ---------------------------------------------------------------------------
  # 3. Publish all Python artifacts → PyPI
  # ---------------------------------------------------------------------------
  publish-python:
    name: Publish Python
    needs: [build-python, build-python-sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: python-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_TOKEN }}

  # ---------------------------------------------------------------------------
  # 4. Node.js native addons (per-platform)
  # ---------------------------------------------------------------------------
  build-node:
    name: Node.js (${{ matrix.target }})
    needs: publish-crates
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,     target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-24.04-arm,  target: aarch64-unknown-linux-gnu }
          - { os: macos-14,           target: x86_64-apple-darwin }
          - { os: macos-latest,      target: aarch64-apple-darwin }
          - { os: windows-latest,    target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install dependencies
        working-directory: sdks/typescript
        run: npm install
      - name: Build native addon
        working-directory: sdks/typescript
        run: npx napi build --release --platform --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.target }}
          path: sdks/typescript/*.node

  # ---------------------------------------------------------------------------
  # 5. Publish Node.js → npm (platform packages + main package)
  # ---------------------------------------------------------------------------
  publish-node:
    name: Publish Node.js
    needs: build-node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        working-directory: sdks/typescript
        run: npm install
      - uses: actions/download-artifact@v4
        with:
          pattern: node-*
          path: sdks/typescript/artifacts
          merge-multiple: true
      - name: Move artifacts into platform dirs
        working-directory: sdks/typescript
        run: |
          mkdir -p npm/darwin-x64 npm/darwin-arm64 npm/linux-x64-gnu npm/linux-arm64-gnu npm/win32-x64-msvc
          npx napi artifacts --dir artifacts
      - name: Generate platform packages
        working-directory: sdks/typescript
        run: npx napi prepublish -t npm --skip-gh-release
      - name: Publish platform packages
        working-directory: sdks/typescript
        run: |
          for dir in npm/*/; do
            if [ -d "$dir" ]; then
              echo "Publishing $dir..."
              npm publish "$dir" --access public || true
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish main package
        working-directory: sdks/typescript
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
