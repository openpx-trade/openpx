name: Publish

on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

jobs:
  # ---------------------------------------------------------------------------
  # Gate: only run publish jobs when the workspace version has changed
  # ---------------------------------------------------------------------------
  check-version:
    name: Check Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.local.outputs.version }}
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
      - name: Get local version
        id: local
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Check if already published
        id: check
        run: |
          PUBLISHED=$(cargo search openpx --limit 1 2>/dev/null | head -1 | sed 's/.*= "\([^"]*\)".*/\1/' || echo "0.0.0")
          LOCAL="${{ steps.local.outputs.version }}"
          if [ "$PUBLISHED" = "$LOCAL" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version $LOCAL already published — skipping"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Publishing $LOCAL (crates.io has $PUBLISHED)"
          fi

  # ---------------------------------------------------------------------------
  # Rust crates → crates.io
  # ---------------------------------------------------------------------------
  publish-crates:
    name: Publish Crates
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Tier 1: no internal deps
      - name: Publish px-core
        run: cargo publish -p px-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
      - name: Wait for index
        run: sleep 30

      # Tier 2: depends on px-core
      - name: Publish exchange & utility crates
        run: |
          for crate in px-exchange-kalshi px-exchange-polymarket px-exchange-opinion px-crypto px-sports; do
            echo "Publishing $crate..."
            cargo publish -p "$crate"
            sleep 10
          done
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
      - name: Wait for index
        run: sleep 30

      # Tier 3: depends on everything above
      - name: Publish openpx
        run: cargo publish -p openpx
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  # ---------------------------------------------------------------------------
  # Python wheels (per-platform) → upload as artifacts
  # ---------------------------------------------------------------------------
  build-python:
    name: Python (${{ matrix.os }} / ${{ matrix.target }})
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64 }
          - { os: ubuntu-latest,  target: aarch64 }
          - { os: macos-13,       target: x86_64 }
          - { os: macos-latest,   target: aarch64 }
          - { os: windows-latest, target: x86_64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          working-directory: sdks/python
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ matrix.os }}-${{ matrix.target }}
          path: sdks/python/dist/*.whl

  build-python-sdist:
    name: Python sdist
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: sdks/python
      - uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: sdks/python/dist/*.tar.gz

  # ---------------------------------------------------------------------------
  # Publish all Python artifacts → PyPI
  # ---------------------------------------------------------------------------
  publish-python:
    name: Publish Python
    needs: [build-python, build-python-sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: python-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_TOKEN }}

  # ---------------------------------------------------------------------------
  # Node.js native addons (per-platform) → upload as artifacts
  # ---------------------------------------------------------------------------
  build-node:
    name: Node.js (${{ matrix.target }})
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu }
          - { os: macos-13,       target: x86_64-apple-darwin }
          - { os: macos-latest,   target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Install dependencies
        working-directory: sdks/typescript
        run: npm install
      - name: Build native addon
        working-directory: sdks/typescript
        run: npx napi build --release --platform --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.target }}
          path: sdks/typescript/*.node

  # ---------------------------------------------------------------------------
  # Publish Node.js → npm (platform packages + main package)
  # ---------------------------------------------------------------------------
  publish-node:
    name: Publish Node.js
    needs: build-node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        working-directory: sdks/typescript
        run: npm install
      - uses: actions/download-artifact@v4
        with:
          pattern: node-*
          path: sdks/typescript/artifacts
          merge-multiple: true
      - name: Move artifacts
        working-directory: sdks/typescript
        run: npx napi artifacts --dir artifacts
      - name: Generate platform packages
        working-directory: sdks/typescript
        run: npx napi prepublish -t npm --skip-gh-release
      - name: Publish platform packages
        working-directory: sdks/typescript
        run: |
          for dir in npm/*/; do
            if [ -d "$dir" ]; then
              echo "Publishing $dir..."
              npm publish "$dir" --access public || true
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish main package
        working-directory: sdks/typescript
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
