# Daily entry point for the orchestrator. Fires at 00:00 UTC and on
# workflow_dispatch. The orchestrator diffs the Kalshi + Polymarket changelogs
# against the lock, scans both exchanges' describe() for unimplemented
# scaffolded methods, and dispatches core-architect or a maintainer per
# concern — that is the bot's entire scope.

name: agent-tick

on:
  schedule:
    - cron: "0 0 * * *"   # daily at 00:00 UTC
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode: 'daily' (default — diff vs lock) or 'backfill' (re-process every entry since `since`)"
        required: false
        default: "daily"
        type: choice
        options:
          - daily
          - backfill
      since:
        description: "Backfill cutoff date YYYY-MM-DD (only used when mode=backfill). Inclusive."
        required: false
        default: ""
        type: string

# Only one tick at a time. If a manual dispatch fires while the cron is
# mid-flight (or a previous run hasn't completed), the second waits.
concurrency:
  group: agent-tick-global
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  orchestrate:
    name: Run orchestrator
    runs-on: ubuntu-latest
    # Kill switch: pause-bots label OR OPENPX_AGENTS_DISABLED=1 repo var.
    if: |
      vars.OPENPX_AGENTS_DISABLED != '1'
      && !contains(github.event.repository.labels.*.name, 'pause-bots')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Tooling for the bot's preflight (maintenance/runbooks/pr-preflight.md).
      # The orchestrator dispatches core-architect / maintainers in this same
      # runner; they all need to be able to run `just sync-all`,
      # `just python-build`, `just node-build`, and the smoke imports before
      # opening any PR. Without this setup the bot would silently skip the
      # preflight and ship partial syncs (the failure mode that produced
      # PR #26's TS-skip). Mirror exactly what the python-sdk-build and
      # node-sdk-build CI jobs install.
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: Set up .venv with maturin + datamodel-code-generator
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install datamodel-code-generator maturin pydantic
      - name: Install Node SDK dependencies
        run: cd sdks/typescript && npm install

      - name: Run orchestrator agent
        uses: anthropics/claude-code-action@v1
        with:
          # Bills against the Max subscription via the long-lived OAuth token
          # (generated locally with `claude setup-token`, stored as a repo secret).
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.OPENPX_BOT_TOKEN }}
          prompt: |
            Read `.claude/agents/orchestrator.md` and follow those
            instructions exactly.

            Run mode: `${{ github.event.inputs.mode || 'daily' }}`.
            Backfill since (only meaningful when mode is `backfill`):
            `${{ github.event.inputs.since }}`.

            - `daily` (the default — also used by the cron and by `just maintain`):
              fetch both upstream changelogs, diff against
              `maintenance/scripts/exchange-docs.lock.json`, classify each
              new <Update> entry, and dispatch core-architect or the
              relevant maintainer per the runbook. Then scan both
              exchanges' describe() for unimplemented scaffolded methods
              and dispatch maintainers per `parity-gap-closure.md`.
              Finally append docs/changelog.mdx for any user-facing
              merged PRs since last tick and open one daily PR.
            - `backfill`: instead of diffing against the lock, walk every
              <Update> entry in both changelogs whose label date is
              on/after the `since` value and classify it the same way as
              the daily cycle. Use when the repo has fallen behind and
              the lock's last-seen state predates entries the bot needs
              to catch up on.

            End with the standard handoff message from
            `.claude/agents/HANDOFF.md`.
          # bypassPermissions: skip per-tool prompts (which would block every
          # gh pr create / Edit / Write the orchestrator makes). Real safety
          # net is CODEOWNERS + branch protection + contracts_test +
          # manifest_coverage + the SDK Sync / Build CI gates — not per-tool
          # prompts. Agent prompts forbid destructive ops.
          claude_args: --max-turns 60 --permission-mode bypassPermissions
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
