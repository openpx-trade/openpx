# Daily entry point for the orchestrator. Fires at 00:00 UTC and on
# workflow_dispatch. The orchestrator diffs the Kalshi + Polymarket changelogs
# against the lock and dispatches a maintainer or parity-analyst per actionable
# entry — that is the bot's entire scope.

name: agent-tick

on:
  schedule:
    - cron: "0 0 * * *"   # daily at 00:00 UTC
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode: 'daily' (default — diff vs lock) or 'backfill' (re-process every entry since `since`)"
        required: false
        default: "daily"
        type: choice
        options:
          - daily
          - backfill
      since:
        description: "Backfill cutoff date YYYY-MM-DD (only used when mode=backfill). Inclusive."
        required: false
        default: ""
        type: string

# Only one tick at a time. If a manual dispatch fires while the cron is
# mid-flight (or a previous run hasn't completed), the second waits.
concurrency:
  group: agent-tick-global
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  orchestrate:
    name: Run orchestrator
    runs-on: ubuntu-latest
    # Kill switch: pause-bots label OR OPENPX_AGENTS_DISABLED=1 repo var.
    if: |
      vars.OPENPX_AGENTS_DISABLED != '1'
      && !contains(github.event.repository.labels.*.name, 'pause-bots')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run orchestrator agent
        uses: anthropics/claude-code-action@v1
        with:
          # Bills against the Max subscription via the long-lived OAuth token
          # (generated locally with `claude setup-token`, stored as a repo secret).
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.OPENPX_BOT_TOKEN }}
          prompt: |
            Read `.claude/agents/orchestrator.md` and follow those
            instructions exactly.

            Run mode: `${{ github.event.inputs.mode || 'daily' }}`.
            Backfill since (only meaningful when mode is `backfill`):
            `${{ github.event.inputs.since }}`.

            - `daily` (the default — also used by the cron and by `just maintain`):
              fetch both upstream changelogs, diff against
              `maintenance/scripts/exchange-docs.lock.json`, classify each
              new <Update> entry, and dispatch the relevant maintainer or
              parity-analyst per the runbook.
            - `backfill`: instead of diffing against the lock, walk every
              <Update> entry in both changelogs whose label date is
              on/after the `since` value and classify it the same way the
              daily cycle would. Use when the repo has fallen behind and
              the lock's last-seen state predates entries the bot needs
              to catch up on.

            End with the standard handoff message from
            `.claude/agents/HANDOFF.md`.
          # bypassPermissions: skip per-tool prompts (which would block every
          # gh pr create / Edit / Write the orchestrator makes). Real safety
          # net is CODEOWNERS + branch protection + contracts_test +
          # manifest_coverage + the SDK Sync / Build CI gates — not per-tool
          # prompts. Agent prompts forbid destructive ops.
          claude_args: --max-turns 60 --permission-mode bypassPermissions
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
