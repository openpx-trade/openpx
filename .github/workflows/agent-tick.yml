# Single entry point for the orchestrator. Three triggers branch on event type:
# - schedule / workflow_dispatch -> weekly drift cycle
# - issues.* / issue_comment.created (admin-gated) -> issue triage
# - pull_request.closed merged -> changelog append
#
# The orchestrator's prompt inspects the GitHub event payload to decide which
# of its three roles to play.

name: agent-tick

on:
  schedule:
    - cron: "0 6 * * MON"   # Mon 06:00 UTC weekly tick
  workflow_dispatch:
  issues:
    # Narrow on purpose: GitHub fires `labeled` and `assigned` events for every
    # label/assignee added (including the bot's own), which previously cascaded
    # into 4-6 parallel orchestrator runs per user issue and produced duplicate
    # proposal issues. opened/reopened is the right granularity.
    types: [opened, reopened]
  issue_comment:
    types: [created]
  pull_request:
    types: [closed]

# One orchestrator run per issue / PR / global cycle at a time. Even if events
# do batch (or someone runs `just maintain` while a cron is mid-flight), the
# second run waits for the first to finish before starting.
concurrency:
  group: agent-tick-${{ github.event.issue.number || github.event.pull_request.number || 'global' }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  orchestrate:
    name: Run orchestrator
    runs-on: ubuntu-latest
    # Kill switches and admin-association gate.
    if: |
      vars.OPENPX_AGENTS_DISABLED != '1'
      && !contains(github.event.repository.labels.*.name, 'pause-bots')
      && (
        github.event_name == 'schedule'
        || github.event_name == 'workflow_dispatch'
        || (
          github.event_name == 'pull_request'
          && github.event.action == 'closed'
          && github.event.pull_request.merged == true
        )
        || (
          github.event_name == 'issues'
          && (
            github.event.issue.user.login == 'MilindPathiyal'
            || github.event.issue.assignee.login == 'MilindPathiyal'
            || contains(github.event.issue.labels.*.name, 'triage-ready')
          )
        )
        || (
          github.event_name == 'issue_comment'
          && github.event.comment.user.login == 'MilindPathiyal'
          && contains(github.event.comment.body, '@openpx-bot')
        )
      )

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download latest drift report (best-effort)
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          workflow: docs-drift.yml
          name: drift-report
          path: ./.drift
          if_no_artifact_found: ignore

      - name: Run orchestrator agent
        uses: anthropics/claude-code-action@v1
        with:
          # Bills against the Max subscription via the long-lived OAuth token
          # (generated locally with `claude setup-token`, stored as a repo secret).
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.OPENPX_BOT_TOKEN }}
          # The action expects an explicit prompt to know what to do on
          # workflow_dispatch / schedule / pull_request events (no @-mention
          # to detect). Tell it to load the orchestrator agent definition
          # and follow it.
          prompt: |
            Read `.claude/agents/orchestrator.md` and follow those
            instructions exactly. The triggering GitHub event payload is
            available at `$GITHUB_EVENT_PATH` (event type: `${{ github.event_name }}`,
            action: `${{ github.event.action }}`).

            The drift artifact (if present from the most recent docs-drift
            workflow run) is at `./.drift/drift.json`.

            Branch on the event type per the orchestrator's three roles:
            - `schedule` / `workflow_dispatch` → weekly drift cycle
            - `issues` / `issue_comment` → issue triage (workflow `if:` already
              gated for admin association)
            - `pull_request` (closed + merged) → changelog append

            End with the standard handoff message from `.claude/agents/HANDOFF.md`.
          # bypassPermissions: skip per-tool permission prompts (which would
          # otherwise block every gh pr create / Edit / Write the orchestrator
          # makes). The real safety net is CODEOWNERS + branch protection +
          # contracts_test + manifest_coverage — not per-tool prompts.
          # Agent prompts forbid destructive ops (merge, force-push, --no-verify).
          # --max-turns 60: previous 30-turn budget was tight once we added
          # the pr-ci-watch protocol (each PR-opening agent now spends turns
          # waiting on CI and potentially fixing failures up to 3 times).
          claude_args: --max-turns 60 --permission-mode bypassPermissions
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
