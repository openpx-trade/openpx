# Hourly drift detection against maintenance/scripts/exchange-docs.lock.json.
# This workflow does NOT dispatch agents. It just records drift status as a
# workflow artifact + workflow-history entry. The orchestrator (in agent-tick.yml)
# reads the latest artifact at its weekly tick and decides what to do.

name: docs-drift

on:
  schedule:
    - cron: "15 * * * *"   # every hour at :15
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Run docs-drift check
    runs-on: ubuntu-latest
    # Kill switch: if the repo has the `pause-bots` label OR
    # OPENPX_AGENTS_DISABLED=1 is set as a repo variable, skip everything.
    if: ${{ vars.OPENPX_AGENTS_DISABLED != '1' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run check_docs_drift.py
        id: drift
        run: |
          set +e
          python3 maintenance/scripts/check_docs_drift.py --json > drift.json
          rc=$?
          set -e
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          echo "Drift check exit code: $rc"
          # 0=clean, 1=Tier 1 drift, 2=watch-only drift, 3=network/parse error
          # Always upload the artifact; never fail the workflow on drift.
          exit 0

      - uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: drift.json
          retention-days: 30

      - name: Summary
        run: |
          echo "## Drift exit code: ${{ steps.drift.outputs.exit_code }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "0=clean | 1=Tier 1 drift | 2=watch-only | 3=network error" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat drift.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
