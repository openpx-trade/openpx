name: Bug Report
description: Report a bug in OpenPX
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the issue.
      placeholder: |
        ```rust
        let exchange = Kalshi::new(KalshiConfig::new())?;
        let markets = exchange.fetch_markets(None).await?;
        // Expected: markets list
        // Got: error XYZ
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages if applicable.
    validations:
      required: true

  - type: dropdown
    id: exchange
    attributes:
      label: Exchange
      description: Which exchange is affected?
      options:
        - Kalshi
        - Polymarket
        - Opinion
        - px-core
        - Multiple / Unknown
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: OpenPX Version
      placeholder: "0.1.4"
    validations:
      required: true

  - type: input
    id: rust-version
    attributes:
      label: Rust Version
      description: Output of `rustc --version`
      placeholder: "rustc 1.75.0"

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other relevant information (OS, logs, stack traces).
