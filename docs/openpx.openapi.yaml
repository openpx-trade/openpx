        market_id:
          type: string
        outcome:
          type: string
        price:
          format: double
          type: number
        side:
          $ref: '#/components/schemas/OrderSide'
        size:
          format: double
          type: number
        status:
          $ref: '#/components/schemas/OrderStatus'
        updated_at:
