      properties:
        category:
          description: Topical category (e.g. `"Politics"`); `null` when upstream omits it.
          type:
          - string
          - 'null'
        fee_type:
          description: Fee schedule label (e.g. `"flat"`); `null` when upstream omits it.
          type:
          - string
          - 'null'
        frequency:
          description: Cadence string (e.g. `"weekly"`); `null` when upstream omits it.
          type:
          - string
          - 'null'
        last_updated_ts:
          description: Last upstream update time in UTC.
          format: date-time
          type:
          - string
          - 'null'
        numeric_id:
          description: Polymarket numeric series id (e.g. `"10345"`); `null` on Kalshi.
          type:
          - string
          - 'null'
        settlement_sources:
          default: []
          description: 'Resolution sources used by the exchange (e.g. `[{"name": "BLS", "url": "..."}]`).'
          items:
            $ref: '#/components/schemas/SettlementSource'
          type: array
        tags:
          default: []
          description: Free-form tags (e.g. `["macro", "fed"]`).
          items:
            type: string
          type: array
        ticker:
          description: "Native series identifier \u2014 Kalshi series ticker or Polymarket series ticker/slug (e.g. `\"KXPRES\"\
            `)."
          type: string
        title:
          description: Human-readable series title (e.g. `"US Presidential Election"`).
          type: string
        volume:
          description: Lifetime trading volume in USD across the series (e.g. `123456.78`).
          format: double
          type:
          - number
          - 'null'
      required:
      - ticker
      - title
      type: object
    SessionEvent:
      description: Connection-level events, emitted on a channel separate from `WsUpdate` so a reconnect is observable as
        a single global signal rather than per-market.
      oneOf:
      - description: Initial socket establishment.
        properties:
          kind:
            enum:
            - Connected
            type: string
        required:
        - kind
        type: object
      - description: "Socket re-established after an outage \u2014 `gap_ms` is the wall-clock interval since the last received\
          \ message."
        properties:
          gap_ms:
            format: uint64
            minimum: 0.0
            type: integer
          kind:
            enum:
            - Reconnected
            type: string
        required:
        - gap_ms
        - kind
        type: object
      - description: "Slow consumer dropped messages \u2014 every affected book is invalidated and must be rebuilt from the\
          \ next `Snapshot`."
        properties:
          dropped:
            format: uint64
            minimum: 0.0
            type: integer
          first_seq:
            format: uint64
            minimum: 0.0
            type: integer
          kind:
            enum:
            - Lagged
            type: string
          last_seq:
            format: uint64
            minimum: 0.0
            type: integer
        required:
        - dropped
        - first_seq
        - kind
        - last_seq
        type: object
      - description: "A specific market's book is no longer trustworthy \u2014 drop cache and wait for next `Snapshot` (reasons:\
          \ `Reconnect`, `Lag`, `SequenceGap`, `ExchangeReset`)."
        properties:
          kind:
            enum:
            - BookInvalidated
            type: string
          market_id:
            type: string
          reason:
            $ref: '#/components/schemas/InvalidationReason'
        required:
        - kind
        - market_id
        - reason
        type: object
      - description: A non-fatal error observed on the connection (session continues).
        properties:
          kind:
            enum:
            - Error
            type: string
          message:
            type: string
        required:
        - kind
        - message
        type: object
      title: SessionEvent
    SettlementSource:
      description: Reference used by the exchange to settle a series.
      properties:
        name:
          description: Display name of the source (e.g. `"Bureau of Labor Statistics"`).
          type:
          - string
          - 'null'
        url:
          description: Source URL (e.g. `"https://www.bls.gov/cpi/"`).
          type:
          - string
          - 'null'
      type: object
    SportResult:
      description: Real-time sports score/state from the Polymarket Sports WebSocket. Serializes as snake_case for end-users;
        aliases accept the upstream camelCase.
      properties:
        away_team:
          type: string
        elapsed:
          type:
          - string
          - 'null'
        ended:
          type: boolean
        finished_timestamp:
          format: date-time
          type:
          - string
          - 'null'
        game_id:
          format: uint64
          minimum: 0.0
          type: integer
        home_team:
          type: string
        league_abbreviation:
          type: string
        live:
          type: boolean
        period:
          type:
          - string
          - 'null'
        score:
          type:
          - string
          - 'null'
        slug:
          type: string
        status:
          type: string
        turn:
          type:
          - string
          - 'null'
      required:
      - away_team
      - ended
      - game_id
      - home_team
      - league_abbreviation
      - live
      - slug
      - status
      title: SportResult
      type: object
    TradesRequest:
      description: "Request for `fetch_trades` \u2014 recent public trades (\"tape\") for one market."
      properties:
        asset_id:
          description: "Market identifier \u2014 Kalshi market ticker or Polymarket Gamma slug (e.g. `\"KXBTCD-25APR1517\"\
            `)."
          type: string
        cursor:
          description: Opaque cursor returned by a prior page (e.g. `"eyJvIjoxMDB9"`).
          type:
          - string
          - 'null'
        end_ts:
          description: Inclusive upper bound, unix seconds (e.g. `1714608000`).
          format: int64
          type:
          - integer
          - 'null'
        limit:
          description: Max trades to return; capped at 1000 (Kalshi) / 500 (Polymarket) (e.g. `100`).
          format: uint
          minimum: 0.0
          type:
          - integer
          - 'null'
        start_ts:
          description: Inclusive lower bound, unix seconds (e.g. `1714521600`).
          format: int64
          type:
          - integer
          - 'null'
      required:
      - asset_id
      title: TradesRequest
      type: object
    WsUpdate:
      description: "Every per-market event the WebSocket surface emits. Closed tagged union; no untyped escape hatch in the\
        \ stable enum. If an exchange grows a payload we want to surface in raw form, add a separate `raw_events()` stream\
        \ rather than another `WsUpdate` variant \u2014 keeps consumer `match` exhaustiveness honest."
      oneOf:
      - description: "Full orderbook snapshot \u2014 replace any cached book for `(market_id, asset_id)`."
        properties:
          asset_id:
            type: string
          book:
            $ref: '#/components/schemas/Orderbook'
          exchange_ts:
            format: uint64
            minimum: 0.0
            type:
            - integer
            - 'null'
          kind:
            enum:
            - Snapshot
            type: string
          local_ts_ms:
            format: uint64
            minimum: 0.0
            type: integer
          market_id:
            type: string
          seq:
            format: uint64
            minimum: 0.0
            type: integer
        required:
        - asset_id
        - book
        - kind
        - local_ts_ms
        - market_id
        - seq
        type: object
      - description: "Incremental change to an existing book \u2014 apply in-place."
        properties:
          asset_id:
            type: string
          changes:
            items:
              $ref: '#/components/schemas/PriceLevelChange'
            type: array
          exchange_ts:
            format: uint64
            minimum: 0.0
            type:
            - integer
            - 'null'
          kind:
            enum:
            - Delta
            type: string
          local_ts_ms:
            format: uint64
            minimum: 0.0
            type: integer
          market_id:
            type: string
          seq:
            format: uint64
            minimum: 0.0
            type: integer
        required:
        - asset_id
        - changes
        - kind
        - local_ts_ms
        - market_id
        - seq
        type: object
      - description: "Book invalidation \u2014 drop the cached book and wait for the next `Snapshot`."
        properties:
          asset_id:
            type: string
          kind:
            enum:
            - Clear
            type: string
          local_ts_ms:
            format: uint64
            minimum: 0.0
            type: integer
          market_id:
            type: string
          reason:
            $ref: '#/components/schemas/InvalidationReason'
          seq:
            format: uint64
            minimum: 0.0
            type: integer
        required:
        - asset_id
        - kind
        - local_ts_ms
        - market_id
        - reason
        - seq
        type: object
      - description: A public trade (any counterparty), not tied to a local order.
        properties:
          kind:
            enum:
            - Trade
            type: string
          local_ts_ms:
            format: uint64
            minimum: 0.0
            type: integer
          trade:
            $ref: '#/components/schemas/ActivityTrade'
        required:
        - kind
        - local_ts_ms
        - trade
        type: object
      - description: A fill on one of the authenticated user's orders.
        properties:
          fill:
            $ref: '#/components/schemas/ActivityFill'
          kind:
            enum:
            - Fill
            type: string
          local_ts_ms:
            format: uint64
            minimum: 0.0
            type: integer
        required:
        - fill
        - kind
        - local_ts_ms
        type: object
      title: WsUpdate
    number:
      format: double
      type: number
    OpenPxError:
      type: object
      description: Unified error type returned when an exchange call fails. The `kind` field is the canonical category; `message`
        carries the upstream explanation. Per-exchange variants are mapped into this shape before they cross the trait boundary.
      required:
      - kind
      - message
      properties:
        kind:
          type: string
          enum:
          - Authentication
          - InsufficientFunds
          - MarketNotFound
          - OrderNotFound
          - RateLimited
          - NetworkError
          - Api
          - Config
          - NotSupported
        message:
          type: string
    MarketsPage:
      type: object
      description: One page of `Market` results. `cursor` is `null` on the last page; otherwise pass it back in the next request
        to continue.
      required:
      - markets
      properties:
        markets:
          type: array
          items:
            $ref: '#/components/schemas/Market'
        cursor:
          type:
          - string
          - 'null'
    MarketTradesPage:
      type: object
      description: One page of `MarketTrade` results. `cursor` is `null` on the last page; otherwise pass it back in the next
        request to continue.
      required:
      - trades
      properties:
        trades:
          type: array
          items:
            $ref: '#/components/schemas/MarketTrade'
        cursor:
          type:
          - string
          - 'null'
