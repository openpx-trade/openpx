    Series:
      description: 'A recurring family of events. Examples: a weekly inflation reading, a monthly nonfarm payrolls release,
        a regular sports season. On Kalshi, a Series is identified by `series_ticker` (e.g. `KXPRES`). On Polymarket, a Series
        wraps multiple Events with shared metadata.'
      properties:
        category:
          type:
          - string
          - 'null'
        fee_type:
          type:
          - string
          - 'null'
        frequency:
          type:
          - string
          - 'null'
        id:
          type: string
        last_updated_ts:
          format: date-time
          type:
          - string
          - 'null'
        settlement_sources:
          default: []
          items:
            $ref: '#/components/schemas/SettlementSource'
          type: array
        tags:
          default: []
          items:
            type: string
          type: array
        title:
          type: string
        volume:
          format: double
          type:
          - number
          - 'null'
      required:
      - id
      - title
      title: Series
      type: object
    SeriesRequest:
      description: Request for fetching series.
      properties:
        category:
          description: Filter by category (e.g. `Politics`, `Sports`).
          type:
          - string
          - 'null'
        cursor:
          type:
          - string
          - 'null'
        include_volume:
          description: Include traded volume in the response when the venue supports it.
          type:
          - boolean
          - 'null'
        limit:
          format: uint
          minimum: 0.0
          type:
          - integer
          - 'null'
      title: SeriesRequest
      type: object
    SessionEvent:
      description: Connection-level events, emitted on a channel separate from `WsUpdate` so a reconnect is observable as
        a single global signal rather than per-market.
      oneOf:
      - description: Initial socket establishment.
        properties:
          kind:
            enum:
            - Connected
            type: string
        required:
        - kind
        type: object
      - description: Socket re-established after an observed outage. `gap_ms` is the wall-clock interval between the last
          received message and this event. Callers who maintain per-market books should discard them and wait for the next
          `WsUpdate::Snapshot` for each subscribed market.
        properties:
          gap_ms:
            format: uint64
            minimum: 0.0
            type: integer
          kind:
            enum:
            - Reconnected
            type: string
        required:
        - gap_ms
        - kind
        type: object
      - description: "Outbound dispatch channel overflowed \u2014 a slow consumer missed deltas. Unlike `tokio::sync::broadcast`\
          \ which silently skips ahead, openpx raises this explicitly and invalidates every affected book, because a missed\
          \ delta corrupts book state in a way the caller cannot detect from the stream alone."
        properties:
          dropped:
            format: uint64
            minimum: 0.0
            type: integer
          first_seq:
            format: uint64
            minimum: 0.0
            type: integer
          kind:
            enum:
            - Lagged
            type: string
          last_seq:
            format: uint64
            minimum: 0.0
            type: integer
        required:
        - dropped
        - first_seq
        - kind
        - last_seq
        type: object
      - description: A specific market's book is no longer trustworthy. Caller should discard its cache for that `market_id`
          and wait for the next `WsUpdate::Snapshot`.
        properties:
          kind:
            enum:
            - BookInvalidated
            type: string
          market_id:
            type: string
          reason:
            $ref: '#/components/schemas/InvalidationReason'
        required:
        - kind
        - market_id
        - reason
        type: object
      - description: A non-fatal error observed on the connection. The session continues; the caller is informed in case they
          want to log or alert.
        properties:
          kind:
            enum:
            - Error
            type: string
          message:
            type: string
        required:
        - kind
        - message
        type: object
      title: SessionEvent
    SettlementSource:
      properties:
        name:
          type:
          - string
          - 'null'
        url:
          type:
          - string
          - 'null'
      title: SettlementSource
      type: object
    Spread:
      description: "Top-of-book bid/ask + spread for a market outcome. Lighter than a full `Orderbook` \u2014 useful for liquidity\
        \ scoring and PnL marks where only the best levels are needed."
      properties:
        ask:
          format: double
          type: number
        bid:
          format: double
          type: number
        spread:
          format: double
          type: number
        ts_ms:
          format: int64
          type:
          - integer
          - 'null'
      required:
      - ask
      - bid
      - spread
      title: Spread
      type: object
    Tag:
      description: A category or tag attached to a market or event. Used for filtering and search. Kalshi exposes tags via
        category-keyed lookups; Polymarket exposes per-market and per-event tag arrays.
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type:
          - string
          - 'null'
      required:
      - id
      - name
      title: Tag
      type: object
    TradesRequest:
      description: Request for fetching recent public trades ("tape") for a market outcome.
      properties:
        cursor:
          description: Opaque pagination cursor from a previous response.
          type:
          - string
          - 'null'
        end_ts:
          description: Unix seconds (inclusive)
          format: int64
          type:
          - integer
          - 'null'
        limit:
          description: Max number of trades to return (exchange-specific caps may apply).
          format: uint
          minimum: 0.0
          type:
          - integer
          - 'null'
        market_id:
          description: Exchange-native market identifier.
          type: string
        market_ref:
          description: Optional alternate market identifier for trade endpoints (e.g., Polymarket conditionId). When provided,
            exchanges should prefer this over `market_id`.
          type:
          - string
          - 'null'
        outcome:
          type:
          - string
          - 'null'
        start_ts:
          description: Unix seconds (inclusive)
          format: int64
          type:
          - integer
          - 'null'
        token_id:
          type:
          - string
          - 'null'
      required:
      - market_id
      title: TradesRequest
      type: object
    UserTrade:
      description: 'A user-facing trade row: distinct from `Fill` because it carries auxiliary fields some venues expose (realized
        PnL, on-chain tx hash, owner wallet) but others do not. Polymarket Data `/trades` returns these natively; Kalshi `/portfolio/fills`
        returns a subset, with `realized_pnl` and `tx_hash` left as `None`.'
      properties:
        asset_id:
          type:
          - string
          - 'null'
        condition_id:
          type:
          - string
          - 'null'
        fee:
          format: double
          type:
          - number
          - 'null'
        id:
          type: string
        market_id:
          type: string
        owner:
          type:
          - string
          - 'null'
        price:
          format: double
          type: number
        realized_pnl:
          format: double
          type:
          - number
          - 'null'
        role:
          anyOf:
          - $ref: '#/components/schemas/LiquidityRole'
          - type: 'null'
        side:
          $ref: '#/components/schemas/OrderSide'
        size:
          format: double
          type: number
        ts_ms:
          format: int64
          type: integer
        tx_hash:
          type:
          - string
          - 'null'
      required:
      - id
      - market_id
      - price
      - side
      - size
      - ts_ms
      title: UserTrade
      type: object
    UserTradesRequest:
      description: Request for `fetch_user_trades`.
      properties:
        cursor:
          type:
          - string
          - 'null'
        end_ts:
          description: Unix seconds (inclusive)
          format: int64
          type:
          - integer
          - 'null'
        limit:
          format: uint
          minimum: 0.0
          type:
          - integer
          - 'null'
        market_id:
          type:
          - string
          - 'null'
        side:
          anyOf:
          - $ref: '#/components/schemas/OrderSide'
          - type: 'null'
        start_ts:
          description: Unix seconds (inclusive)
          format: int64
          type:
          - integer
          - 'null'
        user_address:
          description: '`None` = caller''s own trades (auth required on both venues). `Some(addr)` = public lookup for `addr`
            (Polymarket only; Kalshi returns `NotSupported`).'
          type:
          - string
          - 'null'
      title: UserTradesRequest
      type: object
    WsUpdate:
      description: "Every per-market event the WebSocket surface emits. Closed tagged union; no untyped escape hatch in the\
        \ stable enum. If an exchange grows a payload we want to surface in raw form, add a separate `raw_events()` stream\
        \ rather than another `WsUpdate` variant \u2014 keeps consumer `match` exhaustiveness honest."
      oneOf:
      - description: Full orderbook snapshot. Caller should replace any cached book keyed by `(market_id, asset_id)`. `market_id`
          is the parent market on every exchange; `asset_id` is the per-outcome identifier (Polymarket token, Kalshi ticker).
          Emitted on initial subscribe and after any `BookInvalidated` / `Clear` recovery path.
        properties:
          asset_id:
            type: string
          book:
            $ref: '#/components/schemas/Orderbook'
          exchange_ts:
            format: uint64
            minimum: 0.0
            type:
            - integer
            - 'null'
          kind:
            enum:
            - Snapshot
            type: string
          local_ts_ms:
            format: uint64
            minimum: 0.0
            type: integer
          market_id:
            type: string
          seq:
            format: uint64
            minimum: 0.0
            type: integer
        required:
        - asset_id
        - book
        - kind
        - local_ts_ms
        - market_id
        - seq
        type: object
      - description: Incremental change to an existing book. Apply in-place, or discard if the caller has seen a matching
          `Clear` / `BookInvalidated` without a follow-up `Snapshot` yet.
        properties:
          asset_id:
            type: string
          changes:
            items:
              $ref: '#/components/schemas/PriceLevelChange'
            type: array
          exchange_ts:
            format: uint64
            minimum: 0.0
            type:
            - integer
            - 'null'
          kind:
            enum:
            - Delta
            type: string
          local_ts_ms:
            format: uint64
            minimum: 0.0
            type: integer
          market_id:
            type: string
          seq:
            format: uint64
            minimum: 0.0
            type: integer
        required:
        - asset_id
        - changes
        - kind
        - local_ts_ms
        - market_id
        - seq
        type: object
      - description: "Book invalidation on the same stream as `Snapshot` / `Delta`, so a consumer can say \"seq N was Clear,\
          \ drop anything with seq \u2264 N, wait for the next Snapshot\" without merging with the session stream. Mirrors\
          \ `SessionEvent::BookInvalidated`, which stays as the connection-level signal for global observability."
        properties:
          asset_id:
            type: string
          kind:
            enum:
            - Clear
            type: string
          local_ts_ms:
            format: uint64
            minimum: 0.0
            type: integer
          market_id:
            type: string
          reason:
            $ref: '#/components/schemas/InvalidationReason'
          seq:
            format: uint64
            minimum: 0.0
            type: integer
        required:
        - asset_id
        - kind
        - local_ts_ms
        - market_id
        - reason
        - seq
        type: object
      - description: A public trade (any counterparty). Not tied to a local order.
        properties:
          kind:
            enum:
            - Trade
            type: string
          local_ts_ms:
            format: uint64
            minimum: 0.0
            type: integer
          trade:
            $ref: '#/components/schemas/ActivityTrade'
        required:
        - kind
        - local_ts_ms
        - trade
        type: object
      - description: A fill on one of the authenticated user's orders.
        properties:
          fill:
            $ref: '#/components/schemas/ActivityFill'
          kind:
            enum:
            - Fill
            type: string
          local_ts_ms:
            format: uint64
            minimum: 0.0
            type: integer
        required:
        - fill
        - kind
        - local_ts_ms
        type: object
      title: WsUpdate
    number:
      format: double
      type: number
    OpenPxError:
      type: object
      description: Unified error type returned when an exchange call fails. The `kind` field is the canonical category; `message`
        carries the upstream explanation. Per-exchange variants are mapped into this shape before they cross the trait boundary.
      required:
      - kind
      - message
      properties:
        kind:
          type: string
          enum:
          - Authentication
          - InsufficientFunds
          - MarketNotFound
          - OrderNotFound
          - RateLimited
          - NetworkError
          - Api
          - Config
          - NotSupported
        message:
          type: string
    MarketsPage:
      type: object
      description: One page of `Market` results. `cursor` is `null` on the last page; otherwise pass it back in the next request
        to continue.
      required:
      - markets
      properties:
        markets:
          type: array
          items:
            $ref: '#/components/schemas/Market'
        cursor:
          type:
          - string
          - 'null'
    MarketTradesPage:
      type: object
      description: One page of `MarketTrade` results. `cursor` is `null` on the last page; otherwise pass it back in the next
        request to continue.
      required:
      - trades
      properties:
        trades:
          type: array
          items:
            $ref: '#/components/schemas/MarketTrade'
        cursor:
          type:
          - string
          - 'null'
    OrderbookSnapshotsPage:
      type: object
      description: One page of `OrderbookSnapshot` results. `cursor` is `null` on the last page; otherwise pass it back in
        the next request to continue.
      required:
      - snapshots
      properties:
        snapshots:
          type: array
          items:
            $ref: '#/components/schemas/OrderbookSnapshot'
        cursor:
          type:
          - string
          - 'null'
    EventsPage:
      type: object
      description: One page of `Event` results. `cursor` is `null` on the last page; otherwise pass it back in the next request
        to continue.
      required:
      - events
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/Event'
        cursor:
          type:
          - string
          - 'null'
    SeriesPage:
      type: object
      description: One page of `Series` results. `cursor` is `null` on the last page; otherwise pass it back in the next request
        to continue.
      required:
      - series
      properties:
        series:
          type: array
          items:
            $ref: '#/components/schemas/Series'
        cursor:
          type:
          - string
          - 'null'
    UserTradesPage:
      type: object
      description: One page of `UserTrade` results. `cursor` is `null` on the last page; otherwise pass it back in the next
        request to continue.
      required:
      - trades
      properties:
        trades:
          type: array
          items:
            $ref: '#/components/schemas/UserTrade'
        cursor:
          type:
          - string
          - 'null'
