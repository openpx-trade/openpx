openapi: 3.1.0
info:
  title: OpenPX Unified API
  description: "Unified API surface across prediction-market exchanges. One `Exchange` trait, one set of models, one shape\
    \ \u2014 implemented in Rust with auto-generated Python and TypeScript SDKs.\n\nThis OpenAPI spec is **auto-generated**\
    \ from `engine/core/src/exchange/traits.rs` and `schema/openpx.schema.json`. Edit the trait or the schema, then regenerate\
    \ via `just openapi`. The spec models trait methods as REST operations for documentation rendering only \u2014 OpenPX\
    \ is an in-process Rust library, not a REST service."
  version: 0.2.6
  license:
    name: MIT
servers:
- url: https://github.com/openpx-trade/openpx
  description: Documentation surface only. OpenPX is an in-process Rust library; there is no hosted REST endpoint.
tags:
- name: Markets
- name: Orders
- name: Positions
- name: Balance
- name: Orderbook
- name: Trades
- name: Fills
- name: Server
paths:
  /v1/markets/fetch_markets:
    get:
      tags:
      - Markets
      summary: Fetch markets
      description: List markets, optionally filtered by status, ticker, event, or series.
      operationId: fetch_markets
      parameters:
      - name: cursor
        in: query
        required: false
        schema:
          default: null
          type:
          - string
          - 'null'
        description: Opaque cursor returned by a prior page (e.g. `"eyJvIjoxMDB9"`).
      - name: event_ticker
        in: query
        required: false
        schema:
          default: null
          type:
          - string
          - 'null'
        description: "Fetch all markets in this event \u2014 Kalshi event ticker or Polymarket event slug (e.g. `\"KXBTC-25MAR14\"\
          `)."
      - name: limit
        in: query
        required: false
        schema:
          format: uint
          minimum: 0.0
          type:
          - integer
          - 'null'
        description: Page size; clamped to per-exchange caps (Kalshi 1000, Polymarket 500) (e.g. `100`).
      - name: market_tickers
        in: query
        required: false
        schema:
          default: []
          items:
            type: string
          type: array
        description: "Fetch only these market tickers \u2014 Kalshi tickers or Polymarket slugs (e.g. `[\"KXBTCD-25APR1517\"\
          ]`)."
      - name: series_ticker
        in: query
        required: false
        schema:
          default: null
          type:
          - string
          - 'null'
        description: Fetch only markets in this Kalshi series ticker (e.g. `"KXBTC"`); ignored on Polymarket today.
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/MarketStatusFilter'
          - type: 'null'
          default: null
        description: 'Status filter; defaults to `active` (options: `active`, `closed`, `resolved`, `all`).'
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketsPage'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/orders/create_order:
    post:
      tags:
      - Orders
      summary: Create order
      description: Submit a new order.
      operationId: create_order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/orders/cancel_order:
    post:
      tags:
      - Orders
      summary: Cancel order
      description: Cancel one open order by its globally-unique `order_id`.
      operationId: cancel_order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                order_id:
                  type: string
              required:
              - order_id
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/orders/fetch_order:
    get:
      tags:
      - Orders
      summary: Fetch order
      description: Fetch one order by its globally-unique `order_id`.
      operationId: fetch_order
      parameters:
      - name: order_id
        in: query
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/orders/fetch_open_orders:
    get:
      tags:
      - Orders
      summary: Fetch open orders
      description: List the caller's open orders, optionally scoped to one `asset_id`.
      operationId: fetch_open_orders
      parameters:
      - name: asset_id
        in: query
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/positions/fetch_positions:
    get:
      tags:
      - Positions
      summary: Fetch positions
      description: List the caller's open positions, optionally scoped to one `market_ticker`.
      operationId: fetch_positions
      parameters:
      - name: market_ticker
        in: query
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Position'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/balance/fetch_balance:
    get:
      tags:
      - Balance
      summary: Fetch balance
      description: Fetch the caller's account balance, keyed by currency code (`USD` on Kalshi, `USDC` on Polymarket).
      operationId: fetch_balance
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: number
                  format: double
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/balance/refresh_balance:
    post:
      tags:
      - Balance
      summary: Refresh balance
      description: Refresh cached balance and on-chain allowance state from the exchange.
      operationId: refresh_balance
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty success \u2014 no return body."
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/orderbook/fetch_orderbook:
    get:
      tags:
      - Orderbook
      summary: Fetch orderbook
      description: Fetch the full-depth L2 orderbook (bids + asks) for one `asset_id`.
      operationId: fetch_orderbook
      parameters:
      - name: asset_id
        in: query
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Orderbook'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/trades/fetch_trades:
    get:
      tags:
      - Trades
      summary: Fetch trades
      description: Fetch a paginated tape of recent public trades for one market.
      operationId: fetch_trades
      parameters:
      - name: asset_id
        in: query
        required: true
        schema:
          type: string
        description: "Market identifier \u2014 Kalshi market ticker or Polymarket Gamma slug (e.g. `\"KXBTCD-25APR1517\"`)."
      - name: cursor
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
        description: Opaque cursor returned by a prior page (e.g. `"eyJvIjoxMDB9"`).
      - name: end_ts
        in: query
        required: false
        schema:
          format: int64
          type:
          - integer
          - 'null'
        description: Inclusive upper bound, unix seconds (e.g. `1714608000`).
      - name: limit
        in: query
        required: false
        schema:
          format: uint
          minimum: 0.0
          type:
          - integer
          - 'null'
        description: Max trades to return; capped at 1000 (Kalshi) / 500 (Polymarket) (e.g. `100`).
      - name: start_ts
        in: query
        required: false
        schema:
          format: int64
          type:
          - integer
          - 'null'
        description: Inclusive lower bound, unix seconds (e.g. `1714521600`).
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketTradesPage'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/fills/fetch_fills:
    get:
      tags:
      - Fills
      summary: Fetch fills
      description: List the caller's fill (trade execution) history, optionally scoped to one `market_ticker`.
      operationId: fetch_fills
      parameters:
      - name: market_ticker
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Fill'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/server/fetch_server_time:
    get:
      tags:
      - Server
      summary: Fetch server time
      description: Fetch the exchange's current wall-clock time in UTC.
      operationId: fetch_server_time
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: string
                format: date-time
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/markets/fetch_market_lineage:
    get:
      tags:
      - Markets
      summary: Fetch market lineage
      description: Fetch one market plus its parent event and series in a single round-trip.
      operationId: fetch_market_lineage
      parameters:
      - name: market_ticker
        in: query
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketLineage'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/orderbook/fetch_orderbooks_batch:
    get:
      tags:
      - Orderbook
      summary: Fetch orderbooks batch
      description: Fetch full-depth L2 orderbooks for multiple assets in one round-trip.
      operationId: fetch_orderbooks_batch
      parameters:
      - name: asset_ids
        in: query
        required: true
        schema:
          type: array
          items:
            type: string
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Orderbook'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/orderbook/fetch_orderbook_stats:
    get:
      tags:
      - Orderbook
      summary: Fetch orderbook stats
      description: 'Snapshot stats: top-of-book, mid, spread (bps), size-weighted mid, top-10 imbalance, and total depth.'
      operationId: fetch_orderbook_stats
      parameters:
      - name: asset_id
        in: query
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderbookStats'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/orderbook/fetch_orderbook_impact:
    get:
      tags:
      - Orderbook
      summary: Fetch orderbook impact
      description: Average fill price and slippage (bps) for a market order of `size` contracts on each side.
      operationId: fetch_orderbook_impact
      parameters:
      - name: asset_id
        in: query
        required: true
        schema:
          type: string
      - name: size
        in: query
        required: true
        schema:
          type: number
          format: double
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderbookImpact'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/orderbook/fetch_orderbook_microstructure:
    get:
      tags:
      - Orderbook
      summary: Fetch orderbook microstructure
      description: 'Microstructure signals: depth within 10/50/100 bps, slope, max gap, and per-side level counts.'
      operationId: fetch_orderbook_microstructure
      parameters:
      - name: asset_id
        in: query
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderbookMicrostructure'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/orders/cancel_all_orders:
    post:
      tags:
      - Orders
      summary: Cancel all orders
      description: Cancel all of the caller's open orders, optionally scoped to one `asset_id`.
      operationId: cancel_all_orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                asset_id:
                  type:
                  - string
                  - 'null'
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/orders/create_orders_batch:
    post:
      tags:
      - Orders
      summary: Create orders batch
      description: Submit multiple orders in one round-trip (max 15 on Polymarket; token-budget on Kalshi).
      operationId: create_orders_batch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reqs:
                  type: array
                  items:
                    $ref: '#/components/schemas/CreateOrderRequest'
              required:
              - reqs
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
components:
  schemas:
    ActivityFill:
      properties:
        asset_id:
          type: string
        exchange_ts_ms:
          description: Exchange-authoritative timestamp (millis since epoch).
          format: uint64
          minimum: 0.0
          type:
          - integer
          - 'null'
        fee:
          description: Fee charged for this fill, when the exchange publishes one.
          format: double
          type:
          - number
          - 'null'
        fill_id:
          type:
          - string
          - 'null'
        liquidity_role:
          anyOf:
          - $ref: '#/components/schemas/LiquidityRole'
          - type: 'null'
        market_id:
          type: string
        order_id:
          type:
          - string
          - 'null'
        outcome:
          type:
          - string
          - 'null'
        price:
          format: double
          type: number
        side:
          type:
          - string
          - 'null'
        size:
          format: double
          type: number
        source_channel:
          type: string
        tx_hash:
          description: On-chain transaction hash, when the exchange publishes one.
          type:
          - string
          - 'null'
      required:
      - asset_id
      - market_id
      - price
      - size
      - source_channel
      title: ActivityFill
      type: object
    ActivityTrade:
      description: "Activity events still carried inside `WsUpdate::Trade` / `WsUpdate::Fill`. Retained as a typed payload\
        \ alongside the stream rather than as a separate per-token surface.\n\n`exchange_ts_ms` is exchange-authoritative\
        \ millis since epoch \u2014 uniform with `WsUpdate::{Snapshot, Delta}::exchange_ts`, so every timestamp on the WS\
        \ surface is the same type (`u64` millis). `chrono::DateTime` was more expressive but cost a representation mismatch\
        \ at every FFI boundary."
      properties:
        aggressor_side:
          type:
          - string
          - 'null'
        asset_id:
          type: string
        exchange_ts_ms:
          description: Exchange-authoritative timestamp (millis since epoch).
          format: uint64
          minimum: 0.0
          type:
          - integer
          - 'null'
        fee_rate_bps:
          description: Fee rate in basis points (e.g. 0 = no fee, 200 = 2%). Polymarket `last_trade_price` events populate
            this.
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        market_id:
          type: string
        outcome:
          type:
          - string
          - 'null'
        price:
          format: double
          type: number
        side:
          type:
          - string
          - 'null'
        size:
          format: double
          type: number
        source_channel:
          type: string
        trade_id:
          type:
          - string
          - 'null'
      required:
      - asset_id
      - market_id
      - price
      - size
      - source_channel
      title: ActivityTrade
      type: object
    CreateOrderRequest:
      description: Input for `create_order`.
      properties:
        asset_id:
          description: "The orderable asset \u2014 Kalshi market ticker or Polymarket CTF token id (e.g. `\"KXBTCD-25APR1517\"\
            `)."
          type: string
        order_type:
          allOf:
          - $ref: '#/components/schemas/OrderType'
          default: gtc
          description: 'Time-in-force; defaults to `gtc` (options: `gtc`, `ioc`, `fok`).'
        outcome:
          allOf:
          - $ref: '#/components/schemas/OrderOutcome'
          description: 'Outcome to trade. Options: `yes`, `no`, or `label: "<name>"` (Polymarket categorical markets only).'
        price:
          description: Limit price as YES probability in `(0, 1)` (e.g. `0.62`).
          format: double
          type: number
        side:
          allOf:
          - $ref: '#/components/schemas/OrderSide'
          description: 'Order direction. Options: `buy`, `sell`.'
        size:
          description: Order size in contracts (e.g. `100.0`).
          format: double
          type: number
      required:
      - asset_id
      - outcome
      - price
      - side
      - size
      title: CreateOrderRequest
      type: object
    CryptoPrice:
      properties:
        source:
          $ref: '#/components/schemas/CryptoPriceSource'
        symbol:
          type: string
        timestamp:
          format: uint64
          minimum: 0.0
          type: integer
        value:
          format: double
          type: number
      required:
      - source
      - symbol
      - timestamp
      - value
      title: CryptoPrice
      type: object
    CryptoPriceSource:
      enum:
      - binance
      - chainlink
      title: CryptoPriceSource
      type: string
    DepthBuckets:
      description: Cumulative depth at 10/50/100 bps tiers from mid.
      properties:
        ask_within_100bps:
          description: Cumulative ask size within 100 bps of mid (contracts).
          format: double
          type: number
        ask_within_10bps:
          description: Cumulative ask size within 10 bps of mid (contracts).
          format: double
          type: number
        ask_within_50bps:
          description: Cumulative ask size within 50 bps of mid (contracts).
          format: double
          type: number
        bid_within_100bps:
          description: Cumulative bid size within 100 bps of mid (contracts).
          format: double
          type: number
        bid_within_10bps:
          description: Cumulative bid size within 10 bps of mid (contracts).
          format: double
          type: number
        bid_within_50bps:
          description: Cumulative bid size within 50 bps of mid (contracts).
          format: double
          type: number
      required:
      - ask_within_100bps
      - ask_within_10bps
      - ask_within_50bps
      - bid_within_100bps
      - bid_within_10bps
      - bid_within_50bps
      title: DepthBuckets
      type: object
    Event:
      description: "A grouping of related markets \u2014 one Kalshi event_ticker or one Polymarket event slug."
      properties:
        category:
          description: Topical category (e.g. `"Politics"`); `null` when upstream omits it.
          type:
          - string
          - 'null'
        description:
          description: Long-form event description; `null` when upstream omits it.
          type:
          - string
          - 'null'
        end_ts:
          description: Event end time in UTC.
          format: date-time
          type:
          - string
          - 'null'
        last_updated_ts:
          description: Last upstream update time in UTC.
          format: date-time
          type:
          - string
          - 'null'
        market_tickers:
          default: []
          description: Tickers of markets under this event (e.g. `["KXBTCD-25APR1517"]`).
          items:
            type: string
          type: array
        mutually_exclusive:
          description: '`true` if exactly one child market resolves YES.'
          type:
          - boolean
          - 'null'
        numeric_id:
          description: Polymarket numeric event id (e.g. `"12585"`); `null` on Kalshi.
          type:
          - string
          - 'null'
        open_interest:
          description: Open interest in USD (e.g. `5000.0`).
          format: double
          type:
          - number
          - 'null'
        series_ticker:
          description: Parent series ticker (e.g. `"KXPRES"`); `null` when the event has no parent series.
          type:
          - string
          - 'null'
        start_ts:
          description: Event start time in UTC.
          format: date-time
          type:
          - string
          - 'null'
        status:
          description: Upstream lifecycle string (e.g. `"open"`); `null` when upstream omits it.
          type:
          - string
          - 'null'
        ticker:
          description: "Native event identifier \u2014 Kalshi event ticker or Polymarket event slug (e.g. `\"KXPRES-2028\"\
            `)."
          type: string
        title:
          description: Human-readable event title (e.g. `"2028 US Presidential Election"`).
          type: string
        volume:
          description: Lifetime trading volume in USD (e.g. `12345.67`).
          format: double
          type:
          - number
          - 'null'
      required:
      - ticker
      - title
      type: object
    ExchangeInfo:
      properties:
        has_approvals:
          type: boolean
        has_cancel_all_orders:
          type: boolean
        has_cancel_order:
          type: boolean
        has_create_order:
          type: boolean
        has_create_orders_batch:
          type: boolean
        has_fetch_balance:
          type: boolean
        has_fetch_fills:
          type: boolean
        has_fetch_market_lineage:
          type: boolean
        has_fetch_markets:
          type: boolean
        has_fetch_orderbook:
          type: boolean
        has_fetch_orderbooks_batch:
          type: boolean
        has_fetch_positions:
          type: boolean
        has_fetch_server_time:
          type: boolean
        has_fetch_trades:
          type: boolean
