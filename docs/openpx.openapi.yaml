        neg_risk_market_id:
          description: Polymarket neg-risk market id; `null` on Kalshi.
          type:
          - string
          - 'null'
        numeric_id:
          description: Polymarket numeric DB id used for REST deep-links (e.g. `"1031769"`); `null` on Kalshi.
