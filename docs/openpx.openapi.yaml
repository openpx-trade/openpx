openapi: 3.1.0
info:
  title: OpenPX Unified API
  description: "Unified API surface across prediction-market exchanges. One `Exchange` trait, one set of models, one shape\
    \ \u2014 implemented in Rust with auto-generated Python and TypeScript SDKs.\n\nThis OpenAPI spec is **auto-generated**\
    \ from `engine/core/src/exchange/traits.rs` and `schema/openpx.schema.json`. Edit the trait or the schema, then regenerate\
    \ via `just openapi`. The spec models trait methods as REST operations for documentation rendering only \u2014 OpenPX\
    \ is an in-process Rust library, not a REST service."
  version: 0.2.6
  license:
    name: MIT
servers:
- url: https://github.com/openpx-trade/openpx
  description: Documentation surface only. OpenPX is an in-process Rust library; there is no hosted REST endpoint.
tags:
- name: Markets
- name: Orders
- name: Positions
- name: Balance
- name: Orderbook
- name: Trades
- name: Fills
- name: Server
paths:
  /v1/markets/fetch_markets:
    get:
      tags:
      - Markets
      summary: Fetch markets
      description: "Fetch markets \u2014 `status` filter accepts `active`, `closed`, `resolved`, or `all` (defaults to `active`).\n\
        Single-market and multi-market lookups both go through this surface: pass a single ticker via\n`params.market_tickers`\
        \ to fetch one market, or omit it to page through the full catalog."
      operationId: fetch_markets
      parameters:
      - name: cursor
        in: query
        required: false
        schema:
          default: null
          type:
          - string
          - 'null'
        description: Exchange-specific cursor (offset, page number, or cursor string)
      - name: event_ticker
        in: query
        required: false
        schema:
          default: null
          type:
          - string
          - 'null'
        description: "Fetch all markets within a specific event. Pass a Kalshi event ticker (e.g., `\"KXBTC-25MAR14\"`) or\
          \ a Polymarket event slug (e.g., `\"will-trump-win-2024\"`). Polymarket numeric event IDs are not accepted \u2014\
          \ they will be supported via a future `event_numeric_id` field. When set, `cursor` and `limit` are ignored (not\
          \ paginated). `status` filtering is still applied client-side."
      - name: limit
        in: query
        required: false
        schema:
          format: uint
          minimum: 0.0
          type:
          - integer
          - 'null'
        description: 'Per-page limit. Each exchange applies its own server-side cap: Kalshi tops out at 1000, Polymarket at
          ~500. Values above the cap are silently clamped to the cap.'
      - name: market_tickers
        in: query
        required: false
        schema:
          default: []
          items:
            type: string
          type: array
        description: Fetch a specific set of markets by their unified ticker. Each entry is a Kalshi market ticker (e.g.,
          `"KXBTCD-25APR1517"`) or a Polymarket market slug (e.g., `"will-trump-win-2024"`). When non-empty, `cursor`, `event_ticker`,
          and `series_ticker` are ignored.
      - name: series_ticker
        in: query
        required: false
        schema:
          default: null
          type:
          - string
          - 'null'
        description: "Filter by series ticker. Pass a Kalshi series ticker (e.g., `\"KXBTC\"`) to fetch only markets in that\
          \ series. Polymarket support arrives once `series_numeric_id` is added to this struct \u2014 until then, this field\
          \ is ignored on Polymarket."
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/MarketStatusFilter'
          - type: 'null'
          default: null
        description: Filter by market status. Defaults to Active at the exchange level when None. Use `MarketStatusFilter::All`
          to fetch markets of any status.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketsPage'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/orders/create_order:
    post:
      tags:
      - Orders
      summary: Create order
      description: 'Submit a new order. The unified surface exposes only the six fields on

        `CreateOrderRequest`; cross-venue and per-venue knobs (post-only,

        expiration, idempotency keys, neg-risk overrides, builder/metadata,

        subaccounts) are not modelled. Each adapter generates whatever its

        upstream requires (e.g. Kalshi V2''s required `client_order_id` and

        `self_trade_prevention_type`) internally.'
      operationId: create_order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/orders/cancel_order:
    post:
      tags:
      - Orders
      summary: Cancel order
      description: Cancel an existing order by ID, optionally scoped to a market.
      operationId: cancel_order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                order_id:
                  type: string
                market_ticker:
                  type:
                  - string
                  - 'null'
              required:
              - order_id
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/orders/fetch_order:
    get:
      tags:
      - Orders
      summary: Fetch order
      description: Fetch a single order by ID, optionally scoped to a market.
      operationId: fetch_order
      parameters:
      - name: order_id
        in: query
        required: true
        schema:
          type: string
      - name: market_ticker
        in: query
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/orders/fetch_open_orders:
    get:
      tags:
      - Orders
      summary: Fetch open orders
      description: Fetch the caller's currently open orders, optionally filtered by market.
      operationId: fetch_open_orders
      parameters:
      - name: market_ticker
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/positions/fetch_positions:
    get:
      tags:
      - Positions
      summary: Fetch positions
      description: Fetch the caller's open positions, optionally filtered by market.
      operationId: fetch_positions
      parameters:
      - name: market_ticker
        in: query
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Position'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/balance/fetch_balance:
    get:
      tags:
      - Balance
      summary: Fetch balance
      description: Fetch the caller's account balance, keyed by currency (USD on Kalshi, USDC on Polymarket).
      operationId: fetch_balance
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: number
                  format: double
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/balance/refresh_balance:
    post:
      tags:
      - Balance
      summary: Refresh balance
      description: Refresh cached balance and allowance state from the exchange.
      operationId: refresh_balance
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty success \u2014 no return body."
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/orderbook/fetch_orderbook:
    get:
      tags:
      - Orderbook
      summary: Fetch orderbook
      description: "Fetch the full-depth L2 orderbook (bids + asks) for a single asset.\n`asset_id` is the per-outcome identifier\
        \ \u2014 Kalshi market ticker or Polymarket token id."
      operationId: fetch_orderbook
      parameters:
      - name: asset_id
        in: query
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Orderbook'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/trades/fetch_trades:
    get:
      tags:
      - Trades
      summary: Fetch trades
      description: 'Fetch a paginated tape of recent public trades for a market.

        Both Yes and No outcomes'' trades are returned interleaved; consumers

        distinguish via `MarketTrade.outcome`.'
      operationId: fetch_trades
      parameters:
      - name: asset_id
        in: query
        required: true
        schema:
          type: string
      - name: cursor
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
        description: Opaque cursor from a prior response.
      - name: end_ts
        in: query
        required: false
        schema:
          format: int64
          type:
          - integer
          - 'null'
        description: Unix seconds (inclusive upper bound).
      - name: limit
        in: query
        required: false
        schema:
          format: uint
          minimum: 0.0
          type:
          - integer
          - 'null'
        description: Max trades to return. Capped per exchange (Kalshi 1000, Polymarket 500).
      - name: start_ts
        in: query
        required: false
        schema:
          format: int64
          type:
          - integer
          - 'null'
        description: Unix seconds (inclusive lower bound).
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketTradesPage'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/fills/fetch_fills:
    get:
      tags:
      - Fills
      summary: Fetch fills
      description: Fetch the caller's fill (trade execution) history, optionally filtered by market.
      operationId: fetch_fills
      parameters:
      - name: market_ticker
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Fill'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/server/fetch_server_time:
    get:
      tags:
      - Server
      summary: Fetch server time
      description: Fetch the exchange's current wall-clock time (UTC).
      operationId: fetch_server_time
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: string
                format: date-time
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/markets/fetch_market_lineage:
    get:
      tags:
      - Markets
      summary: Fetch market lineage
      description: "Fetch a market plus its parent event and series in one call. The\n`event` and `series` fields are `Option`\
        \ \u2014 a dangling parent reference\nreturns `None` rather than failing the whole call. `market_ticker` is\nthe unified\
        \ `Market.ticker` (Kalshi market ticker or Polymarket slug)."
      operationId: fetch_market_lineage
      parameters:
      - name: market_ticker
        in: query
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketLineage'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/orderbook/fetch_orderbooks_batch:
    get:
      tags:
      - Orderbook
      summary: Fetch orderbooks batch
      description: Fetch full-depth L2 orderbooks for multiple assets in one round-trip.
      operationId: fetch_orderbooks_batch
      parameters:
      - name: asset_ids
        in: query
        required: true
        schema:
          type: array
          items:
            type: string
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Orderbook'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/orderbook/fetch_orderbook_stats:
    get:
      tags:
      - Orderbook
      summary: Fetch orderbook stats
      description: "Snapshot stats: top-of-book bid/ask, mid, spread (bps), size-weighted\nmid, top-10 imbalance, and total\
        \ bid/ask depth \u2014 pure functions of the\nfull-depth orderbook. `exchange_ts` carries the upstream snapshot time;\n\
        `openpx_ts` is set to wall-clock when OpenPX served the response."
      operationId: fetch_orderbook_stats
      parameters:
      - name: asset_id
        in: query
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderbookStats'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/orderbook/fetch_orderbook_impact:
    get:
      tags:
      - Orderbook
      summary: Fetch orderbook impact
      description: 'Slippage curve at a single requested size. Walks the book consuming

        levels until `size` is filled or the side exhausts; returns partial

        fills with `fill_pct < 100.0`. `size` must be > 0.'
      operationId: fetch_orderbook_impact
      parameters:
      - name: asset_id
        in: query
        required: true
        schema:
          type: string
      - name: size
        in: query
        required: true
        schema:
          type: number
          format: double
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderbookImpact'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/orderbook/fetch_orderbook_microstructure:
    get:
      tags:
      - Orderbook
      summary: Fetch orderbook microstructure
      description: 'Microstructure signals: cumulative depth within 10/50/100 bps tiers,

        linear-regression slope of cumulative size vs distance-from-mid (bps),

        largest consecutive-level price gap, and per-side level counts.'
      operationId: fetch_orderbook_microstructure
      parameters:
      - name: asset_id
        in: query
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderbookMicrostructure'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/orders/cancel_all_orders:
    post:
      tags:
      - Orders
      summary: Cancel all orders
      description: Cancel all of the caller's open orders, optionally scoped to a market.
      operationId: cancel_all_orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                market_ticker:
                  type:
                  - string
                  - 'null'
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/orders/create_orders_batch:
    post:
      tags:
      - Orders
      summary: Create orders batch
      description: 'Submit multiple orders in one round-trip. Each request shares the

        same shape as `create_order`. Cap: 15 on Polymarket; token-budget on

        Kalshi.'
      operationId: create_orders_batch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reqs:
                  type: array
                  items:
                    $ref: '#/components/schemas/CreateOrderRequest'
              required:
              - reqs
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
components:
  schemas:
    ActivityFill:
      properties:
        asset_id:
          type: string
        exchange_ts_ms:
          description: Exchange-authoritative timestamp (millis since epoch).
          format: uint64
          minimum: 0.0
          type:
          - integer
          - 'null'
        fee:
          description: Fee charged for this fill, when the exchange publishes one.
          format: double
          type:
          - number
          - 'null'
        fill_id:
          type:
          - string
          - 'null'
        liquidity_role:
          anyOf:
          - $ref: '#/components/schemas/LiquidityRole'
          - type: 'null'
        market_id:
          type: string
        order_id:
          type:
          - string
          - 'null'
        outcome:
          type:
          - string
          - 'null'
        price:
          format: double
          type: number
        side:
          type:
          - string
          - 'null'
        size:
          format: double
          type: number
        source_channel:
          type: string
        tx_hash:
          description: On-chain transaction hash, when the exchange publishes one.
          type:
          - string
          - 'null'
      required:
      - asset_id
      - market_id
      - price
      - size
      - source_channel
      title: ActivityFill
      type: object
    ActivityTrade:
      description: "Activity events still carried inside `WsUpdate::Trade` / `WsUpdate::Fill`. Retained as a typed payload\
        \ alongside the stream rather than as a separate per-token surface.\n\n`exchange_ts_ms` is exchange-authoritative\
        \ millis since epoch \u2014 uniform with `WsUpdate::{Snapshot, Delta}::exchange_ts`, so every timestamp on the WS\
        \ surface is the same type (`u64` millis). `chrono::DateTime` was more expressive but cost a representation mismatch\
        \ at every FFI boundary."
      properties:
        aggressor_side:
          type:
          - string
          - 'null'
        asset_id:
          type: string
        exchange_ts_ms:
          description: Exchange-authoritative timestamp (millis since epoch).
          format: uint64
          minimum: 0.0
          type:
          - integer
          - 'null'
        fee_rate_bps:
          description: Fee rate in basis points (e.g. 0 = no fee, 200 = 2%). Polymarket `last_trade_price` events populate
            this.
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        market_id:
          type: string
        outcome:
          type:
          - string
          - 'null'
        price:
          format: double
          type: number
        side:
          type:
          - string
          - 'null'
        size:
          format: double
          type: number
        source_channel:
          type: string
        trade_id:
          type:
          - string
          - 'null'
      required:
      - asset_id
      - market_id
      - price
      - size
      - source_channel
      title: ActivityTrade
      type: object
    CreateOrderRequest:
      description: "Lean input shape for `Exchange::create_order`. All cross-venue and per-venue knobs are deliberately absent\
        \ \u2014 `post_only`, `expiration_ts`, `client_order_id`, `reduce_only`, `neg_risk`, builder/metadata, and subaccounts\
        \ are not exposed. Anything an exchange requires that is not modelled here is generated internally (e.g. Kalshi V2's\
        \ required `client_order_id` is filled with a per-call UUID)."
      properties:
        market_ticker:
          description: "Unified market identifier \u2014 Kalshi market ticker or Polymarket slug."
          type: string
        order_type:
          allOf:
          - $ref: '#/components/schemas/OrderType'
          default: gtc
          description: Time-in-force / execution type.
        outcome:
          allOf:
          - $ref: '#/components/schemas/OrderOutcome'
          description: Which outcome of the market to trade.
        price:
          description: Limit price as YES probability in `(0.0, 1.0)`.
          format: double
          type: number
        side:
          allOf:
          - $ref: '#/components/schemas/OrderSide'
          description: Buy or sell.
        size:
          description: Order size in contracts.
          format: double
          type: number
      required:
      - market_ticker
      - outcome
      - price
      - side
      - size
      title: CreateOrderRequest
      type: object
    CryptoPrice:
      properties:
        source:
          $ref: '#/components/schemas/CryptoPriceSource'
        symbol:
          type: string
        timestamp:
          format: uint64
          minimum: 0.0
          type: integer
        value:
          format: double
          type: number
      required:
      - source
      - symbol
      - timestamp
      - value
      title: CryptoPrice
      type: object
    CryptoPriceSource:
      enum:
      - binance
      - chainlink
      title: CryptoPriceSource
      type: string
    DepthBuckets:
      properties:
        ask_within_100bps:
          format: double
          type: number
        ask_within_10bps:
          format: double
          type: number
        ask_within_50bps:
          format: double
          type: number
        bid_within_100bps:
          format: double
          type: number
        bid_within_10bps:
          format: double
          type: number
        bid_within_50bps:
          format: double
          type: number
      required:
      - ask_within_100bps
      - ask_within_10bps
      - ask_within_50bps
      - bid_within_100bps
      - bid_within_10bps
      - bid_within_50bps
      title: DepthBuckets
      type: object
    Event:
      description: A grouping of related markets. On Kalshi, an Event is a single resolution (e.g. "Will Candidate X win State
        Y?") with one or more contracts. On Polymarket, an Event is the parent of one or more Markets sharing a common theme
        (e.g. "2028 US Presidential Election" with markets per candidate).
      properties:
        category:
          type:
          - string
          - 'null'
        description:
          type:
          - string
          - 'null'
        end_ts:
          format: date-time
          type:
          - string
          - 'null'
        last_updated_ts:
          format: date-time
          type:
          - string
          - 'null'
        market_tickers:
          default: []
          description: "Sibling market market_tickers under this event \u2014 unified `Market.ticker` values (Kalshi market\
            \ market_tickers; Polymarket slugs)."
          items:
            type: string
          type: array
        mutually_exclusive:
          type:
          - boolean
          - 'null'
        numeric_id:
          description: Polymarket's numeric REST id for the event (e.g. `"12585"`). None on Kalshi (no separate numeric event
            surface).
          type:
          - string
          - 'null'
        open_interest:
          format: double
          type:
          - number
          - 'null'
        series_ticker:
          description: 'Parent series ticker. Kalshi: upstream `series_ticker`. Polymarket: the embedded series''s `ticker`
            (or `slug` if `ticker` is null).'
          type:
