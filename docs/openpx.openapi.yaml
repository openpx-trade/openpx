    PriceHistoryRequest:
      description: Request for fetching price history / candlestick data.
      properties:
        condition_id:
          description: Condition ID for OI enrichment (Polymarket).
          type:
          - string
          - 'null'
        end_ts:
          description: Unix seconds
          format: int64
          type:
          - integer
          - 'null'
        interval:
          $ref: '#/components/schemas/PriceHistoryInterval'
        market_id:
          type: string
        outcome:
          type:
          - string
          - 'null'
        start_ts:
          description: Unix seconds
          format: int64
          type:
          - integer
          - 'null'
        token_id:
