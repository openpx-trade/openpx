          type:
          - string
          - 'null'
        mid:
          format: double
          type:
          - number
          - 'null'
        openpx_ts:
          format: date-time
          type: string
        sell_avg_price:
          format: double
          type:
          - number
          - 'null'
        sell_fill_pct:
          format: double
          type: number
        sell_slippage_bps:
          format: double
          type:
          - number
          - 'null'
        size:
          format: double
          type: number
      required:
      - asset_id
      - buy_fill_pct
      - openpx_ts
      - sell_fill_pct
      - size
      title: OrderbookImpact
      type: object
    OrderbookMicrostructure:
      properties:
        ask_slope:
          format: double
          type:
          - number
          - 'null'
        asset_id:
          type: string
        bid_slope:
