      title: OrderbookMicrostructure
      type: object
    OrderbookStats:
      properties:
        ask_depth:
          format: double
          type: number
        asset_id:
          type: string
        best_ask:
          format: double
          type:
          - number
          - 'null'
        best_bid:
          format: double
          type:
          - number
          - 'null'
        bid_depth:
          format: double
          type: number
        exchange_ts:
          format: date-time
          type:
          - string
          - 'null'
        imbalance:
          format: double
          type:
          - number
          - 'null'
        mid:
          format: double
          type:
          - number
          - 'null'
        openpx_ts:
          format: date-time
          type: string
        spread_bps:
          format: double
          type:
          - number
          - 'null'
        weighted_mid:
          format: double
          type:
          - number
          - 'null'
      required:
