            (e.g. `"presidential-election-winner-2024"`).'
          type: string
        title:
          type: string
        volume:
          format: double
          type:
          - number
          - 'null'
      required:
      - ticker
      - title
      type: object
    ExchangeInfo:
      properties:
        has_approvals:
          type: boolean
        has_cancel_all_orders:
          type: boolean
        has_cancel_order:
