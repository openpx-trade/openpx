openapi: 3.1.0
info:
  title: OpenPX Unified API
  description: "Unified API surface across prediction-market exchanges. One `Exchange` trait, one set of models, one shape\
    \ \u2014 implemented in Rust with auto-generated Python and TypeScript SDKs.\n\nThis OpenAPI spec is **auto-generated**\
    \ from `engine/core/src/exchange/traits.rs` and `schema/openpx.schema.json`. Edit the trait or the schema, then regenerate\
    \ via `just openapi`. The spec models trait methods as REST operations for documentation rendering only \u2014 OpenPX\
    \ is an in-process Rust library, not a REST service."
  version: 0.2.6
  license:
    name: MIT
servers:
- url: https://github.com/openpx-trade/openpx
  description: Documentation surface only. OpenPX is an in-process Rust library; there is no hosted REST endpoint.
tags:
- name: Markets
- name: Orders
- name: Positions
- name: Balance
- name: Orderbook
- name: Price History
- name: Trades
- name: Orderbook History
- name: Fills
- name: Server
- name: Events
- name: Series
- name: Pricing
- name: Tags
paths:
  /v1/markets/fetch_markets:
    get:
      operationId: fetch_markets
      summary: Fetch markets
      tags:
      - Markets
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketsPage'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
      description: 'Fetch one page of markets from this exchange.


        Returns `(markets, next_cursor)` where `next_cursor` is `None` when no more pages.

        Callers paginate externally by passing `next_cursor` back in `params.cursor`.

        When `params.status` is `None`, exchanges default to `Active`.

        When `params.status` is `Some(All)`, exchanges return all markets regardless of status.'
  /v1/markets/fetch_market:
    get:
      operationId: fetch_market
      summary: Fetch market
      tags:
      - Markets
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Market'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/orders/create_order:
    post:
      operationId: create_order
      summary: Create order
      tags:
      - Orders
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                market_id:
                  type: string
                outcome:
                  type: string
                side:
                  $ref: '#/components/schemas/OrderSide'
                price:
                  type: number
                  format: double
                size:
                  type: number
                  format: double
                params:
                  type: object
                  additionalProperties:
                    type: string
              required:
              - market_id
              - outcome
              - side
              - price
              - size
              - params
  /v1/orders/cancel_order:
    post:
      operationId: cancel_order
      summary: Cancel order
      tags:
      - Orders
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                order_id:
                  type: string
                market_id:
                  type:
                  - string
                  - 'null'
              required:
              - order_id
  /v1/orders/fetch_order:
    get:
      operationId: fetch_order
      summary: Fetch order
      tags:
      - Orders
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/orders/fetch_open_orders:
    get:
      operationId: fetch_open_orders
      summary: Fetch open orders
      tags:
      - Orders
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/positions/fetch_positions:
    get:
      operationId: fetch_positions
      summary: Fetch positions
      tags:
      - Positions
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Position'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/balance/fetch_balance:
    get:
      operationId: fetch_balance
      summary: Fetch balance
      tags:
      - Balance
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: number
                  format: double
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/balance/refresh_balance:
    post:
      operationId: refresh_balance
      summary: Refresh balance
      tags:
      - Balance
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty success \u2014 no return body."
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
      description: Refresh cached balance/allowance state if supported by the exchange.
  /v1/orderbook/fetch_orderbook:
    get:
      operationId: fetch_orderbook
      summary: Fetch orderbook
      tags:
      - Orderbook
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Orderbook'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
      description: 'Fetch L2 orderbook for a market outcome.

        Uses owned types for async compatibility.'
  /v1/price-history/fetch_price_history:
    get:
      operationId: fetch_price_history
      summary: Fetch price history
      tags:
      - Price History
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Candlestick'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
      description: Fetch historical OHLCV price history / candlestick data for a market outcome.
  /v1/trades/fetch_trades:
    get:
      operationId: fetch_trades
      summary: Fetch trades
      tags:
      - Trades
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketTradesPage'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
      description: 'Fetch recent public trades ("tape") for a market outcome.

        Returns `(trades, next_cursor)` where `next_cursor` supports pagination.'
  /v1/orderbook-history/fetch_orderbook_history:
    get:
      operationId: fetch_orderbook_history
      summary: Fetch orderbook history
      tags:
      - Orderbook History
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderbookSnapshotsPage'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
      description: 'Fetch historical L2 orderbook snapshots for a market.

        Returns `(snapshots, next_cursor)` for pagination.'
  /v1/balance/fetch_balance_raw:
    get:
      operationId: fetch_balance_raw
      summary: Fetch balance raw
      tags:
      - Balance
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                description: Arbitrary JSON value (raw upstream response).
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
      description: Fetch raw balance response from exchange API
  /v1/fills/fetch_user_activity:
    get:
      operationId: fetch_user_activity
      summary: Fetch user activity
      tags:
      - Fills
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                description: Arbitrary JSON value (raw upstream response).
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/fills/fetch_fills:
    get:
      operationId: fetch_fills
      summary: Fetch fills
      tags:
      - Fills
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Fill'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
      description: Fetch user's fill (trade execution) history for a market.
  /v1/server/fetch_server_time:
    get:
      operationId: fetch_server_time
      summary: Fetch server time
      tags:
      - Server
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: string
                format: date-time
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
      description: 'Fetch the exchange''s current wall-clock time. Useful for clock-skew

        correction in signing-sensitive paths and HFT replay where local

        `chrono::Utc::now()` would silently drift from the venue''s clock.'
  /v1/events/fetch_events:
    get:
      operationId: fetch_events
      summary: Fetch events
      tags:
      - Events
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventsPage'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
      description: 'Fetch a page of events. An event groups one or more markets that share

        a resolution (Kalshi) or theme (Polymarket).

        Returns `(events, next_cursor)`.'
  /v1/events/fetch_event:
    get:
      operationId: fetch_event
      summary: Fetch event
      tags:
      - Events
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
      description: Fetch a single event by ID or slug (whichever the venue accepts).
  /v1/orderbook/fetch_orderbooks_batch:
    get:
      operationId: fetch_orderbooks_batch
      summary: Fetch orderbooks batch
      tags:
      - Orderbook
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Orderbook'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
      description: 'Fetch L2 orderbooks for multiple markets in one round-trip. Both

        venues expose a batch book endpoint (Kalshi `/markets/orderbooks`,

        Polymarket `/books`); this method exposes that as a unified primitive.'
  /v1/series/fetch_series:
    get:
      operationId: fetch_series
      summary: Fetch series
      tags:
      - Series
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeriesPage'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
      description: 'Fetch a page of series. A series is a recurring family of events

        (weekly inflation prints, monthly NFP, sports seasons, etc.).

        Returns `(series, next_cursor)`.'
  /v1/series/fetch_series_one:
    get:
      operationId: fetch_series_one
      summary: Fetch series one
      tags:
      - Series
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Series'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
      description: Fetch a single series by ID or ticker.
  /v1/pricing/fetch_midpoint:
    get:
      operationId: fetch_midpoint
      summary: Fetch midpoint
      tags:
      - Pricing
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: number
                format: double
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
      description: 'Fetch the midpoint price for a single market outcome. Cheaper than

        pulling a full orderbook when only the mark price is needed.'
  /v1/pricing/fetch_midpoints_batch:
    get:
      operationId: fetch_midpoints_batch
      summary: Fetch midpoints batch
      tags:
      - Pricing
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: number
                  format: double
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
      description: 'Fetch midpoints for multiple market outcomes in one round-trip.

        Returns a map keyed by the input identifier (token_id on Polymarket,

        ticker on Kalshi).'
  /v1/pricing/fetch_spread:
    get:
      operationId: fetch_spread
      summary: Fetch spread
      tags:
      - Pricing
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Spread'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
      description: Fetch the top-of-book spread (best bid, best ask, ask - bid).
  /v1/pricing/fetch_last_trade_price:
    get:
      operationId: fetch_last_trade_price
      summary: Fetch last trade price
      tags:
      - Pricing
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LastTrade'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
      description: Fetch the most recent public trade for a market outcome.
  /v1/pricing/fetch_open_interest:
    get:
      operationId: fetch_open_interest
      summary: Fetch open interest
      tags:
      - Pricing
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: number
                format: double
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
      description: Fetch the open interest (total outstanding contracts) for a market.
  /v1/trades/fetch_user_trades:
    get:
      operationId: fetch_user_trades
      summary: Fetch user trades
      tags:
      - Trades
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserTradesPage'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
      description: "Fetch a user's trade history. Distinct from `fetch_fills` because some\nvenues (Polymarket) carry on-chain\
        \ fields like `tx_hash` and a\n`realized_pnl` that don't fit the `Fill` model. When\n`req.user_address` is `None`,\
        \ returns the authenticated caller's own\ntrades. When `Some(addr)`, returns a public lookup for that wallet\n(Polymarket\
        \ only \u2014 Kalshi returns `NotSupported` in that case)."
  /v1/tags/fetch_market_tags:
    get:
      operationId: fetch_market_tags
      summary: Fetch market tags
      tags:
      - Tags
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tag'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
      description: Fetch the tag set associated with a market (or its parent event).
  /v1/orders/cancel_all_orders:
    post:
      operationId: cancel_all_orders
      summary: Cancel all orders
      tags:
      - Orders
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
      description: 'Cancel all of the caller''s open orders. When `market_id.is_some()`,

        cancel only orders on that market.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                market_id:
                  type:
                  - string
                  - 'null'
  /v1/orders/create_orders_batch:
    post:
      operationId: create_orders_batch
      summary: Create orders batch
      tags:
      - Orders
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
      description: "Submit multiple orders in a single round-trip. Both venues cap the\nbatch size \u2014 Polymarket at 15,\
        \ Kalshi at a token-budget-dependent\nnumber. Implementations should reject batches that exceed their cap\nup-front\
        \ rather than splitting silently."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                orders:
                  type: array
                  items:
                    $ref: '#/components/schemas/NewOrder'
              required:
              - orders
components:
  schemas:
    ActivityFill:
      properties:
        asset_id:
          type: string
        exchange_ts_ms:
          description: Exchange-authoritative timestamp (millis since epoch).
          format: uint64
          minimum: 0.0
          type:
          - integer
          - 'null'
        fee:
          description: Fee charged for this fill, when the exchange publishes one.
          format: double
          type:
          - number
          - 'null'
        fill_id:
          type:
          - string
          - 'null'
        liquidity_role:
          anyOf:
          - $ref: '#/components/schemas/LiquidityRole'
          - type: 'null'
        market_id:
          type: string
        order_id:
          type:
          - string
          - 'null'
        outcome:
          type:
          - string
          - 'null'
        price:
          format: double
          type: number
        side:
          type:
          - string
          - 'null'
        size:
          format: double
          type: number
        source_channel:
          type: string
        tx_hash:
          description: On-chain transaction hash, when the exchange publishes one.
          type:
          - string
          - 'null'
      required:
      - asset_id
      - market_id
      - price
      - size
      - source_channel
      title: ActivityFill
      type: object
    ActivityTrade:
      description: "Activity events still carried inside `WsUpdate::Trade` / `WsUpdate::Fill`. Retained as a typed payload\
        \ alongside the stream rather than as a separate per-token surface.\n\n`exchange_ts_ms` is exchange-authoritative\
        \ millis since epoch \u2014 uniform with `WsUpdate::{Snapshot, Delta}::exchange_ts`, so every timestamp on the WS\
        \ surface is the same type (`u64` millis). `chrono::DateTime` was more expressive but cost a representation mismatch\
        \ at every FFI boundary."
      properties:
        aggressor_side:
          type:
          - string
          - 'null'
        asset_id:
          type: string
        exchange_ts_ms:
          description: Exchange-authoritative timestamp (millis since epoch).
          format: uint64
          minimum: 0.0
          type:
          - integer
          - 'null'
        fee_rate_bps:
          description: Fee rate in basis points (e.g. 0 = no fee, 200 = 2%). Polymarket `last_trade_price` events populate
            this.
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        market_id:
          type: string
        outcome:
          type:
          - string
          - 'null'
        price:
          format: double
          type: number
        side:
          type:
          - string
          - 'null'
        size:
          format: double
          type: number
        source_channel:
          type: string
        trade_id:
          type:
          - string
          - 'null'
      required:
      - asset_id
      - market_id
      - price
      - size
      - source_channel
      title: ActivityTrade
      type: object
    Candlestick:
      description: OHLCV candlestick, normalized across all exchanges. Prices are decimals (0.0 to 1.0). Timestamp is the
        period START (not end). Serialized over the wire as RFC3339 (DateTime<Utc>) for API consistency.
      properties:
        close:
          format: double
          type: number
        high:
          format: double
          type: number
        low:
          format: double
          type: number
        open:
          format: double
          type: number
        open_interest:
          description: Open interest at this candle's close. Only available from exchanges that report it (e.g., Kalshi).
          format: double
          type:
          - number
          - 'null'
        timestamp:
          description: Period start timestamp (UTC). lightweight-charts expects start-of-period.
          format: date-time
          type: string
        volume:
          description: Trade volume in contracts. 0.0 if exchange doesn't provide volume.
          format: double
          type: number
      required:
      - close
      - high
      - low
      - open
      - timestamp
      - volume
      title: Candlestick
      type: object
    Event:
      description: A grouping of related markets. On Kalshi, an Event is a single resolution (e.g. "Will Candidate X win State
        Y?") with one or more contracts. On Polymarket, an Event is the parent of one or more Markets sharing a common theme
        (e.g. "2028 US Presidential Election" with markets per candidate).
      properties:
        category:
          type:
          - string
          - 'null'
        description:
          type:
          - string
          - 'null'
        end_ts:
          format: date-time
          type:
          - string
          - 'null'
        id:
          type: string
        last_updated_ts:
          format: date-time
          type:
          - string
          - 'null'
        market_ids:
          default: []
          items:
            type: string
          type: array
        mutually_exclusive:
          type:
          - boolean
          - 'null'
        open_interest:
          format: double
          type:
          - number
          - 'null'
        series_id:
          type:
          - string
          - 'null'
        slug:
          type:
          - string
          - 'null'
        start_ts:
          format: date-time
          type:
          - string
          - 'null'
        status:
          type:
          - string
          - 'null'
        title:
          type: string
        volume:
          format: double
          type:
          - number
          - 'null'
      required:
      - id
