openapi: 3.1.0
info:
  title: OpenPX Unified API
  description: "Unified API surface across prediction-market exchanges. One `Exchange` trait, one set of models, one shape\
    \ \u2014 implemented in Rust with auto-generated Python and TypeScript SDKs.\n\nThis OpenAPI spec is **auto-generated**\
    \ from `engine/core/src/exchange/traits.rs` and `schema/openpx.schema.json`. Edit the trait or the schema, then regenerate\
    \ via `just openapi`. The spec models trait methods as REST operations for documentation rendering only \u2014 OpenPX\
    \ is an in-process Rust library, not a REST service."
  version: 0.2.6
  license:
    name: MIT
servers:
- url: https://github.com/openpx-trade/openpx
  description: Documentation surface only. OpenPX is an in-process Rust library; there is no hosted REST endpoint.
tags:
- name: Markets
- name: Orders
- name: Positions
- name: Balance
- name: Orderbook
- name: Price History
- name: Trades
- name: Orderbook History
- name: Fills
- name: Server
- name: Events
- name: Series
- name: Pricing
- name: Tags
paths:
  /v1/markets/fetch_markets:
    get:
      tags:
      - Markets
      summary: Fetch markets
      description: "Fetch a paginated list of markets \u2014 `status` filter accepts `active`, `closed`, `resolved`, or `all`\
        \ (defaults to `active`)."
      operationId: fetch_markets
      parameters:
      - name: cursor
        in: query
        required: false
        schema:
          default: null
          type:
          - string
          - 'null'
        description: Exchange-specific cursor (offset, page number, or cursor string)
      - name: event_ticker
        in: query
        required: false
        schema:
          default: null
          type:
          - string
          - 'null'
        description: Fetch all markets within a specific event. Pass a Kalshi event ticker (e.g., `"KXBTC-25MAR14"`) or a
          Polymarket event ID or slug (e.g., `"903"` or `"will-trump-win-2024"`) to get its child markets. When set, `series_id`,
          `cursor`, and `limit` are ignored (not paginated). `status` filtering is still applied client-side.
      - name: limit
        in: query
        required: false
        schema:
          format: uint
          minimum: 0.0
          type:
          - integer
          - 'null'
        description: 'Per-page limit. Each exchange applies its own server-side cap: Kalshi tops out at 1000, Polymarket at
          ~500. Values above the cap are silently clamped to the cap.'
      - name: series_id
        in: query
        required: false
        schema:
          default: null
          type:
          - string
          - 'null'
        description: "Filter by series (Kalshi and Polymarket). Both exchanges organize markets as Series \u2192 Events \u2192\
          \ Markets. Pass a Kalshi series ticker (e.g., `\"KXBTC\"`) or a Polymarket series ID (e.g., `\"10345\"`) to fetch\
          \ only markets in that series."
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/MarketStatusFilter'
          - type: 'null'
          default: null
        description: Filter by market status. Defaults to Active at the exchange level when None. Use `MarketStatusFilter::All`
          to fetch markets of any status.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketsPage'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/markets/fetch_market:
    get:
      tags:
      - Markets
      summary: Fetch market
      description: Fetch a single market by ID (Kalshi ticker or Polymarket condition_id).
      operationId: fetch_market
      parameters:
      - name: market_id
        in: query
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Market'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/orders/create_order:
    post:
      tags:
      - Orders
      summary: Create order
      description: "Submit a new order \u2014 `side` is `buy` or `sell`; `params[\"order_type\"]` accepts `gtc`, `ioc`, or\
        \ `fok`."
      operationId: create_order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                market_id:
                  type: string
                outcome:
                  type: string
                side:
                  $ref: '#/components/schemas/OrderSide'
                price:
                  type: number
                  format: double
                size:
                  type: number
                  format: double
                params:
                  type: object
                  additionalProperties:
                    type: string
              required:
              - market_id
              - outcome
              - side
              - price
              - size
              - params
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/orders/cancel_order:
    post:
      tags:
      - Orders
      summary: Cancel order
      description: Cancel an existing order by ID, optionally scoped to a market.
      operationId: cancel_order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                order_id:
                  type: string
                market_id:
                  type:
                  - string
                  - 'null'
              required:
              - order_id
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/orders/fetch_order:
    get:
      tags:
      - Orders
      summary: Fetch order
      description: Fetch a single order by ID, optionally scoped to a market.
      operationId: fetch_order
      parameters:
      - name: order_id
        in: query
        required: true
        schema:
          type: string
      - name: market_id
        in: query
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/orders/fetch_open_orders:
    get:
      tags:
      - Orders
      summary: Fetch open orders
      description: Fetch the caller's currently open orders, optionally filtered by market.
      operationId: fetch_open_orders
      parameters:
      - name: market_id
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/positions/fetch_positions:
    get:
      tags:
      - Positions
      summary: Fetch positions
      description: Fetch the caller's open positions, optionally filtered by market.
      operationId: fetch_positions
      parameters:
      - name: market_id
        in: query
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Position'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/balance/fetch_balance:
    get:
      tags:
      - Balance
      summary: Fetch balance
      description: Fetch the caller's account balance, keyed by currency (USD on Kalshi, USDC on Polymarket).
      operationId: fetch_balance
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: number
                  format: double
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/balance/refresh_balance:
    post:
      tags:
      - Balance
      summary: Refresh balance
      description: Refresh cached balance and allowance state from the exchange.
      operationId: refresh_balance
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty success \u2014 no return body."
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/orderbook/fetch_orderbook:
    get:
      tags:
      - Orderbook
      summary: Fetch orderbook
      description: Fetch the L2 orderbook (bids + asks) for a single market outcome.
      operationId: fetch_orderbook
      parameters:
      - name: market_id
        in: query
        required: true
        schema:
          type: string
      - name: outcome
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: token_id
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Orderbook'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/price-history/fetch_price_history:
    get:
      tags:
      - Price History
      summary: Fetch price history
      description: "Fetch OHLCV candlestick history \u2014 `interval` is `1m`, `1h`, `6h`, `1d`, `1w`, or `max`."
      operationId: fetch_price_history
      parameters:
      - name: condition_id
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
        description: Condition ID for OI enrichment (Polymarket).
      - name: end_ts
        in: query
        required: false
        schema:
          format: int64
          type:
          - integer
          - 'null'
        description: Unix seconds
      - name: interval
        in: query
        required: true
        schema:
          $ref: '#/components/schemas/PriceHistoryInterval'
      - name: market_id
        in: query
        required: true
        schema:
          type: string
      - name: outcome
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: start_ts
        in: query
        required: false
        schema:
          format: int64
          type:
          - integer
          - 'null'
        description: Unix seconds
      - name: token_id
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Candlestick'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/trades/fetch_trades:
    get:
      tags:
      - Trades
      summary: Fetch trades
      description: Fetch a paginated tape of recent public trades for a market outcome.
      operationId: fetch_trades
      parameters:
      - name: cursor
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
        description: Opaque pagination cursor from a previous response.
      - name: end_ts
        in: query
        required: false
        schema:
          format: int64
          type:
          - integer
          - 'null'
        description: Unix seconds (inclusive)
      - name: limit
        in: query
        required: false
        schema:
          format: uint
          minimum: 0.0
          type:
          - integer
          - 'null'
        description: Max number of trades to return (exchange-specific caps may apply).
      - name: market_id
        in: query
        required: true
        schema:
          type: string
        description: Exchange-native market identifier.
      - name: market_ref
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
        description: Optional alternate market identifier for trade endpoints (e.g., Polymarket conditionId). When provided,
          exchanges should prefer this over `market_id`.
      - name: outcome
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: start_ts
        in: query
        required: false
        schema:
          format: int64
          type:
          - integer
          - 'null'
        description: Unix seconds (inclusive)
      - name: token_id
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketTradesPage'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/orderbook-history/fetch_orderbook_history:
    get:
      tags:
      - Orderbook History
      summary: Fetch orderbook history
      description: Fetch a paginated list of historical L2 orderbook snapshots for a market.
      operationId: fetch_orderbook_history
      parameters:
      - name: cursor
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: end_ts
        in: query
        required: false
        schema:
          format: int64
          type:
          - integer
          - 'null'
      - name: limit
        in: query
        required: false
        schema:
          format: uint
          minimum: 0.0
          type:
          - integer
          - 'null'
      - name: market_id
        in: query
        required: true
        schema:
          type: string
      - name: start_ts
        in: query
        required: false
        schema:
          format: int64
          type:
          - integer
          - 'null'
      - name: token_id
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderbookSnapshotsPage'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/balance/fetch_balance_raw:
    get:
      tags:
      - Balance
      summary: Fetch balance raw
      description: Fetch the raw upstream balance response (unprocessed JSON) from the exchange.
      operationId: fetch_balance_raw
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                description: Arbitrary JSON value (raw upstream response).
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/fills/fetch_user_activity:
    get:
      tags:
      - Fills
      summary: Fetch user activity
      operationId: fetch_user_activity
      parameters:
      - name: address
        in: query
        required: true
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          format: uint
          minimum: 0.0
          type:
          - integer
          - 'null'
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                description: Arbitrary JSON value (raw upstream response).
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/fills/fetch_fills:
    get:
      tags:
      - Fills
      summary: Fetch fills
      description: Fetch the caller's fill (trade execution) history, optionally filtered by market.
      operationId: fetch_fills
      parameters:
      - name: market_id
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Fill'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/server/fetch_server_time:
    get:
      tags:
      - Server
      summary: Fetch server time
      description: Fetch the exchange's current wall-clock time (UTC).
      operationId: fetch_server_time
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: string
                format: date-time
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/events/fetch_events:
    get:
      tags:
      - Events
      summary: Fetch events
      description: Fetch a paginated list of events (groups of related markets).
      operationId: fetch_events
      parameters:
      - name: cursor
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: limit
        in: query
        required: false
        schema:
          format: uint
          minimum: 0.0
          type:
          - integer
          - 'null'
      - name: min_close_ts
        in: query
        required: false
        schema:
          format: int64
          type:
          - integer
          - 'null'
        description: "Unix seconds \u2014 only events closing at or after this timestamp."
      - name: min_updated_ts
        in: query
        required: false
        schema:
          format: int64
          type:
          - integer
          - 'null'
        description: "Unix seconds \u2014 only events updated at or after this timestamp."
      - name: series_id
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
        description: Filter by series ID / ticker.
      - name: status
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
        description: "Filter by lifecycle status \u2014 venue-specific values (e.g. `open`, `closed`, `settled` on Kalshi;\
          \ `closed=true/false` on Polymarket)."
      - name: with_nested_markets
        in: query
        required: false
        schema:
          type:
          - boolean
          - 'null'
        description: Include the events' nested `Market` objects when supported.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventsPage'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/events/fetch_event:
    get:
      tags:
      - Events
      summary: Fetch event
      description: Fetch a single event by ID or slug.
      operationId: fetch_event
      parameters:
      - name: id
        in: query
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/orderbook/fetch_orderbooks_batch:
    get:
      tags:
      - Orderbook
      summary: Fetch orderbooks batch
      description: Fetch L2 orderbooks for multiple markets in one round-trip.
      operationId: fetch_orderbooks_batch
      parameters:
      - name: market_ids
        in: query
        required: true
        schema:
          type: array
          items:
            type: string
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Orderbook'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/series/fetch_series:
    get:
      tags:
      - Series
      summary: Fetch series
      description: Fetch a paginated list of series (recurring families of events).
      operationId: fetch_series
      parameters:
      - name: category
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
        description: Filter by category (e.g. `Politics`, `Sports`).
      - name: cursor
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: include_volume
        in: query
        required: false
        schema:
          type:
          - boolean
          - 'null'
        description: Include traded volume in the response when the venue supports it.
      - name: limit
        in: query
        required: false
        schema:
          format: uint
          minimum: 0.0
          type:
          - integer
          - 'null'
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeriesPage'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/series/fetch_series_one:
    get:
      tags:
      - Series
      summary: Fetch series one
      description: Fetch a single series by ID or ticker.
      operationId: fetch_series_one
      parameters:
      - name: id
        in: query
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Series'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/pricing/fetch_midpoint:
    get:
      tags:
      - Pricing
      summary: Fetch midpoint
      description: Fetch the midpoint price for a single market outcome.
      operationId: fetch_midpoint
      parameters:
      - name: market_id
        in: query
        required: true
        schema:
          type: string
      - name: outcome
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: token_id
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: number
                format: double
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/pricing/fetch_midpoints_batch:
    get:
      tags:
      - Pricing
      summary: Fetch midpoints batch
      description: Fetch midpoint prices for multiple market outcomes in one round-trip.
      operationId: fetch_midpoints_batch
      parameters:
      - name: market_ids
        in: query
        required: true
        schema:
          type: array
          items:
            type: string
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: number
                  format: double
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/pricing/fetch_spread:
    get:
      tags:
      - Pricing
      summary: Fetch spread
      description: "Fetch the top-of-book spread (best bid, best ask, ask \u2212 bid) for a market outcome."
      operationId: fetch_spread
      parameters:
      - name: market_id
        in: query
        required: true
        schema:
          type: string
      - name: outcome
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: token_id
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Spread'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/pricing/fetch_last_trade_price:
    get:
      tags:
      - Pricing
      summary: Fetch last trade price
      description: Fetch the most recent public trade for a market outcome.
      operationId: fetch_last_trade_price
      parameters:
      - name: market_id
        in: query
        required: true
        schema:
          type: string
      - name: outcome
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: token_id
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LastTrade'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/pricing/fetch_open_interest:
    get:
      tags:
      - Pricing
      summary: Fetch open interest
      description: Fetch the open interest (total outstanding contracts) for a market.
      operationId: fetch_open_interest
      parameters:
      - name: market_id
        in: query
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: number
                format: double
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/trades/fetch_user_trades:
    get:
      tags:
      - Trades
      summary: Fetch user trades
      description: "Fetch a wallet's trade history \u2014 optional `side` filter is `buy` or `sell`."
      operationId: fetch_user_trades
      parameters:
      - name: cursor
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: end_ts
        in: query
        required: false
        schema:
          format: int64
          type:
          - integer
          - 'null'
        description: Unix seconds (inclusive)
      - name: limit
        in: query
        required: false
        schema:
          format: uint
          minimum: 0.0
          type:
          - integer
          - 'null'
      - name: market_id
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: side
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/OrderSide'
          - type: 'null'
      - name: start_ts
        in: query
        required: false
        schema:
          format: int64
          type:
          - integer
          - 'null'
        description: Unix seconds (inclusive)
      - name: user_address
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
        description: '`None` = caller''s own trades (auth required on both venues). `Some(addr)` = public lookup for `addr`
          (Polymarket only; Kalshi returns `NotSupported`).'
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserTradesPage'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/tags/fetch_market_tags:
    get:
      tags:
      - Tags
      summary: Fetch market tags
      description: Fetch the tag set associated with a market (or its parent event).
      operationId: fetch_market_tags
      parameters:
      - name: market_id
        in: query
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tag'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/orders/cancel_all_orders:
    post:
      tags:
      - Orders
      summary: Cancel all orders
      description: Cancel all of the caller's open orders, optionally scoped to a market.
      operationId: cancel_all_orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                market_id:
                  type:
                  - string
                  - 'null'
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
  /v1/orders/create_orders_batch:
    post:
      tags:
      - Orders
      summary: Create orders batch
      description: "Submit multiple orders in one round-trip \u2014 each order's `side` is `buy`/`sell` and `order_type` is\
        \ `gtc`, `ioc`, or `fok` (cap: 15 on Polymarket; token-budget on Kalshi)."
      operationId: create_orders_batch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                orders:
                  type: array
                  items:
                    $ref: '#/components/schemas/NewOrder'
              required:
              - orders
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        default:
          description: Unified error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPxError'
components:
  schemas:
    ActivityFill:
      properties:
        asset_id:
          type: string
        exchange_ts_ms:
          description: Exchange-authoritative timestamp (millis since epoch).
          format: uint64
          minimum: 0.0
          type:
          - integer
          - 'null'
        fee:
          description: Fee charged for this fill, when the exchange publishes one.
          format: double
          type:
          - number
          - 'null'
        fill_id:
          type:
          - string
          - 'null'
        liquidity_role:
          anyOf:
          - $ref: '#/components/schemas/LiquidityRole'
          - type: 'null'
        market_id:
          type: string
        order_id:
          type:
          - string
          - 'null'
        outcome:
          type:
          - string
          - 'null'
        price:
          format: double
          type: number
        side:
          type:
          - string
          - 'null'
        size:
          format: double
          type: number
        source_channel:
          type: string
        tx_hash:
          description: On-chain transaction hash, when the exchange publishes one.
          type:
          - string
          - 'null'
      required:
      - asset_id
      - market_id
      - price
      - size
      - source_channel
      title: ActivityFill
      type: object
    ActivityTrade:
      description: "Activity events still carried inside `WsUpdate::Trade` / `WsUpdate::Fill`. Retained as a typed payload\
        \ alongside the stream rather than as a separate per-token surface.\n\n`exchange_ts_ms` is exchange-authoritative\
        \ millis since epoch \u2014 uniform with `WsUpdate::{Snapshot, Delta}::exchange_ts`, so every timestamp on the WS\
        \ surface is the same type (`u64` millis). `chrono::DateTime` was more expressive but cost a representation mismatch\
        \ at every FFI boundary."
      properties:
        aggressor_side:
          type:
          - string
          - 'null'
        asset_id:
          type: string
        exchange_ts_ms:
          description: Exchange-authoritative timestamp (millis since epoch).
          format: uint64
          minimum: 0.0
          type:
          - integer
          - 'null'
        fee_rate_bps:
          description: Fee rate in basis points (e.g. 0 = no fee, 200 = 2%). Polymarket `last_trade_price` events populate
            this.
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        market_id:
          type: string
        outcome:
          type:
          - string
          - 'null'
        price:
          format: double
          type: number
        side:
          type:
          - string
          - 'null'
        size:
          format: double
          type: number
        source_channel:
          type: string
        trade_id:
          type:
          - string
          - 'null'
      required:
      - asset_id
      - market_id
      - price
      - size
      - source_channel
      title: ActivityTrade
      type: object
    Candlestick:
      description: OHLCV candlestick, normalized across all exchanges. Prices are decimals (0.0 to 1.0). Timestamp is the
        period START (not end). Serialized over the wire as RFC3339 (DateTime<Utc>) for API consistency.
      properties:
        close:
          format: double
          type: number
        high:
          format: double
          type: number
        low:
          format: double
          type: number
        open:
          format: double
          type: number
        open_interest:
          description: Open interest at this candle's close. Only available from exchanges that report it (e.g., Kalshi).
          format: double
          type:
          - number
          - 'null'
        timestamp:
          description: Period start timestamp (UTC). lightweight-charts expects start-of-period.
          format: date-time
          type: string
        volume:
          description: Trade volume in contracts. 0.0 if exchange doesn't provide volume.
          format: double
          type: number
      required:
      - close
      - high
      - low
      - open
      - timestamp
      - volume
      title: Candlestick
      type: object
    CryptoPrice:
      properties:
        source:
          $ref: '#/components/schemas/CryptoPriceSource'
        symbol:
          type: string
        timestamp:
          format: uint64
          minimum: 0.0
          type: integer
        value:
          format: double
          type: number
      required:
      - source
      - symbol
      - timestamp
      - value
      title: CryptoPrice
      type: object
    CryptoPriceSource:
      enum:
      - binance
      - chainlink
      title: CryptoPriceSource
      type: string
    Event:
      description: A grouping of related markets. On Kalshi, an Event is a single resolution (e.g. "Will Candidate X win State
        Y?") with one or more contracts. On Polymarket, an Event is the parent of one or more Markets sharing a common theme
        (e.g. "2028 US Presidential Election" with markets per candidate).
      properties:
        category:
          type:
          - string
          - 'null'
        description:
          type:
          - string
          - 'null'
        end_ts:
          format: date-time
          type:
          - string
          - 'null'
        id:
          type: string
        last_updated_ts:
          format: date-time
          type:
          - string
          - 'null'
        market_ids:
          default: []
          items:
            type: string
          type: array
        mutually_exclusive:
          type:
          - boolean
          - 'null'
        open_interest:
          format: double
          type:
          - number
          - 'null'
        series_id:
          type:
          - string
          - 'null'
        slug:
          type:
          - string
          - 'null'
        start_ts:
          format: date-time
          type:
          - string
          - 'null'
        status:
          type:
          - string
          - 'null'
        title:
          type: string
        volume:
          format: double
          type:
          - number
          - 'null'
      required:
      - id
      - title
      title: Event
      type: object
    EventsRequest:
      description: Request for fetching events.
      properties:
        cursor:
          type:
          - string
          - 'null'
        limit:
          format: uint
          minimum: 0.0
          type:
          - integer
          - 'null'
        min_close_ts:
          description: "Unix seconds \u2014 only events closing at or after this timestamp."
          format: int64
          type:
          - integer
          - 'null'
        min_updated_ts:
          description: "Unix seconds \u2014 only events updated at or after this timestamp."
          format: int64
          type:
          - integer
          - 'null'
        series_id:
          description: Filter by series ID / ticker.
          type:
          - string
          - 'null'
        status:
          description: "Filter by lifecycle status \u2014 venue-specific values (e.g. `open`, `closed`, `settled` on Kalshi;\
            \ `closed=true/false` on Polymarket)."
          type:
          - string
          - 'null'
        with_nested_markets:
          description: Include the events' nested `Market` objects when supported.
          type:
          - boolean
          - 'null'
      title: EventsRequest
      type: object
    ExchangeInfo:
      properties:
        has_approvals:
          type: boolean
        has_cancel_all_orders:
          type: boolean
        has_cancel_order:
          type: boolean
        has_create_order:
          type: boolean
        has_create_orders_batch:
          type: boolean
        has_fetch_balance:
          type: boolean
        has_fetch_event:
          type: boolean
        has_fetch_events:
          type: boolean
        has_fetch_fills:
          type: boolean
        has_fetch_last_trade_price:
          type: boolean
        has_fetch_market_tags:
          type: boolean
        has_fetch_markets:
          type: boolean
        has_fetch_midpoint:
          type: boolean
        has_fetch_midpoints_batch:
          type: boolean
        has_fetch_open_interest:
          type: boolean
        has_fetch_orderbook:
          type: boolean
        has_fetch_orderbook_history:
          type: boolean
        has_fetch_orderbooks_batch:
          type: boolean
        has_fetch_positions:
          type: boolean
        has_fetch_price_history:
          type: boolean
        has_fetch_series:
          type: boolean
        has_fetch_series_one:
          type: boolean
        has_fetch_server_time:
          type: boolean
        has_fetch_spread:
          type: boolean
        has_fetch_trades:
          type: boolean
        has_fetch_user_activity:
          type: boolean
        has_fetch_user_trades:
          type: boolean
        has_refresh_balance:
          type: boolean
        has_websocket:
          type: boolean
        id:
          type: string
        name:
          type: string
      required:
      - has_approvals
      - has_cancel_all_orders
      - has_cancel_order
      - has_create_order
      - has_create_orders_batch
      - has_fetch_balance
      - has_fetch_event
      - has_fetch_events
      - has_fetch_fills
      - has_fetch_last_trade_price
      - has_fetch_market_tags
      - has_fetch_markets
      - has_fetch_midpoint
      - has_fetch_midpoints_batch
      - has_fetch_open_interest
      - has_fetch_orderbook
      - has_fetch_orderbook_history
      - has_fetch_orderbooks_batch
      - has_fetch_positions
      - has_fetch_price_history
      - has_fetch_series
      - has_fetch_series_one
      - has_fetch_server_time
      - has_fetch_spread
      - has_fetch_trades
      - has_fetch_user_activity
      - has_fetch_user_trades
      - has_refresh_balance
      - has_websocket
      - id
      - name
      title: ExchangeInfo
      type: object
    FetchMarketsParams:
      properties:
        cursor:
          default: null
          description: Exchange-specific cursor (offset, page number, or cursor string)
          type:
          - string
          - 'null'
        event_ticker:
          default: null
          description: Fetch all markets within a specific event. Pass a Kalshi event ticker (e.g., `"KXBTC-25MAR14"`) or
            a Polymarket event ID or slug (e.g., `"903"` or `"will-trump-win-2024"`) to get its child markets. When set, `series_id`,
            `cursor`, and `limit` are ignored (not paginated). `status` filtering is still applied client-side.
          type:
          - string
          - 'null'
        limit:
          description: 'Per-page limit. Each exchange applies its own server-side cap: Kalshi tops out at 1000, Polymarket
            at ~500. Values above the cap are silently clamped to the cap.'
          format: uint
          minimum: 0.0
          type:
          - integer
          - 'null'
        series_id:
          default: null
          description: "Filter by series (Kalshi and Polymarket). Both exchanges organize markets as Series \u2192 Events\
            \ \u2192 Markets. Pass a Kalshi series ticker (e.g., `\"KXBTC\"`) or a Polymarket series ID (e.g., `\"10345\"\
            `) to fetch only markets in that series."
          type:
          - string
          - 'null'
        status:
          anyOf:
          - $ref: '#/components/schemas/MarketStatusFilter'
          - type: 'null'
          default: null
          description: Filter by market status. Defaults to Active at the exchange level when None. Use `MarketStatusFilter::All`
            to fetch markets of any status.
      title: FetchMarketsParams
      type: object
    FetchOrdersParams:
      properties:
        market_id:
          type:
          - string
          - 'null'
      title: FetchOrdersParams
      type: object
    FetchUserActivityParams:
      properties:
        address:
          type: string
        limit:
          format: uint
          minimum: 0.0
          type:
          - integer
          - 'null'
      required:
      - address
      title: FetchUserActivityParams
      type: object
    Fill:
      description: A single fill (trade execution) from a user's order.
      properties:
        created_at:
          format: date-time
          type: string
        fee:
          format: double
          type: number
        fill_id:
          type: string
        is_taker:
          type: boolean
        market_id:
          type: string
        order_id:
          type: string
        outcome:
          type: string
        price:
          format: double
          type: number
        side:
          $ref: '#/components/schemas/OrderSide'
        size:
          format: double
          type: number
      required:
      - created_at
      - fee
      - fill_id
      - is_taker
      - market_id
      - order_id
      - outcome
      - price
      - side
      - size
      title: Fill
      type: object
    InvalidationReason:
      description: "Why a specific book was invalidated \u2014 handed to users so they can decide whether to alert, log, or\
        \ handle it silently."
      oneOf:
      - enum:
        - Reconnect
        - Lag
        - ExchangeReset
        type: string
      - additionalProperties: false
        properties:
          SequenceGap:
            properties:
              expected:
                format: uint64
                minimum: 0.0
                type: integer
              received:
                format: uint64
                minimum: 0.0
                type: integer
            required:
            - expected
            - received
            type: object
        required:
        - SequenceGap
        type: object
    LastTrade:
      description: "Last public trade price + side + size for a market outcome. Distinct from the full `MarketTrade` tape:\
        \ this is just \"what just printed?\" \u2014 common UI need that doesn't require the full trade history."
      properties:
        price:
          format: double
          type: number
        side:
          $ref: '#/components/schemas/OrderSide'
        size:
          format: double
          type: number
        ts_ms:
          format: int64
          type: integer
      required:
      - price
      - side
      - size
      - ts_ms
      title: LastTrade
      type: object
    LiquidityRole:
      enum:
      - maker
      - taker
      type: string
    Market:
      description: "Unified prediction market model.\n\nAll exchanges produce this single type directly \u2014 no intermediate\
        \ conversion.\n\n# Price Format\n\nAll prices are normalized to decimal format (0.0 to 1.0). Exchange-specific conversions\
        \ are handled during parsing:\n\n- **Kalshi**: Fixed-point dollar strings parsed directly (post March 2026 migration).\
        \ - **Polymarket**: Native prices already in decimal (0.0-1.0)."
      properties:
        best_ask:
          description: Best ask price (normalized 0-1)
          format: double
          type:
          - number
          - 'null'
        best_bid:
          description: Best bid price (normalized 0-1)
          format: double
          type:
          - number
          - 'null'
        close_time:
          description: Market close time
          format: date-time
          type:
          - string
          - 'null'
        condition_id:
          description: Polymarket CTF condition id
          type:
          - string
          - 'null'
        created_at:
          description: Market creation time
          format: date-time
          type:
          - string
          - 'null'
        event_ticker:
          description: 'Native event identifier this market belongs to. Kalshi: upstream `event_ticker`. Polymarket: the parent
            event''s `slug`.'
          type:
          - string
          - 'null'
        exchange:
          description: Exchange identifier (kalshi, polymarket)
          type: string
        last_trade_price:
          description: Last trade price (normalized 0-1)
          format: double
          type:
          - number
          - 'null'
        market_type:
          allOf:
          - $ref: '#/components/schemas/MarketType'
          description: Market type classification
        min_order_size:
          description: "Minimum order size (contracts). Kalshi: synthesized \u2014 1.0, or 0.01 when fractional_trading_enabled.\
            \ Polymarket: read directly from `orderMinSize`."
          format: double
          type:
          - number
          - 'null'
        neg_risk:
          description: 'Polymarket: neg-risk flag'
          type:
          - boolean
          - 'null'
        neg_risk_market_id:
          description: 'Polymarket: neg-risk market ID'
          type:
          - string
          - 'null'
        numeric_id:
          description: Polymarket's numeric DB id (e.g. "1031769"). Exposed for callers that need to build UI deep-links or
            cross-reference Polymarket's REST-only numeric surface. Not used for trading or subscription.
          type:
          - string
          - 'null'
        open_time:
          description: Market open time
          format: date-time
          type:
          - string
          - 'null'
        openpx_id:
          description: 'Primary key: {exchange}:{ticker}'
          type: string
        outcomes:
          default: []
          description: Ordered list of outcomes. Each entry carries label, price, and (if exposed) token id. Polymarket categorical
            markets have N entries; Kalshi binary markets always have 2 ("Yes" / "No").
          items:
            $ref: '#/components/schemas/Outcome'
          type: array
        result:
          description: 'Resolution result. Kalshi: enum string from upstream. Polymarket: derived winning-outcome label (the
            `outcomes[i]` whose `outcomePrices[i]` is 1.0 after settlement). None for unresolved markets.'
          type:
          - string
          - 'null'
        rules:
          description: 'Resolution rules. Kalshi: `{rules_primary} | {rules_secondary}`. Polymarket: `description`.'
          type:
          - string
          - 'null'
        settlement_time:
          description: 'Settlement / resolution time. Kalshi: `settlement_ts`. Polymarket: `closedTime` (populated only after
            on-chain settlement).'
          format: date-time
          type:
          - string
          - 'null'
        status:
          allOf:
          - $ref: '#/components/schemas/MarketStatus'
          description: 'Normalized status: Active, Closed, Resolved'
        tick_size:
          description: "Minimum price increment in dollars. Polymarket: `orderPriceMinTickSize` directly. Kalshi: the smallest\
            \ `step` across the tiered `price_ranges` array (the finest precision the market accepts anywhere on its price\
            \ curve \u2014 orders in coarser tiers must still round to that tier's step)."
          format: double
          type:
          - number
          - 'null'
        ticker:
          description: 'Native exchange ticker. Kalshi: `ticker`. Polymarket: `slug`.'
          type: string
        title:
          description: Market title
          type: string
        volume:
          description: Total volume (USD)
          format: double
          type: number
        volume_24h:
          description: 24-hour trading volume (USD)
          format: double
          type:
          - number
          - 'null'
      required:
      - exchange
      - market_type
      - openpx_id
      - status
      - ticker
      - title
      - volume
      title: Market
      type: object
    MarketStatus:
      description: Normalized market status across all exchanges.
      enum:
      - active
      - closed
      - resolved
      title: MarketStatus
      type: string
    MarketStatusFilter:
      description: 'Filter for market status in fetch queries.


        Unlike `MarketStatus` (which represents a market''s actual status), this enum includes an `All` variant for fetching
        markets regardless of status.'
      enum:
      - active
      - closed
      - resolved
      - all
      type: string
    MarketTrade:
      description: 'Normalized public market trade, suitable for "tape" UIs.


        - `price` is normalized to [0.0, 1.0] across all exchanges. - `timestamp` is the exchange-provided trade timestamp
        (UTC).'
      properties:
        aggressor_side:
          type:
          - string
          - 'null'
        id:
          type:
          - string
          - 'null'
        no_price:
          format: double
          type:
          - number
          - 'null'
        outcome:
          type:
          - string
          - 'null'
