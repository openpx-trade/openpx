      - has_fetch_market_lineage
      - has_fetch_markets
      - has_fetch_orderbook
      - has_fetch_orderbooks_batch
      - has_fetch_positions
      - has_fetch_server_time
      - has_fetch_trades
      - has_refresh_balance
      - has_websocket
      - id
      - name
