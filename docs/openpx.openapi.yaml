      - asset_id
      - bid_depth
      - openpx_ts
      title: OrderbookStats
      type: object
    Outcome:
      description: "One outcome of a prediction market \u2014 label, current price, and (where the exchange exposes one) the\
        \ on-chain token id needed to subscribe to its orderbook stream. Replaces the previous trio of `outcome_prices` map\
        \ + `outcome_tokens` vec + binary-only `token_id_yes`/`token_id_no` with a single ordered list keyed by index."
      properties:
        label:
          description: Outcome label (e.g. "Yes", "No", or a categorical option name).
          type: string
        price:
          description: Current outcome price in [0.0, 1.0]. None when not exposed (e.g. Kalshi markets pre-fill, or Polymarket
            categorical markets without a price).
          format: double
          type:
          - number
          - 'null'
        token_id:
          description: CTF token id (Polymarket only). Used to subscribe to per-outcome orderbook streams. None on Kalshi.
          type:
          - string
          - 'null'
      required:
      - label
      type: object
    Position:
      properties:
        average_price:
          format: double
          type: number
        current_price:
          format: double
          type: number
        market_ticker:
          type: string
        outcome:
          type: string
        size:
          format: double
          type: number
      required:
      - average_price
      - current_price
      - market_ticker
      - outcome
      - size
      title: Position
      type: object
    PriceLevel:
      properties:
        price:
          $ref: '#/components/schemas/number'
        size:
          format: double
          type: number
      required:
      - price
      - size
      type: object
    PriceLevelChange:
      description: 'A single price level change. Absolute replacement semantics: size > 0 = set level to this size, size ==
        0 = remove level.'
      properties:
        price:
          $ref: '#/components/schemas/number'
        side:
          $ref: '#/components/schemas/PriceLevelSide'
        size:
          format: double
          type: number
      required:
      - price
      - side
      - size
      type: object
    PriceLevelSide:
      description: Bid or ask side. Serializes as "bid"/"ask" on the wire.
      enum:
      - bid
      - ask
      type: string
    Series:
      description: 'A recurring family of events. Examples: a weekly inflation reading, a monthly nonfarm payrolls release,
        a regular sports season. On Kalshi, a Series is identified by `series_ticker` (e.g. `KXPRES`). On Polymarket, a Series
        wraps multiple Events with shared metadata.'
      properties:
        category:
          type:
          - string
          - 'null'
        fee_type:
          type:
          - string
          - 'null'
        frequency:
          type:
          - string
          - 'null'
        last_updated_ts:
          format: date-time
          type:
          - string
          - 'null'
        numeric_id:
          description: Polymarket's numeric REST id for the series (e.g. `"10345"`). None on Kalshi (no separate numeric series
            surface).
          type:
          - string
          - 'null'
        settlement_sources:
          default: []
          items:
            $ref: '#/components/schemas/SettlementSource'
          type: array
        tags:
          default: []
          items:
            type: string
          type: array
        ticker:
          description: 'Native series identifier. Kalshi: `ticker` (e.g. `"KXPRES"`). Polymarket: the series''s `ticker` field,
            falling back to `slug` when `ticker` is null upstream.'
          type: string
        title:
          type: string
        volume:
          format: double
          type:
          - number
          - 'null'
      required:
      - ticker
      - title
      type: object
    SessionEvent:
      description: Connection-level events, emitted on a channel separate from `WsUpdate` so a reconnect is observable as
        a single global signal rather than per-market.
      oneOf:
      - description: Initial socket establishment.
        properties:
          kind:
            enum:
            - Connected
            type: string
        required:
        - kind
        type: object
      - description: "Socket re-established after an outage \u2014 `gap_ms` is the wall-clock interval since the last received\
          \ message."
        properties:
          gap_ms:
            format: uint64
            minimum: 0.0
            type: integer
          kind:
            enum:
            - Reconnected
            type: string
        required:
        - gap_ms
        - kind
        type: object
      - description: "Slow consumer dropped messages \u2014 every affected book is invalidated and must be rebuilt from the\
          \ next `Snapshot`."
        properties:
          dropped:
            format: uint64
            minimum: 0.0
            type: integer
          first_seq:
            format: uint64
            minimum: 0.0
            type: integer
          kind:
            enum:
            - Lagged
            type: string
          last_seq:
            format: uint64
            minimum: 0.0
            type: integer
        required:
        - dropped
        - first_seq
        - kind
        - last_seq
        type: object
      - description: "A specific market's book is no longer trustworthy \u2014 drop cache and wait for next `Snapshot` (reasons:\
          \ `Reconnect`, `Lag`, `SequenceGap`, `ExchangeReset`)."
        properties:
          kind:
            enum:
            - BookInvalidated
            type: string
          market_id:
            type: string
          reason:
            $ref: '#/components/schemas/InvalidationReason'
        required:
        - kind
        - market_id
        - reason
        type: object
      - description: A non-fatal error observed on the connection (session continues).
        properties:
          kind:
            enum:
            - Error
            type: string
          message:
            type: string
        required:
        - kind
        - message
        type: object
      title: SessionEvent
    SettlementSource:
      properties:
        name:
          type:
          - string
          - 'null'
        url:
          type:
          - string
          - 'null'
      type: object
    SportResult:
      description: Real-time sports score/state from the Polymarket Sports WebSocket. Serializes as snake_case for end-users;
        aliases accept the upstream camelCase.
      properties:
        away_team:
          type: string
        elapsed:
          type:
          - string
          - 'null'
        ended:
          type: boolean
        finished_timestamp:
          format: date-time
          type:
          - string
          - 'null'
        game_id:
          format: uint64
          minimum: 0.0
          type: integer
        home_team:
          type: string
        league_abbreviation:
          type: string
        live:
          type: boolean
        period:
          type:
          - string
          - 'null'
        score:
          type:
          - string
          - 'null'
        slug:
          type: string
        status:
          type: string
        turn:
          type:
          - string
          - 'null'
      required:
      - away_team
      - ended
      - game_id
      - home_team
      - league_abbreviation
      - live
      - slug
      - status
      title: SportResult
      type: object
    TradesRequest:
      description: "Request for fetching recent public trades (\"tape\") for a market.\n\n`asset_id` is the market identifier\
        \ \u2014 Kalshi market ticker or Polymarket Gamma slug. Both Yes and No outcomes' trades are returned interleaved;\
        \ use `MarketTrade.outcome` to distinguish."
      properties:
        asset_id:
          type: string
        cursor:
          description: Opaque cursor from a prior response.
          type:
          - string
          - 'null'
        end_ts:
          description: Unix seconds (inclusive upper bound).
          format: int64
          type:
          - integer
          - 'null'
        limit:
          description: Max trades to return. Capped per exchange (Kalshi 1000, Polymarket 500).
          format: uint
          minimum: 0.0
          type:
          - integer
          - 'null'
        start_ts:
          description: Unix seconds (inclusive lower bound).
          format: int64
          type:
          - integer
          - 'null'
      required:
      - asset_id
      title: TradesRequest
      type: object
    WsUpdate:
      description: "Every per-market event the WebSocket surface emits. Closed tagged union; no untyped escape hatch in the\
        \ stable enum. If an exchange grows a payload we want to surface in raw form, add a separate `raw_events()` stream\
        \ rather than another `WsUpdate` variant \u2014 keeps consumer `match` exhaustiveness honest."
      oneOf:
      - description: "Full orderbook snapshot \u2014 replace any cached book for `(market_id, asset_id)`."
        properties:
          asset_id:
            type: string
          book:
            $ref: '#/components/schemas/Orderbook'
          exchange_ts:
            format: uint64
            minimum: 0.0
            type:
            - integer
            - 'null'
          kind:
            enum:
            - Snapshot
            type: string
          local_ts_ms:
            format: uint64
            minimum: 0.0
            type: integer
          market_id:
            type: string
          seq:
            format: uint64
            minimum: 0.0
            type: integer
        required:
        - asset_id
        - book
        - kind
        - local_ts_ms
        - market_id
        - seq
        type: object
      - description: "Incremental change to an existing book \u2014 apply in-place."
        properties:
          asset_id:
            type: string
          changes:
            items:
              $ref: '#/components/schemas/PriceLevelChange'
            type: array
          exchange_ts:
            format: uint64
            minimum: 0.0
            type:
            - integer
            - 'null'
          kind:
            enum:
            - Delta
            type: string
          local_ts_ms:
            format: uint64
            minimum: 0.0
            type: integer
          market_id:
            type: string
          seq:
            format: uint64
            minimum: 0.0
            type: integer
        required:
        - asset_id
        - changes
        - kind
        - local_ts_ms
        - market_id
        - seq
        type: object
      - description: "Book invalidation \u2014 drop the cached book and wait for the next `Snapshot`."
        properties:
          asset_id:
            type: string
          kind:
            enum:
            - Clear
            type: string
          local_ts_ms:
            format: uint64
            minimum: 0.0
            type: integer
          market_id:
            type: string
          reason:
            $ref: '#/components/schemas/InvalidationReason'
          seq:
            format: uint64
            minimum: 0.0
            type: integer
        required:
        - asset_id
        - kind
        - local_ts_ms
        - market_id
        - reason
        - seq
        type: object
      - description: A public trade (any counterparty), not tied to a local order.
        properties:
          kind:
            enum:
            - Trade
            type: string
          local_ts_ms:
            format: uint64
            minimum: 0.0
            type: integer
          trade:
            $ref: '#/components/schemas/ActivityTrade'
        required:
        - kind
        - local_ts_ms
        - trade
        type: object
      - description: A fill on one of the authenticated user's orders.
        properties:
          fill:
            $ref: '#/components/schemas/ActivityFill'
          kind:
            enum:
            - Fill
            type: string
          local_ts_ms:
            format: uint64
            minimum: 0.0
            type: integer
        required:
        - fill
        - kind
        - local_ts_ms
        type: object
      title: WsUpdate
    number:
      format: double
      type: number
    OpenPxError:
      type: object
      description: Unified error type returned when an exchange call fails. The `kind` field is the canonical category; `message`
        carries the upstream explanation. Per-exchange variants are mapped into this shape before they cross the trait boundary.
      required:
      - kind
      - message
      properties:
        kind:
          type: string
          enum:
          - Authentication
          - InsufficientFunds
          - MarketNotFound
          - OrderNotFound
          - RateLimited
          - NetworkError
          - Api
          - Config
          - NotSupported
        message:
          type: string
    MarketsPage:
      type: object
      description: One page of `Market` results. `cursor` is `null` on the last page; otherwise pass it back in the next request
        to continue.
      required:
      - markets
      properties:
        markets:
          type: array
          items:
            $ref: '#/components/schemas/Market'
        cursor:
          type:
          - string
          - 'null'
    MarketTradesPage:
      type: object
      description: One page of `MarketTrade` results. `cursor` is `null` on the last page; otherwise pass it back in the next
        request to continue.
      required:
      - trades
      properties:
        trades:
          type: array
          items:
            $ref: '#/components/schemas/MarketTrade'
        cursor:
          type:
          - string
          - 'null'
