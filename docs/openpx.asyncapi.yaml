          allOf:
          - $ref: '#/components/schemas/MarketType'
          description: 'Outcome shape. Options: `binary`, `categorical`, `scalar`.'
        min_order_size:
          description: Minimum order size in contracts (e.g. `1.0`).
          format: double
          type:
          - number
          - 'null'
        neg_risk:
          description: Polymarket neg-risk flag; `null` on Kalshi.
          type:
          - boolean
          - 'null'
        neg_risk_market_id:
          description: Polymarket neg-risk market id; `null` on Kalshi.
          type:
          - string
          - 'null'
        numeric_id:
          description: Polymarket numeric DB id used for REST deep-links (e.g. `"1031769"`); `null` on Kalshi.
          type:
          - string
          - 'null'
        open_time:
          description: Market open time in UTC.
          format: date-time
          type:
          - string
          - 'null'
        openpx_id:
          description: OpenPX primary key in `<exchange>:<ticker>` form (e.g. `"kalshi:KXBTCD-25APR1517"`).
          type: string
        outcomes:
          default: []
          description: Ordered outcomes; binary markets have two (`"Yes"`, `"No"`), categorical have N.
          items:
