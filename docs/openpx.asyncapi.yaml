      type: object
    LiquidityRole:
      description: Whether a fill provided liquidity (`maker`) or took it (`taker`).
      enum:
      - maker
      - taker
      type: string
    Market:
      description: A prediction market on the unified surface. Prices are YES probabilities in `[0, 1]`.
      properties:
        best_ask:
          description: Best ask as YES probability in `[0, 1]` (e.g. `0.63`).
          format: double
          type:
          - number
          - 'null'
        best_bid:
          description: Best bid as YES probability in `[0, 1]` (e.g. `0.61`).
          format: double
          type:
          - number
          - 'null'
        close_time:
          description: Market close time in UTC (e.g. `"2026-04-25T20:00:00Z"`).
