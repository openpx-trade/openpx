        tick_size:
          description: Minimum price increment in dollars (e.g. `0.01`).
          format: double
          type:
          - number
          - 'null'
        ticker:
          description: "Native ticker \u2014 Kalshi market ticker or Polymarket slug (e.g. `\"KXBTCD-25APR1517\"`)."
