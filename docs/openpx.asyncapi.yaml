        rules:
          description: Resolution rules in plain text; `null` when upstream omits them.
          type:
          - string
          - 'null'
        settlement_time:
          description: Settlement time in UTC; `null` until the market resolves on-chain.
          format: date-time
          type:
          - string
          - 'null'
        status:
          allOf:
          - $ref: '#/components/schemas/MarketStatus'
