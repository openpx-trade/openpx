components:
  schemas:
    ActivityFill:
      properties:
        asset_id:
          type: string
        exchange_ts_ms:
          description: Exchange-authoritative timestamp (millis since epoch).
          format: uint64
          minimum: 0.0
          type:
          - integer
          - 'null'
        fee:
          description: Fee charged for this fill, when the exchange publishes one.
          format: double
          type:
          - number
          - 'null'
        fill_id:
          type:
          - string
          - 'null'
        liquidity_role:
          anyOf:
          - $ref: '#/components/schemas/LiquidityRole'
          - type: 'null'
        market_id:
          type: string
        order_id:
          type:
          - string
          - 'null'
        outcome:
          type:
          - string
          - 'null'
        price:
          format: double
          type: number
        side:
          type:
          - string
          - 'null'
        size:
          format: double
          type: number
        source_channel:
          type: string
        tx_hash:
          description: On-chain transaction hash, when the exchange publishes one.
          type:
          - string
          - 'null'
      required:
      - asset_id
      - market_id
      - price
      - size
      - source_channel
      title: ActivityFill
      type: object
    ActivityTrade:
      description: "Activity events still carried inside `WsUpdate::Trade` / `WsUpdate::Fill`. Retained as a typed payload\
        \ alongside the stream rather than as a separate per-token surface.\n\n`exchange_ts_ms` is exchange-authoritative\
        \ millis since epoch \u2014 uniform with `WsUpdate::{Snapshot, Delta}::exchange_ts`, so every timestamp on the WS\
        \ surface is the same type (`u64` millis). `chrono::DateTime` was more expressive but cost a representation mismatch\
        \ at every FFI boundary."
      properties:
        aggressor_side:
          type:
          - string
          - 'null'
        asset_id:
          type: string
        exchange_ts_ms:
          description: Exchange-authoritative timestamp (millis since epoch).
          format: uint64
          minimum: 0.0
          type:
          - integer
          - 'null'
        fee_rate_bps:
          description: Fee rate in basis points (e.g. 0 = no fee, 200 = 2%). Polymarket `last_trade_price` events populate
            this.
          format: uint32
          minimum: 0.0
          type:
          - integer
          - 'null'
        market_id:
          type: string
        outcome:
          type:
          - string
          - 'null'
        price:
          format: double
          type: number
        side:
          type:
          - string
          - 'null'
        size:
          format: double
          type: number
        source_channel:
          type: string
        trade_id:
          type:
          - string
          - 'null'
      required:
      - asset_id
      - market_id
      - price
      - size
      - source_channel
      title: ActivityTrade
      type: object
    CreateOrderRequest:
      description: "Lean input shape for `Exchange::create_order`. All cross-venue and per-venue knobs are deliberately absent\
        \ \u2014 `post_only`, `expiration_ts`, `client_order_id`, `reduce_only`, `neg_risk`, builder/metadata, and subaccounts\
        \ are not exposed. Anything an exchange requires that is not modelled here is generated internally (e.g. Kalshi V2's\
        \ required `client_order_id` is filled with a per-call UUID)."
      properties:
        market_ticker:
          description: "Unified market identifier \u2014 Kalshi market ticker or Polymarket slug."
          type: string
        order_type:
          allOf:
          - $ref: '#/components/schemas/OrderType'
          default: gtc
          description: Time-in-force / execution type.
        outcome:
          allOf:
          - $ref: '#/components/schemas/OrderOutcome'
          description: Which outcome of the market to trade.
        price:
          description: Limit price as YES probability in `(0.0, 1.0)`.
          format: double
          type: number
        side:
          allOf:
          - $ref: '#/components/schemas/OrderSide'
          description: Buy or sell.
        size:
          description: Order size in contracts.
          format: double
          type: number
      required:
      - market_ticker
      - outcome
      - price
      - side
      - size
      title: CreateOrderRequest
      type: object
    CryptoPrice:
      properties:
        source:
          $ref: '#/components/schemas/CryptoPriceSource'
        symbol:
          type: string
        timestamp:
          format: uint64
          minimum: 0.0
          type: integer
        value:
          format: double
          type: number
      required:
      - source
      - symbol
      - timestamp
      - value
      title: CryptoPrice
      type: object
    CryptoPriceSource:
      enum:
      - binance
      - chainlink
      title: CryptoPriceSource
      type: string
    DepthBuckets:
      properties:
        ask_within_100bps:
          format: double
          type: number
        ask_within_10bps:
          format: double
          type: number
        ask_within_50bps:
          format: double
          type: number
        bid_within_100bps:
          format: double
          type: number
        bid_within_10bps:
          format: double
          type: number
        bid_within_50bps:
          format: double
          type: number
      required:
      - ask_within_100bps
      - ask_within_10bps
      - ask_within_50bps
      - bid_within_100bps
      - bid_within_10bps
      - bid_within_50bps
      title: DepthBuckets
      type: object
    Event:
      description: A grouping of related markets. On Kalshi, an Event is a single resolution (e.g. "Will Candidate X win State
        Y?") with one or more contracts. On Polymarket, an Event is the parent of one or more Markets sharing a common theme
        (e.g. "2028 US Presidential Election" with markets per candidate).
      properties:
        category:
          type:
          - string
          - 'null'
        description:
          type:
          - string
          - 'null'
        end_ts:
          format: date-time
          type:
          - string
          - 'null'
        last_updated_ts:
          format: date-time
          type:
          - string
          - 'null'
        market_tickers:
          default: []
          description: "Sibling market market_tickers under this event \u2014 unified `Market.ticker` values (Kalshi market\
            \ market_tickers; Polymarket slugs)."
          items:
            type: string
          type: array
        mutually_exclusive:
          type:
          - boolean
          - 'null'
        numeric_id:
          description: Polymarket's numeric REST id for the event (e.g. `"12585"`). None on Kalshi (no separate numeric event
            surface).
          type:
          - string
          - 'null'
        open_interest:
          format: double
          type:
          - number
          - 'null'
        series_ticker:
          description: 'Parent series ticker. Kalshi: upstream `series_ticker`. Polymarket: the embedded series''s `ticker`
            (or `slug` if `ticker` is null).'
          type:
          - string
          - 'null'
        start_ts:
          format: date-time
          type:
          - string
          - 'null'
        status:
          type:
          - string
          - 'null'
        ticker:
          description: 'Native event identifier. Kalshi: `event_ticker` (e.g. `"KXPRES-2028"`). Polymarket: the event slug
            (e.g. `"presidential-election-winner-2024"`).'
          type: string
        title:
          type: string
        volume:
          format: double
          type:
          - number
          - 'null'
      required:
      - ticker
      - title
      type: object
    ExchangeInfo:
      properties:
        has_approvals:
          type: boolean
        has_cancel_all_orders:
          type: boolean
        has_cancel_order:
          type: boolean
        has_create_order:
          type: boolean
        has_create_orders_batch:
          type: boolean
        has_fetch_balance:
          type: boolean
        has_fetch_fills:
          type: boolean
        has_fetch_market_lineage:
          type: boolean
        has_fetch_markets:
          type: boolean
        has_fetch_orderbook:
          type: boolean
        has_fetch_orderbooks_batch:
          type: boolean
        has_fetch_positions:
          type: boolean
        has_fetch_server_time:
          type: boolean
        has_fetch_trades:
          type: boolean
        has_refresh_balance:
          type: boolean
        has_websocket:
          type: boolean
        id:
          type: string
        name:
          type: string
      required:
      - has_approvals
      - has_cancel_all_orders
      - has_cancel_order
      - has_create_order
      - has_create_orders_batch
      - has_fetch_balance
      - has_fetch_fills
      - has_fetch_market_lineage
      - has_fetch_markets
      - has_fetch_orderbook
      - has_fetch_orderbooks_batch
      - has_fetch_positions
      - has_fetch_server_time
      - has_fetch_trades
      - has_refresh_balance
      - has_websocket
      - id
      - name
      title: ExchangeInfo
      type: object
    FetchMarketsParams:
      properties:
        cursor:
          default: null
          description: Exchange-specific cursor (offset, page number, or cursor string)
          type:
          - string
          - 'null'
        event_ticker:
          default: null
          description: "Fetch all markets within a specific event. Pass a Kalshi event ticker (e.g., `\"KXBTC-25MAR14\"`)\
            \ or a Polymarket event slug (e.g., `\"will-trump-win-2024\"`). Polymarket numeric event IDs are not accepted\
            \ \u2014 they will be supported via a future `event_numeric_id` field. When set, `cursor` and `limit` are ignored\
            \ (not paginated). `status` filtering is still applied client-side."
          type:
          - string
          - 'null'
        limit:
          description: 'Per-page limit. Each exchange applies its own server-side cap: Kalshi tops out at 1000, Polymarket
            at ~500. Values above the cap are silently clamped to the cap.'
          format: uint
          minimum: 0.0
          type:
          - integer
          - 'null'
        market_tickers:
          default: []
          description: Fetch a specific set of markets by their unified ticker. Each entry is a Kalshi market ticker (e.g.,
            `"KXBTCD-25APR1517"`) or a Polymarket market slug (e.g., `"will-trump-win-2024"`). When non-empty, `cursor`, `event_ticker`,
            and `series_ticker` are ignored.
          items:
            type: string
          type: array
        series_ticker:
          default: null
          description: "Filter by series ticker. Pass a Kalshi series ticker (e.g., `\"KXBTC\"`) to fetch only markets in\
            \ that series. Polymarket support arrives once `series_numeric_id` is added to this struct \u2014 until then,\
            \ this field is ignored on Polymarket."
          type:
          - string
          - 'null'
        status:
          anyOf:
          - $ref: '#/components/schemas/MarketStatusFilter'
          - type: 'null'
          default: null
          description: Filter by market status. Defaults to Active at the exchange level when None. Use `MarketStatusFilter::All`
            to fetch markets of any status.
      title: FetchMarketsParams
      type: object
    FetchOrdersParams:
      properties:
        market_ticker:
          type:
          - string
          - 'null'
      title: FetchOrdersParams
      type: object
    Fill:
      description: A fill on one of the authenticated user's orders.
      properties:
        fill:
          $ref: '#/components/schemas/ActivityFill'
        kind:
          enum:
          - Fill
          type: string
        local_ts_ms:
          format: uint64
          minimum: 0.0
          type: integer
      required:
      - fill
      - kind
      - local_ts_ms
      type: object
    InvalidationReason:
      description: "Why a specific book was invalidated \u2014 handed to users so they can decide whether to alert, log, or\
        \ handle it silently."
      oneOf:
      - enum:
        - Reconnect
        - Lag
        - ExchangeReset
        type: string
      - additionalProperties: false
        properties:
          SequenceGap:
            properties:
              expected:
                format: uint64
                minimum: 0.0
                type: integer
              received:
                format: uint64
                minimum: 0.0
                type: integer
            required:
            - expected
            - received
            type: object
        required:
        - SequenceGap
        type: object
    LevelCount:
      properties:
        asks:
          format: uint32
          minimum: 0.0
          type: integer
        bids:
          format: uint32
          minimum: 0.0
          type: integer
      required:
      - asks
      - bids
      title: LevelCount
      type: object
    LiquidityRole:
      enum:
      - maker
      - taker
      type: string
    Market:
      description: "Unified prediction market model.\n\nAll exchanges produce this single type directly \u2014 no intermediate\
        \ conversion.\n\n# Price Format\n\nAll prices are normalized to decimal format (0.0 to 1.0). Exchange-specific conversions\
        \ are handled during parsing:\n\n- **Kalshi**: Fixed-point dollar strings parsed directly (post March 2026 migration).\
        \ - **Polymarket**: Native prices already in decimal (0.0-1.0)."
      properties:
        best_ask:
          description: Best ask price (normalized 0-1)
          format: double
          type:
          - number
          - 'null'
        best_bid:
          description: Best bid price (normalized 0-1)
          format: double
          type:
          - number
          - 'null'
        close_time:
          description: Market close time
          format: date-time
          type:
          - string
          - 'null'
        condition_id:
          description: Polymarket CTF condition id
          type:
          - string
          - 'null'
        created_at:
          description: Market creation time
          format: date-time
          type:
          - string
          - 'null'
        event_ticker:
          description: 'Native event identifier this market belongs to. Kalshi: upstream `event_ticker`. Polymarket: the parent
            event''s `slug`.'
          type:
          - string
          - 'null'
        exchange:
          description: Exchange identifier (kalshi, polymarket)
          type: string
        last_trade_price:
          description: Last trade price (normalized 0-1)
          format: double
          type:
          - number
          - 'null'
        market_type:
          allOf:
          - $ref: '#/components/schemas/MarketType'
          description: Market type classification
        min_order_size:
          description: "Minimum order size (contracts). Kalshi: synthesized \u2014 1.0, or 0.01 when fractional_trading_enabled.\
            \ Polymarket: read directly from `orderMinSize`."
          format: double
          type:
          - number
          - 'null'
        neg_risk:
          description: 'Polymarket: neg-risk flag'
          type:
          - boolean
          - 'null'
        neg_risk_market_id:
          description: 'Polymarket: neg-risk market ID'
          type:
          - string
          - 'null'
        numeric_id:
          description: Polymarket's numeric DB id (e.g. "1031769"). Exposed for callers that need to build UI deep-links or
            cross-reference Polymarket's REST-only numeric surface. Not used for trading or subscription.
          type:
          - string
          - 'null'
        open_time:
          description: Market open time
          format: date-time
          type:
          - string
          - 'null'
        openpx_id:
          description: 'Primary key: {exchange}:{ticker}'
          type: string
        outcomes:
          default: []
          description: Ordered list of outcomes. Each entry carries label, price, and (if exposed) token id. Polymarket categorical
            markets have N entries; Kalshi binary markets always have 2 ("Yes" / "No").
          items:
            $ref: '#/components/schemas/Outcome'
          type: array
        result:
          description: 'Resolution result. Kalshi: enum string from upstream. Polymarket: derived winning-outcome label (the
            `outcomes[i]` whose `outcomePrices[i]` is 1.0 after settlement). None for unresolved markets.'
          type:
          - string
          - 'null'
        rules:
          description: 'Resolution rules. Kalshi: `{rules_primary} | {rules_secondary}`. Polymarket: `description`.'
          type:
          - string
          - 'null'
        settlement_time:
          description: 'Settlement / resolution time. Kalshi: `settlement_ts`. Polymarket: `closedTime` (populated only after
            on-chain settlement).'
          format: date-time
          type:
          - string
          - 'null'
        status:
          allOf:
          - $ref: '#/components/schemas/MarketStatus'
          description: 'Normalized status: Active, Closed, Resolved'
        tick_size:
          description: "Minimum price increment in dollars. Polymarket: `orderPriceMinTickSize` directly. Kalshi: the smallest\
            \ `step` across the tiered `price_ranges` array (the finest precision the market accepts anywhere on its price\
            \ curve \u2014 orders in coarser tiers must still round to that tier's step)."
          format: double
          type:
          - number
          - 'null'
        ticker:
          description: 'Native exchange ticker. Kalshi: `ticker`. Polymarket: `slug`.'
          type: string
        title:
          description: Market title
          type: string
        volume:
          description: Total volume (USD)
          format: double
          type: number
        volume_24h:
          description: 24-hour trading volume (USD)
          format: double
          type:
          - number
          - 'null'
      required:
      - exchange
      - market_type
      - openpx_id
      - status
      - ticker
      - title
      - volume
      type: object
    MarketLineage:
      description: "A market plus the parent event and series that contextualize it.\n\n`event` and `series` are `Option`\
        \ because: - some markets have no parent event surface (Kalshi standalone markets); - the upstream lookup for the\
        \ parent may legitimately 404 on a dangling reference. A dangling parent should not fail the whole call \u2014 the\
        \ caller still gets the `Market`."
      properties:
        event:
          anyOf:
          - $ref: '#/components/schemas/Event'
          - type: 'null'
        market:
          $ref: '#/components/schemas/Market'
        series:
          anyOf:
          - $ref: '#/components/schemas/Series'
          - type: 'null'
      required:
      - market
      title: MarketLineage
      type: object
    MarketStatus:
      description: Normalized market status across all exchanges.
      enum:
      - active
      - closed
      - resolved
      type: string
    MarketStatusFilter:
      description: 'Filter for market status in fetch queries.


        Unlike `MarketStatus` (which represents a market''s actual status), this enum includes an `All` variant for fetching
        markets regardless of status.'
      enum:
      - active
      - closed
      - resolved
      - all
      type: string
    MarketTrade:
      description: "Normalized public market trade, suitable for \"tape\" UIs.\n\n- `price` is normalized to [0.0, 1.0]; anchored\
        \ to the Yes side on binary markets \u2014 use `no_price` for the No-side reference. - `aggressor_side` is \"buy\"\
        \ / \"sell\" relative to the Yes side on binary markets \u2014 \"buy\" means upward pressure on Yes, \"sell\" downward.\
        \ - `exchange_ts` is the upstream-provided trade timestamp. - `openpx_ts` is wall-clock when OpenPX served the response."
      properties:
        aggressor_side:
          type:
          - string
          - 'null'
        exchange_ts:
          format: date-time
          type: string
        id:
          type: string
        no_price:
          format: double
          type:
          - number
          - 'null'
        openpx_ts:
          format: date-time
          type: string
        outcome:
          type:
          - string
          - 'null'
        price:
          format: double
          type: number
        size:
          format: double
          type: number
        taker_address:
          type:
          - string
          - 'null'
        yes_price:
          format: double
          type:
          - number
          - 'null'
      required:
      - exchange_ts
      - id
      - openpx_ts
      - price
      - size
      title: MarketTrade
      type: object
    MarketType:
      description: Market type classification.
      enum:
      - binary
      - categorical
      - scalar
      type: string
    MaxGap:
      properties:
        ask_gap_bps:
          format: double
          type:
          - number
          - 'null'
        bid_gap_bps:
          format: double
          type:
          - number
          - 'null'
      title: MaxGap
      type: object
    NewOrder:
      description: 'One order in a `create_orders_batch` call. Each venue caps the batch size (Polymarket: 15; Kalshi: token-budget-dependent).'
      properties:
        client_order_id:
          description: Kalshi-specific idempotency key.
          type:
          - string
          - 'null'
        expiration_ts:
          description: Unix seconds. Required for `OrderType::Gtc` orders that should expire.
          format: int64
          type:
          - integer
          - 'null'
        market_ticker:
          type: string
        order_type:
          $ref: '#/components/schemas/OrderType'
        outcome:
          type: string
        post_only:
          description: 'Polymarket: pin maker-only. Ignored on Kalshi.'
          type:
          - boolean
          - 'null'
        price:
          format: double
          type: number
        reduce_only:
          description: 'Kalshi: only allow size reductions. Maps to `reduce_only=true`.'
          type:
          - boolean
          - 'null'
        side:
          $ref: '#/components/schemas/OrderSide'
        size:
          format: double
          type: number
      required:
      - market_ticker
      - order_type
      - outcome
      - price
      - side
      - size
      title: NewOrder
      type: object
    Order:
      properties:
        created_at:
          format: date-time
          type: string
        fee:
          default: null
          description: Volume-weighted per-contract fee paid for fills resulting from this order, in quote-currency dollars.
            Kalshi reports it on `create_order` when fills occur immediately; Polymarket charges fees at trade settlement,
            so this stays `None` on initial create response.
          format: double
          type:
          - number
          - 'null'
        filled:
          format: double
          type: number
        id:
          type: string
        market_ticker:
          type: string
        outcome:
          type: string
        price:
          format: double
          type: number
        side:
          $ref: '#/components/schemas/OrderSide'
        size:
          format: double
          type: number
        status:
          $ref: '#/components/schemas/OrderStatus'
        updated_at:
          default: null
          format: date-time
          type:
          - string
          - 'null'
      required:
      - created_at
      - filled
      - id
      - market_ticker
      - outcome
      - price
      - side
      - size
      - status
      title: Order
      type: object
    OrderOutcome:
      description: 'Selects which outcome of a market an order targets.


        `Yes` / `No` cover binary markets on both exchanges. The remaining variants only resolve on Polymarket (multi-outcome
        categorical markets); Kalshi markets are always binary, so anything other than `Yes` / `No` is rejected with `InvalidInput`
        at the Kalshi adapter.'
      oneOf:
      - description: Binary YES outcome (Kalshi YES side, Polymarket `outcomes[0]`).
        enum:
        - 'yes'
        type: string
      - description: Binary NO outcome (Kalshi NO side, Polymarket `outcomes[1]`).
        enum:
        - 'no'
        type: string
      - additionalProperties: false
        description: Match a Polymarket outcome by its `label` (case-insensitive).
        properties:
          label:
            type: string
        required:
        - label
        type: object
      - additionalProperties: false
        description: Match a Polymarket outcome by its zero-based ordinal in `Market.outcomes`.
        properties:
          index:
            format: uint
            minimum: 0.0
            type: integer
        required:
        - index
        type: object
      - additionalProperties: false
        description: "Polymarket CTF token id \u2014 bypass label/index lookup."
        properties:
          token_id:
            type: string
        required:
        - token_id
        type: object
      title: OrderOutcome
    OrderSide:
      enum:
      - buy
      - sell
      type: string
    OrderStatus:
      enum:
      - pending
      - open
      - filled
      - partially_filled
      - cancelled
      - rejected
      title: OrderStatus
      type: string
    OrderType:
      description: "Order time-in-force / execution type.\n\nNormalized across all exchanges: - `Gtc` (good-til-cancelled)\
        \ \u2014 rests on the book until filled or cancelled. - `Ioc` (immediate-or-cancel) \u2014 fills what it can immediately,\
        \ cancels the rest. - `Fok` (fill-or-kill) \u2014 must fill entirely in one shot or is cancelled."
      enum:
      - gtc
      - ioc
      - fok
      type: string
    Orderbook:
      properties:
        asks:
          items:
            $ref: '#/components/schemas/PriceLevel'
          type: array
        asset_id:
          type: string
        bids:
          items:
            $ref: '#/components/schemas/PriceLevel'
          type: array
        hash:
          description: 'Exchange-provided hash for verifying book state integrity during replay. Polymarket: present on `book`
            snapshot events.'
          type:
          - string
          - 'null'
        last_update_id:
          format: uint64
          minimum: 0.0
          type:
          - integer
          - 'null'
        timestamp:
          format: date-time
          type:
          - string
          - 'null'
      required:
      - asks
      - asset_id
      - bids
      type: object
    OrderbookImpact:
      properties:
        asset_id:
          type: string
        buy_avg_price:
          format: double
          type:
          - number
          - 'null'
        buy_fill_pct:
          format: double
          type: number
        buy_slippage_bps:
          format: double
          type:
          - number
          - 'null'
        exchange_ts:
          format: date-time
          type:
          - string
          - 'null'
        mid:
          format: double
          type:
          - number
          - 'null'
        openpx_ts:
          format: date-time
          type: string
        sell_avg_price:
          format: double
          type:
          - number
          - 'null'
        sell_fill_pct:
          format: double
          type: number
        sell_slippage_bps:
          format: double
          type:
          - number
          - 'null'
        size:
          format: double
          type: number
      required:
      - asset_id
      - buy_fill_pct
      - openpx_ts
      - sell_fill_pct
      - size
      title: OrderbookImpact
      type: object
    OrderbookMicrostructure:
      properties:
        ask_slope:
          format: double
          type:
          - number
          - 'null'
        asset_id:
          type: string
        bid_slope:
          format: double
          type:
          - number
          - 'null'
        depth_buckets:
          $ref: '#/components/schemas/DepthBuckets'
        exchange_ts:
          format: date-time
          type:
          - string
          - 'null'
        level_count:
          $ref: '#/components/schemas/LevelCount'
        max_gap:
          $ref: '#/components/schemas/MaxGap'
        openpx_ts:
          format: date-time
          type: string
      required:
      - asset_id
      - depth_buckets
      - level_count
      - max_gap
      - openpx_ts
      title: OrderbookMicrostructure
      type: object
    OrderbookStats:
      properties:
        ask_depth:
          format: double
          type: number
        asset_id:
          type: string
        best_ask:
          format: double
          type:
          - number
          - 'null'
        best_bid:
          format: double
          type:
          - number
          - 'null'
        bid_depth:
          format: double
          type: number
        exchange_ts:
          format: date-time
          type:
          - string
          - 'null'
        imbalance:
          format: double
          type:
          - number
          - 'null'
        mid:
          format: double
          type:
          - number
          - 'null'
        openpx_ts:
          format: date-time
          type: string
        spread_bps:
          format: double
          type:
          - number
          - 'null'
        weighted_mid:
          format: double
          type:
          - number
          - 'null'
      required:
      - ask_depth
      - asset_id
      - bid_depth
      - openpx_ts
      title: OrderbookStats
      type: object
    Outcome:
      description: "One outcome of a prediction market \u2014 label, current price, and (where the exchange exposes one) the\
        \ on-chain token id needed to subscribe to its orderbook stream. Replaces the previous trio of `outcome_prices` map\
        \ + `outcome_tokens` vec + binary-only `token_id_yes`/`token_id_no` with a single ordered list keyed by index."
      properties:
        label:
          description: Outcome label (e.g. "Yes", "No", or a categorical option name).
          type: string
        price:
          description: Current outcome price in [0.0, 1.0]. None when not exposed (e.g. Kalshi markets pre-fill, or Polymarket
            categorical markets without a price).
          format: double
          type:
          - number
          - 'null'
        token_id:
          description: CTF token id (Polymarket only). Used to subscribe to per-outcome orderbook streams. None on Kalshi.
          type:
          - string
          - 'null'
      required:
      - label
      type: object
    Position:
      properties:
        average_price:
          format: double
          type: number
        current_price:
          format: double
          type: number
        market_ticker:
          type: string
        outcome:
          type: string
        size:
          format: double
          type: number
      required:
      - average_price
      - current_price
      - market_ticker
      - outcome
      - size
      title: Position
      type: object
    PriceLevel:
      properties:
        price:
          $ref: '#/components/schemas/number'
        size:
          format: double
          type: number
      required:
      - price
      - size
      type: object
    PriceLevelChange:
      description: 'A single price level change. Absolute replacement semantics: size > 0 = set level to this size, size ==
        0 = remove level.'
      properties:
        price:
          $ref: '#/components/schemas/number'
        side:
          $ref: '#/components/schemas/PriceLevelSide'
        size:
          format: double
          type: number
      required:
      - price
      - side
      - size
      type: object
    PriceLevelSide:
      description: Bid or ask side. Serializes as "bid"/"ask" on the wire.
      enum:
      - bid
      - ask
      type: string
    Series:
      description: 'A recurring family of events. Examples: a weekly inflation reading, a monthly nonfarm payrolls release,
        a regular sports season. On Kalshi, a Series is identified by `series_ticker` (e.g. `KXPRES`). On Polymarket, a Series
        wraps multiple Events with shared metadata.'
      properties:
        category:
          type:
          - string
          - 'null'
        fee_type:
          type:
          - string
          - 'null'
        frequency:
          type:
          - string
          - 'null'
        last_updated_ts:
          format: date-time
          type:
          - string
          - 'null'
        numeric_id:
          description: Polymarket's numeric REST id for the series (e.g. `"10345"`). None on Kalshi (no separate numeric series
            surface).
          type:
          - string
          - 'null'
        settlement_sources:
          default: []
          items:
            $ref: '#/components/schemas/SettlementSource'
          type: array
        tags:
          default: []
          items:
            type: string
          type: array
        ticker:
          description: 'Native series identifier. Kalshi: `ticker` (e.g. `"KXPRES"`). Polymarket: the series''s `ticker` field,
            falling back to `slug` when `ticker` is null upstream.'
          type: string
        title:
          type: string
        volume:
          format: double
          type:
          - number
          - 'null'
      required:
      - ticker
      - title
      type: object
    SessionEvent:
      description: Connection-level events, emitted on a channel separate from `WsUpdate` so a reconnect is observable as
        a single global signal rather than per-market.
      oneOf:
      - description: Initial socket establishment.
        properties:
          kind:
            enum:
            - Connected
            type: string
        required:
        - kind
        type: object
      - description: "Socket re-established after an outage \u2014 `gap_ms` is the wall-clock interval since the last received\
          \ message."
        properties:
          gap_ms:
            format: uint64
            minimum: 0.0
            type: integer
          kind:
            enum:
            - Reconnected
            type: string
        required:
        - gap_ms
        - kind
        type: object
      - description: "Slow consumer dropped messages \u2014 every affected book is invalidated and must be rebuilt from the\
          \ next `Snapshot`."
        properties:
          dropped:
            format: uint64
            minimum: 0.0
            type: integer
          first_seq:
            format: uint64
            minimum: 0.0
            type: integer
          kind:
            enum:
            - Lagged
            type: string
          last_seq:
            format: uint64
            minimum: 0.0
            type: integer
        required:
        - dropped
        - first_seq
        - kind
        - last_seq
        type: object
      - description: "A specific market's book is no longer trustworthy \u2014 drop cache and wait for next `Snapshot` (reasons:\
          \ `Reconnect`, `Lag`, `SequenceGap`, `ExchangeReset`)."
        properties:
          kind:
            enum:
            - BookInvalidated
            type: string
          market_id:
            type: string
          reason:
            $ref: '#/components/schemas/InvalidationReason'
        required:
        - kind
        - market_id
        - reason
        type: object
      - description: A non-fatal error observed on the connection (session continues).
        properties:
          kind:
            enum:
            - Error
            type: string
          message:
            type: string
        required:
        - kind
        - message
        type: object
      title: SessionEvent
    SettlementSource:
      properties:
        name:
          type:
          - string
          - 'null'
        url:
          type:
          - string
          - 'null'
      type: object
    SportResult:
      description: Real-time sports score/state from the Polymarket Sports WebSocket. Serializes as snake_case for end-users;
        aliases accept the upstream camelCase.
      properties:
        away_team:
          type: string
        elapsed:
          type:
          - string
          - 'null'
        ended:
          type: boolean
        finished_timestamp:
          format: date-time
          type:
          - string
          - 'null'
        game_id:
          format: uint64
          minimum: 0.0
