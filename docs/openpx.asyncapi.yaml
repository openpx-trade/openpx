          type:
          - string
          - 'null'
        condition_id:
          description: Polymarket CTF condition id (e.g. `"0xabc..."`); `null` on Kalshi.
          type:
          - string
          - 'null'
        created_at:
          description: Market creation time in UTC.
          format: date-time
          type:
          - string
          - 'null'
