            format: uint64
            minimum: 0.0
            type: integer
          market_id:
            type: string
          seq:
            format: uint64
            minimum: 0.0
            type: integer
        required:
        - asset_id
        - changes
        - kind
        - local_ts_ms
        - market_id
        - seq
        type: object
      - description: "Book invalidation \u2014 drop the cached book and wait for the next `Snapshot`."
