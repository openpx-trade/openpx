asyncapi: 3.0.0
info:
  title: OpenPX WebSocket
  version: 0.2.6
  description: "Unified WebSocket streams over prediction-market exchanges. OpenPX is an in-process Rust library; this AsyncAPI\
    \ document models message shapes for documentation only \u2014 there is no hosted endpoint. The Rust engine translates\
    \ these messages into each exchange's underlying WS protocol behind the trait."
  license:
    name: MIT
servers:
  inprocess:
    host: openpx-engine
    protocol: ws
    description: "In-process Tokio channel \u2014 not a real WebSocket. OpenPX dispatches messages directly to your subscribers."
channels:
  orderbook:
    address: /v1/orderbook
    title: Orderbook Stream
    description: "Per-market L2 orderbook stream \u2014 `Snapshot` on subscribe, then `Delta` updates."
    messages:
      Snapshot:
        $ref: '#/components/messages/Snapshot'
      Delta:
        $ref: '#/components/messages/Delta'
      Clear:
        $ref: '#/components/messages/Clear'
      Connected:
        $ref: '#/components/messages/Connected'
      Reconnected:
        $ref: '#/components/messages/Reconnected'
      Lagged:
        $ref: '#/components/messages/Lagged'
      BookInvalidated:
        $ref: '#/components/messages/BookInvalidated'
      Error:
        $ref: '#/components/messages/Error'
      orderbook_subscribe:
        $ref: '#/components/messages/orderbook_subscribe'
      orderbook_unsubscribe:
        $ref: '#/components/messages/orderbook_unsubscribe'
  trades:
    address: /v1/trades
    title: Trades Stream
    description: "Public trade-tape stream \u2014 receive every print as it lands."
    messages:
      Trade:
        $ref: '#/components/messages/Trade'
      Connected:
        $ref: '#/components/messages/Connected'
      Reconnected:
        $ref: '#/components/messages/Reconnected'
      Lagged:
        $ref: '#/components/messages/Lagged'
      BookInvalidated:
        $ref: '#/components/messages/BookInvalidated'
      Error:
        $ref: '#/components/messages/Error'
      trades_subscribe:
        $ref: '#/components/messages/trades_subscribe'
      trades_unsubscribe:
        $ref: '#/components/messages/trades_unsubscribe'
  fills:
    address: /v1/fills
    title: Fills Stream
    description: Authenticated stream of the caller's own order fills (auth required).
    messages:
      Fill:
        $ref: '#/components/messages/Fill'
      Connected:
        $ref: '#/components/messages/Connected'
      Reconnected:
        $ref: '#/components/messages/Reconnected'
      Lagged:
        $ref: '#/components/messages/Lagged'
      BookInvalidated:
        $ref: '#/components/messages/BookInvalidated'
      Error:
        $ref: '#/components/messages/Error'
      fills_subscribe:
        $ref: '#/components/messages/fills_subscribe'
      fills_unsubscribe:
        $ref: '#/components/messages/fills_unsubscribe'
  crypto:
    address: /v1/crypto
    title: Crypto Price Stream
    description: "Public spot-price stream (Polymarket-hosted) \u2014 `source` is `binance` (e.g. `btcusdt`, `solusdt`, `ethusdt`)\
      \ or `chainlink` (e.g. `btc/usd`, `eth/usd`, `sol/usd`)."
    messages:
      CryptoPrice:
        $ref: '#/components/messages/CryptoPrice'
      Connected:
        $ref: '#/components/messages/Connected'
      Reconnected:
        $ref: '#/components/messages/Reconnected'
      Lagged:
        $ref: '#/components/messages/Lagged'
      BookInvalidated:
        $ref: '#/components/messages/BookInvalidated'
      Error:
        $ref: '#/components/messages/Error'
      crypto_subscribe:
        $ref: '#/components/messages/crypto_subscribe'
      crypto_unsubscribe:
        $ref: '#/components/messages/crypto_unsubscribe'
  sports:
    address: /v1/sports
    title: Sports Stream
    description: "Public live game-state stream (Polymarket-hosted) \u2014 `league` is `nba`, `nfl`, or `mlb`."
    messages:
      SportResult:
        $ref: '#/components/messages/SportResult'
      Connected:
        $ref: '#/components/messages/Connected'
      Reconnected:
        $ref: '#/components/messages/Reconnected'
      Lagged:
        $ref: '#/components/messages/Lagged'
      BookInvalidated:
        $ref: '#/components/messages/BookInvalidated'
      Error:
        $ref: '#/components/messages/Error'
      sports_subscribe:
        $ref: '#/components/messages/sports_subscribe'
      sports_unsubscribe:
        $ref: '#/components/messages/sports_unsubscribe'
operations:
  orderbook_subscribe:
    action: send
    channel:
      $ref: '#/channels/orderbook'
    title: Subscribe
    summary: Add to the active orderbook subscription set
    messages:
    - $ref: '#/channels/orderbook/messages/orderbook_subscribe'
  orderbook_unsubscribe:
    action: send
    channel:
      $ref: '#/channels/orderbook'
    title: Unsubscribe
    summary: Remove from the active orderbook subscription set
    messages:
    - $ref: '#/channels/orderbook/messages/orderbook_unsubscribe'
  orderbook_receive_Snapshot:
    action: receive
    channel:
      $ref: '#/channels/orderbook'
    title: Snapshot
    summary: "Full orderbook snapshot \u2014 replace any cached book for `(market_id, asset_id)`."
    messages:
    - $ref: '#/channels/orderbook/messages/Snapshot'
  orderbook_receive_Delta:
    action: receive
    channel:
      $ref: '#/channels/orderbook'
    title: Delta
    summary: "Incremental change to an existing book \u2014 apply in-place."
    messages:
    - $ref: '#/channels/orderbook/messages/Delta'
  orderbook_receive_Clear:
    action: receive
    channel:
      $ref: '#/channels/orderbook'
    title: Clear
    summary: "Book invalidation \u2014 drop the cached book and wait for the next `Snapshot`."
    messages:
    - $ref: '#/channels/orderbook/messages/Clear'
  orderbook_receive_Connected:
    action: receive
    channel:
      $ref: '#/channels/orderbook'
    title: Connected
    summary: Initial socket establishment.
    messages:
    - $ref: '#/channels/orderbook/messages/Connected'
  orderbook_receive_Reconnected:
    action: receive
    channel:
      $ref: '#/channels/orderbook'
    title: Reconnected
    summary: "Socket re-established after an outage \u2014 `gap_ms` is the wall-clock interval since the last received message."
    messages:
    - $ref: '#/channels/orderbook/messages/Reconnected'
  orderbook_receive_Lagged:
    action: receive
    channel:
      $ref: '#/channels/orderbook'
    title: Lagged
    summary: "Slow consumer dropped messages \u2014 every affected book is invalidated and must be rebuilt from the next `Snapshot`."
    messages:
    - $ref: '#/channels/orderbook/messages/Lagged'
  orderbook_receive_BookInvalidated:
    action: receive
    channel:
      $ref: '#/channels/orderbook'
    title: BookInvalidated
    summary: "A specific market's book is no longer trustworthy \u2014 drop cache and wait for next `Snapshot` (reasons: `Reconnect`,\
      \ `Lag`, `SequenceGap`, `ExchangeReset`)."
    messages:
    - $ref: '#/channels/orderbook/messages/BookInvalidated'
  orderbook_receive_Error:
    action: receive
    channel:
      $ref: '#/channels/orderbook'
    title: Error
    summary: A non-fatal error observed on the connection (session continues).
    messages:
    - $ref: '#/channels/orderbook/messages/Error'
  trades_subscribe:
    action: send
    channel:
      $ref: '#/channels/trades'
    title: Subscribe
    summary: Add to the active trades subscription set
    messages:
    - $ref: '#/channels/trades/messages/trades_subscribe'
  trades_unsubscribe:
    action: send
    channel:
      $ref: '#/channels/trades'
    title: Unsubscribe
    summary: Remove from the active trades subscription set
    messages:
    - $ref: '#/channels/trades/messages/trades_unsubscribe'
  trades_receive_Trade:
    action: receive
    channel:
      $ref: '#/channels/trades'
    title: Trade
    summary: A public trade (any counterparty), not tied to a local order.
    messages:
    - $ref: '#/channels/trades/messages/Trade'
  trades_receive_Connected:
    action: receive
    channel:
      $ref: '#/channels/trades'
    title: Connected
    summary: Initial socket establishment.
    messages:
    - $ref: '#/channels/trades/messages/Connected'
  trades_receive_Reconnected:
    action: receive
    channel:
      $ref: '#/channels/trades'
    title: Reconnected
    summary: "Socket re-established after an outage \u2014 `gap_ms` is the wall-clock interval since the last received message."
    messages:
    - $ref: '#/channels/trades/messages/Reconnected'
  trades_receive_Lagged:
    action: receive
    channel:
      $ref: '#/channels/trades'
    title: Lagged
    summary: "Slow consumer dropped messages \u2014 every affected book is invalidated and must be rebuilt from the next `Snapshot`."
    messages:
    - $ref: '#/channels/trades/messages/Lagged'
  trades_receive_BookInvalidated:
    action: receive
    channel:
      $ref: '#/channels/trades'
    title: BookInvalidated
    summary: "A specific market's book is no longer trustworthy \u2014 drop cache and wait for next `Snapshot` (reasons: `Reconnect`,\
      \ `Lag`, `SequenceGap`, `ExchangeReset`)."
    messages:
    - $ref: '#/channels/trades/messages/BookInvalidated'
  trades_receive_Error:
    action: receive
    channel:
      $ref: '#/channels/trades'
    title: Error
    summary: A non-fatal error observed on the connection (session continues).
    messages:
    - $ref: '#/channels/trades/messages/Error'
  fills_subscribe:
    action: send
    channel:
      $ref: '#/channels/fills'
    title: Subscribe
    summary: Add to the active fills subscription set
    messages:
    - $ref: '#/channels/fills/messages/fills_subscribe'
  fills_unsubscribe:
    action: send
    channel:
      $ref: '#/channels/fills'
    title: Unsubscribe
    summary: Remove from the active fills subscription set
    messages:
    - $ref: '#/channels/fills/messages/fills_unsubscribe'
  fills_receive_Fill:
    action: receive
    channel:
      $ref: '#/channels/fills'
    title: Fill
    summary: A fill on one of the authenticated user's orders.
    messages:
    - $ref: '#/channels/fills/messages/Fill'
  fills_receive_Connected:
    action: receive
    channel:
      $ref: '#/channels/fills'
    title: Connected
    summary: Initial socket establishment.
    messages:
    - $ref: '#/channels/fills/messages/Connected'
  fills_receive_Reconnected:
    action: receive
    channel:
      $ref: '#/channels/fills'
    title: Reconnected
    summary: "Socket re-established after an outage \u2014 `gap_ms` is the wall-clock interval since the last received message."
    messages:
    - $ref: '#/channels/fills/messages/Reconnected'
  fills_receive_Lagged:
    action: receive
    channel:
      $ref: '#/channels/fills'
    title: Lagged
    summary: "Slow consumer dropped messages \u2014 every affected book is invalidated and must be rebuilt from the next `Snapshot`."
    messages:
    - $ref: '#/channels/fills/messages/Lagged'
  fills_receive_BookInvalidated:
    action: receive
    channel:
      $ref: '#/channels/fills'
    title: BookInvalidated
    summary: "A specific market's book is no longer trustworthy \u2014 drop cache and wait for next `Snapshot` (reasons: `Reconnect`,\
      \ `Lag`, `SequenceGap`, `ExchangeReset`)."
    messages:
    - $ref: '#/channels/fills/messages/BookInvalidated'
  fills_receive_Error:
    action: receive
    channel:
      $ref: '#/channels/fills'
    title: Error
    summary: A non-fatal error observed on the connection (session continues).
    messages:
    - $ref: '#/channels/fills/messages/Error'
  crypto_subscribe:
    action: send
    channel:
      $ref: '#/channels/crypto'
    title: Subscribe
    summary: Add to the active crypto subscription set
    messages:
    - $ref: '#/channels/crypto/messages/crypto_subscribe'
  crypto_unsubscribe:
    action: send
    channel:
      $ref: '#/channels/crypto'
    title: Unsubscribe
    summary: Remove from the active crypto subscription set
    messages:
    - $ref: '#/channels/crypto/messages/crypto_unsubscribe'
  crypto_receive_CryptoPrice:
    action: receive
    channel:
      $ref: '#/channels/crypto'
    title: CryptoPrice
    summary: Spot price update for a single symbol from `binance` or `chainlink`.
    messages:
    - $ref: '#/channels/crypto/messages/CryptoPrice'
  crypto_receive_Connected:
    action: receive
    channel:
      $ref: '#/channels/crypto'
    title: Connected
    summary: Initial socket establishment.
    messages:
    - $ref: '#/channels/crypto/messages/Connected'
  crypto_receive_Reconnected:
    action: receive
    channel:
      $ref: '#/channels/crypto'
    title: Reconnected
    summary: "Socket re-established after an outage \u2014 `gap_ms` is the wall-clock interval since the last received message."
    messages:
    - $ref: '#/channels/crypto/messages/Reconnected'
  crypto_receive_Lagged:
    action: receive
    channel:
      $ref: '#/channels/crypto'
    title: Lagged
    summary: "Slow consumer dropped messages \u2014 every affected book is invalidated and must be rebuilt from the next `Snapshot`."
    messages:
    - $ref: '#/channels/crypto/messages/Lagged'
  crypto_receive_BookInvalidated:
    action: receive
    channel:
      $ref: '#/channels/crypto'
    title: BookInvalidated
    summary: "A specific market's book is no longer trustworthy \u2014 drop cache and wait for next `Snapshot` (reasons: `Reconnect`,\
      \ `Lag`, `SequenceGap`, `ExchangeReset`)."
    messages:
    - $ref: '#/channels/crypto/messages/BookInvalidated'
  crypto_receive_Error:
    action: receive
    channel:
      $ref: '#/channels/crypto'
    title: Error
    summary: A non-fatal error observed on the connection (session continues).
    messages:
    - $ref: '#/channels/crypto/messages/Error'
  sports_subscribe:
    action: send
    channel:
      $ref: '#/channels/sports'
    title: Subscribe
    summary: Add to the active sports subscription set
    messages:
    - $ref: '#/channels/sports/messages/sports_subscribe'
  sports_unsubscribe:
    action: send
    channel:
      $ref: '#/channels/sports'
    title: Unsubscribe
    summary: Remove from the active sports subscription set
    messages:
    - $ref: '#/channels/sports/messages/sports_unsubscribe'
  sports_receive_SportResult:
    action: receive
    channel:
      $ref: '#/channels/sports'
    title: SportResult
    summary: Live score, period, and clock for a tracked game.
    messages:
    - $ref: '#/channels/sports/messages/SportResult'
  sports_receive_Connected:
    action: receive
    channel:
      $ref: '#/channels/sports'
    title: Connected
    summary: Initial socket establishment.
    messages:
    - $ref: '#/channels/sports/messages/Connected'
  sports_receive_Reconnected:
    action: receive
    channel:
      $ref: '#/channels/sports'
    title: Reconnected
    summary: "Socket re-established after an outage \u2014 `gap_ms` is the wall-clock interval since the last received message."
