    TradesRequest:
      description: "Request for `fetch_trades` \u2014 recent public trades (\"tape\") for one market."
      properties:
        asset_id:
          description: "Market identifier \u2014 Kalshi market ticker or Polymarket Gamma slug (e.g. `\"KXBTCD-25APR1517\"\
            `)."
          type: string
        cursor:
          description: Opaque cursor returned by a prior page (e.g. `"eyJvIjoxMDB9"`).
          type:
          - string
          - 'null'
        end_ts:
          description: Inclusive upper bound, unix seconds (e.g. `1714608000`).
          format: int64
          type:
          - integer
          - 'null'
        limit:
          description: Max trades to return; capped at 1000 (Kalshi) / 500 (Polymarket) (e.g. `100`).
          format: uint
          minimum: 0.0
          type:
          - integer
          - 'null'
        start_ts:
          description: Inclusive lower bound, unix seconds (e.g. `1714521600`).
          format: int64
          type:
          - integer
          - 'null'
      required:
      - asset_id
      title: TradesRequest
      type: object
    WsUpdate:
      description: "Every per-market event the WebSocket surface emits. Closed tagged union; no untyped escape hatch in the\
        \ stable enum. If an exchange grows a payload we want to surface in raw form, add a separate `raw_events()` stream\
        \ rather than another `WsUpdate` variant \u2014 keeps consumer `match` exhaustiveness honest."
      oneOf:
      - description: "Full orderbook snapshot \u2014 replace any cached book for `(market_id, asset_id)`."
        properties:
          asset_id:
            type: string
          book:
            $ref: '#/components/schemas/Orderbook'
          exchange_ts:
            format: uint64
            minimum: 0.0
            type:
            - integer
            - 'null'
          kind:
            enum:
            - Snapshot
            type: string
          local_ts_ms:
            format: uint64
            minimum: 0.0
            type: integer
          market_id:
            type: string
          seq:
            format: uint64
            minimum: 0.0
            type: integer
        required:
        - asset_id
        - book
        - kind
        - local_ts_ms
        - market_id
        - seq
        type: object
      - description: "Incremental change to an existing book \u2014 apply in-place."
        properties:
          asset_id:
            type: string
          changes:
            items:
              $ref: '#/components/schemas/PriceLevelChange'
            type: array
          exchange_ts:
            format: uint64
            minimum: 0.0
            type:
            - integer
            - 'null'
          kind:
            enum:
            - Delta
            type: string
          local_ts_ms:
            format: uint64
            minimum: 0.0
            type: integer
          market_id:
            type: string
          seq:
            format: uint64
            minimum: 0.0
            type: integer
        required:
        - asset_id
        - changes
        - kind
        - local_ts_ms
        - market_id
        - seq
        type: object
      - description: "Book invalidation \u2014 drop the cached book and wait for the next `Snapshot`."
        properties:
          asset_id:
            type: string
          kind:
            enum:
            - Clear
            type: string
          local_ts_ms:
            format: uint64
            minimum: 0.0
            type: integer
          market_id:
            type: string
          reason:
            $ref: '#/components/schemas/InvalidationReason'
          seq:
            format: uint64
            minimum: 0.0
            type: integer
        required:
        - asset_id
        - kind
        - local_ts_ms
        - market_id
        - reason
        - seq
        type: object
      - description: A public trade (any counterparty), not tied to a local order.
        properties:
          kind:
            enum:
            - Trade
            type: string
          local_ts_ms:
            format: uint64
            minimum: 0.0
            type: integer
          trade:
            $ref: '#/components/schemas/ActivityTrade'
        required:
        - kind
        - local_ts_ms
        - trade
        type: object
      - description: A fill on one of the authenticated user's orders.
        properties:
          fill:
            $ref: '#/components/schemas/ActivityFill'
          kind:
            enum:
            - Fill
            type: string
          local_ts_ms:
            format: uint64
            minimum: 0.0
            type: integer
        required:
        - fill
        - kind
        - local_ts_ms
        type: object
      title: WsUpdate
