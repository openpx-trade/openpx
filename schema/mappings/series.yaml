# Schema mapping for the unified `Series`.
# Each field declares, per exchange, exactly one of three entry types:
#   type: direct     — value is taken from upstream at the given $ref.
#   type: synthetic  — value is computed by OpenPX, not present upstream.
#   type: omitted    — upstream does not expose this concept.
unified_type: Series
unified_schema: schema/openpx.schema.json#/definitions/Series
upstream_specs:
  kalshi: schema/upstream/kalshi.openapi.yaml
  polymarket: schema/upstream/polymarket-gamma.openapi.yaml

fields:
  - name: ticker
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Series/properties/ticker"
        note: "Native Kalshi series ticker (e.g. `KXPRES`)."
      polymarket:
        type: direct
        ref: "#/components/schemas/Series/properties/ticker"
        note: "Polymarket series ticker; falls back to `slug` when null."

  - name: numeric_id
    sources:
      kalshi:
        type: omitted
        note: "Kalshi has no separate numeric series id."
      polymarket:
        type: direct
        ref: "#/components/schemas/Series/properties/id"
        note: "Polymarket numeric series id."

  - name: title
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Series/properties/title"
        note: "Kalshi series title."
      polymarket:
        type: direct
        ref: "#/components/schemas/Series/properties/title"
        note: "Polymarket series title."

  - name: category
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Series/properties/category"
        note: "Kalshi series category."
      polymarket:
        type: direct
        ref: category
        note: "Spec gap: live `/series` rows return `category` but the gamma OpenAPI omits it."

  - name: frequency
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Series/properties/frequency"
        note: "Free-form cadence string (e.g. `weekly`)."
      polymarket:
        type: direct
        ref: "#/components/schemas/Series/properties/recurrence"
        note: "Polymarket calls the cadence `recurrence`."

  - name: tags
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Series/properties/tags"
        note: "Free-form tag strings copied as-is."
      polymarket:
        type: omitted
        note: "Polymarket Series has no `tags`; tag relationships live on Events/Markets endpoints."

  - name: settlement_sources
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Series/properties/settlement_sources"
        note: "Array of `{name, url}` rulebook authorities, copied as-is."
      polymarket:
        type: omitted
        note: "Polymarket resolves via UMA optimistic oracle; no per-series feed is exposed."

  - name: fee_type
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Series/properties/fee_type"
        note: "Kalshi fee schedule enum (e.g. `quadratic`, `flat`)."
      polymarket:
        type: omitted
        note: "Polymarket fees are configured at the CLOB level, not per-series."

  - name: volume
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Series/properties/volume_fp"
        note: "FixedPointCount string parsed to f64; populated only with `include_volume=true`."
      polymarket:
        type: direct
        ref: "#/components/schemas/Series/properties/volume"
        note: "Cumulative series volume in USD."

  - name: last_updated_ts
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Series/properties/last_updated_ts"
        note: "RFC3339 string parsed to UTC."
      polymarket:
        type: direct
        ref: "#/components/schemas/Series/properties/updatedAt"
        note: "ISO 8601 string parsed to UTC."
