# Schema mapping for the unified `MarketTrade`.
# Each field declares, per exchange, exactly one of three entry types:
#   type: direct     — value is taken from upstream at the given $ref.
#   type: synthetic  — value is computed by OpenPX, not present upstream.
#   type: omitted    — upstream does not expose this concept.
unified_type: MarketTrade
unified_schema: schema/openpx.schema.json#/definitions/MarketTrade
upstream_specs:
  kalshi: schema/upstream/kalshi.openapi.yaml
  polymarket: schema/upstream/polymarket-data.openapi.yaml

fields:
  - name: id
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Trade/properties/trade_id"
        note: "Kalshi-issued unique trade id; rows missing this are dropped at parse time."
      polymarket:
        type: direct
        ref: "#/components/schemas/Trade/properties/transactionHash"
        note: "Polygon transaction hash; doubles as trade id since one trade lands per tx."

  - name: price
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Trade/properties/yes_price_dollars"
        fallback_ref: "#/components/schemas/Trade/properties/no_price_dollars"
        note: "Yes-anchored: parsed from `yes_price_dollars` and normalized to a probability in [0, 1]."
      polymarket:
        type: direct
        ref: "#/components/schemas/Trade/properties/price"
        note: "Decimal probability for the row's outcome token in [0, 1]."

  - name: size
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Trade/properties/count_fp"
        note: "FixedPointCount string parsed to f64."
      polymarket:
        type: direct
        ref: "#/components/schemas/Trade/properties/size"
        note: "Non-negative size in contracts."

  - name: aggressor_side
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Trade/properties/taker_side"
        note: "Yes-anchored: `taker_side=yes` → buy, `taker_side=no` → sell."
      polymarket:
        type: synthetic
        note: "Yes-anchored from {Trade.side, Trade.outcome} — BUY of Yes or SELL of No → buy."

  - name: outcome
    sources:
      kalshi:
        type: synthetic
        note: "Title-cased from `taker_side` (the upstream Trade has no top-level `outcome`)."
      polymarket:
        type: direct
        ref: "#/components/schemas/Trade/properties/outcome"
        note: "Outcome label as published by Polymarket."

  - name: yes_price
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Trade/properties/yes_price_dollars"
        note: "Direct Yes-side reference; equal to canonical `price`."
      polymarket:
        type: synthetic
        note: "Set to `Trade.price` when the row's outcome is `Yes`; null otherwise."

  - name: no_price
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Trade/properties/no_price_dollars"
        note: "Direct No-side reference; do not derive as `1 - yes_price` (mirror identity does not hold per trade)."
      polymarket:
        type: synthetic
        note: "Set to `Trade.price` when the row's outcome is `No`; null otherwise."

  - name: taker_address
    sources:
      kalshi:
        type: omitted
        note: "Kalshi public tape exposes no wallet identifiers."
      polymarket:
        type: direct
        ref: "#/components/schemas/Trade/properties/proxyWallet"
        note: "On-chain proxy wallet of the taker (`takerOnly=true` is hardcoded on the underlying call)."

  - name: exchange_ts
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Trade/properties/created_time"
        note: "RFC3339 string parsed to UTC."
      polymarket:
        type: direct
        ref: "#/components/schemas/Trade/properties/timestamp"
        note: "Unix seconds (not milliseconds) parsed to UTC."

  - name: openpx_ts
    sources:
      kalshi:
        type: synthetic
        note: "Wall-clock UTC stamped once per page at response serialization."
      polymarket:
        type: synthetic
        note: "Wall-clock UTC stamped once per page at response serialization."
