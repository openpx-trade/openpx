# Schema mapping for the unified `Order`.
# Each field declares, per exchange, exactly one of three entry types:
#   type: direct     — value is taken from upstream at the given $ref.
#   type: synthetic  — value is computed by OpenPX, not present upstream.
#   type: omitted    — upstream does not expose this concept.
unified_type: Order
unified_schema: schema/openpx.schema.json#/definitions/Order
upstream_specs:
  kalshi: schema/upstream/kalshi.openapi.yaml
  polymarket: schema/upstream/polymarket-clob.openapi.yaml

fields:
  - name: id
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Order/properties/order_id"
        fallback_ref: "#/components/schemas/CreateOrderV2Response/properties/order_id"
        note: "Kalshi-issued order id, identical across V1 GET and every V2 mutation response."
      polymarket:
        type: direct
        ref: "#/components/schemas/OpenOrder/properties/id"
        fallback_ref: "#/components/schemas/SendOrderResponse/properties/orderID"
        note: "Order hash; exposed as `id` on GET responses and `orderID` on POST /order."

  - name: market_ticker
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Order/properties/ticker"
        note: "V1 GET echoes the ticker; on V2 mutations the adapter carries the request `asset_id` through."
      polymarket:
        type: omitted
        note: "Polymarket exposes a CTF condition id, not a market ticker; always empty on this surface."

  - name: outcome
    sources:
      kalshi:
        type: synthetic
        note: "Title-cased from `Order.side` (yes/no); V2 mutations reuse the caller-frame outcome."
      polymarket:
        type: direct
        ref: "#/components/schemas/OpenOrder/properties/outcome"
        note: "Outcome label as published by Polymarket (e.g. `YES`/`NO` on binary markets)."

  - name: side
    sources:
      kalshi:
        type: synthetic
        note: "Sourced from `Order.action` (buy/sell), not the YES/NO `side` field."
      polymarket:
        type: direct
        ref: "#/components/schemas/OpenOrder/properties/side"
        note: "BUY/SELL enum, 1:1 with unified `OrderSide`."

  - name: price
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Order/properties/yes_price_dollars"
        fallback_ref: "#/components/schemas/CreateOrderV2Response/properties/average_fill_price"
        note: "Fixed-point dollar string (V1) or YES-frame average fill price (V2), converted to caller-frame f64."
      polymarket:
        type: direct
        ref: "#/components/schemas/OpenOrder/properties/price"
        note: "Decimal probability string (e.g. `\"0.5\"`) parsed to f64."

  - name: size
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Order/properties/initial_count_fp"
        fallback_ref: "#/components/schemas/CreateOrderV2Response/properties/remaining_count"
        note: "FixedPointCount on V1; reconstructed as fill_count + remaining_count on V2."
      polymarket:
        type: direct
        ref: "#/components/schemas/OpenOrder/properties/original_size"
        note: "Six-decimal fixed-math string parsed to f64."

  - name: filled
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Order/properties/fill_count_fp"
        fallback_ref: "#/components/schemas/CreateOrderV2Response/properties/fill_count"
        note: "FixedPointCount on both V1 and V2."
      polymarket:
        type: direct
        ref: "#/components/schemas/OpenOrder/properties/size_matched"
        note: "Cumulative matched size; six-decimal fixed-math string parsed to f64."

  - name: fee
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/CreateOrderV2Response/properties/average_fee_paid"
        note: "Per-contract average fee from the V2 create response, multiplied by fill_count for the dollar total."
      polymarket:
        type: omitted
        note: "Polymarket charges fees at trade settlement, not on order creation or lookup."

  - name: status
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Order/properties/status"
        note: "V1 enum mapped to unified status; V2 mutations derive status from (fill_count, remaining_count)."
      polymarket:
        type: direct
        ref: "#/components/schemas/OpenOrder/properties/status"
        fallback_ref: "#/components/schemas/SendOrderResponse/properties/status"
        note: "OpenOrder uses prefixed `ORDER_STATUS_*` enums; SendOrderResponse uses unprefixed `live`/`matched`/`delayed`."

  - name: created_at
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Order/properties/created_time"
        note: "RFC3339 string on V1; V2 mutations fall back to wall-clock at parse time."
      polymarket:
        type: direct
        ref: "#/components/schemas/OpenOrder/properties/created_at"
        note: "Unix seconds; create paths fall back to wall-clock since SendOrderResponse omits it."

  - name: updated_at
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Order/properties/last_update_time"
        note: "RFC3339, nullable; cancel paths set wall-clock and create paths leave it null."
      polymarket:
        type: omitted
        note: "Polymarket exposes no updated_at on either OpenOrder or SendOrderResponse."
