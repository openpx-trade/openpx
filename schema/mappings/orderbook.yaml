# Schema mapping for the unified `Orderbook`.
# Each field declares, per exchange, exactly one of three entry types:
#   type: direct     — value is taken from upstream at the given $ref.
#   type: synthetic  — value is computed by OpenPX, not present upstream.
#   type: omitted    — upstream does not expose this concept.
unified_type: Orderbook
unified_schema: schema/openpx.schema.json#/definitions/Orderbook
upstream_specs:
  kalshi: schema/upstream/kalshi.openapi.yaml
  polymarket: schema/upstream/polymarket-clob.openapi.yaml

fields:
  - name: asset_id
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/MarketOrderbookFp/properties/ticker"
        note: "Kalshi market ticker; the single-market REST endpoint stamps the path parameter."
      polymarket:
        type: direct
        ref: "#/components/schemas/OrderBookSummary/properties/asset_id"
        note: "Polymarket CTF token id of one outcome."

  - name: bids
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/OrderbookCountFp/properties/yes_dollars"
        note: "YES bids parsed from `[price_$, count_fp]` tuples and sorted descending."
      polymarket:
        type: direct
        ref: "#/components/schemas/OrderBookSummary/properties/bids"
        note: "`OrderSummary { price, size }` strings parsed to f64 and sorted descending."

  - name: asks
    sources:
      kalshi:
        type: synthetic
        note: "Synthesized from `no_dollars` via the binary identity: NO bid at p == YES ask at (1 − p)."
      polymarket:
        type: direct
        ref: "#/components/schemas/OrderBookSummary/properties/asks"
        note: "`OrderSummary { price, size }` strings parsed to f64 and sorted ascending."

  - name: last_update_id
    sources:
      kalshi:
        type: synthetic
        note: "WS `seq` on snapshot/delta messages; null on REST since the endpoint omits it."
      polymarket:
        type: omitted
        note: "Polymarket emits no per-message sequence — book integrity is verified via `hash`."

  - name: timestamp
    sources:
      kalshi:
        type: synthetic
        note: "WS `ts_ms` on delta messages; REST stamps `Utc::now()` at receive time."
      polymarket:
        type: direct
        ref: "#/components/schemas/OrderBookSummary/properties/timestamp"
        note: "Unix millis encoded as a string."

  - name: hash
    sources:
      kalshi:
        type: omitted
        note: "Kalshi exposes no orderbook hash on REST or WS."
      polymarket:
        type: direct
        ref: "#/components/schemas/OrderBookSummary/properties/hash"
        note: "Exchange-provided book-state hash for replay integrity."
