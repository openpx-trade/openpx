# Orderbook field mapping: how each upstream exchange schema maps to OpenPX Orderbook.
#
# This file is the single declarative source of truth for the Databento-style
# field crosswalk. It is deliberately *coordinate-only*: every $ref points at a
# resolvable path in schema/upstream/<exchange>.openapi.yaml — type info,
# nullability, and descriptions are derived from the spec at validation/render
# time. Do not duplicate that metadata here.
#
# The hand-written normalizers — `parse_polymarket_book` in
# engine/exchanges/polymarket/src/exchange.rs and the inline parsers in
# engine/exchanges/kalshi/src/exchange.rs (`fetch_orderbook` /
# `fetch_orderbooks_batch`) plus the WS handlers in
# engine/exchanges/{kalshi,polymarket}/src/websocket.rs — are the implementation.
# This file is the *contract* the implementation conforms to.
# tools/validate_mappings.py asserts every $ref resolves; the per-exchange
# mapping_contract.rs tests assert the actual normalizer output matches.
unified_type: Orderbook
unified_schema: schema/openpx.schema.json#/definitions/Orderbook

# When upstream specs change, the diff bot reports added/removed/renamed
# fields at any path referenced below. Each exchange has a single primary
# spec (the REST OpenAPI) — the WebSocket surface uses identical field
# semantics and is described inline in field notes below; see
# kalshi.asyncapi.yaml#/components/schemas/{orderbookSnapshotPayload,
# orderbookDeltaPayload} and polymarket.asyncapi.json#/components/schemas/
# {BookEvent,PriceChangeEvent} for the WS shapes the parsers also accept.
upstream_specs:
  kalshi: schema/upstream/kalshi.openapi.yaml
  polymarket: schema/upstream/polymarket-clob.openapi.yaml

# Transform vocabulary:
#   direct                       — copy value as-is, types compatible
#   string_to_f64                — Polymarket numeric-string → f64
#   parse_unix_ms_string         — Polymarket timestamp string (unix millis)
#                                  → DateTime<Utc>
#   kalshi_yes_levels            — Kalshi yes_dollars [[price_$, count_fp], …]
#                                  → Vec<PriceLevel> (price as f64,
#                                  size as f64 from fixed-point count)
#   kalshi_no_levels_to_asks     — Kalshi no_dollars → asks via price = 1 − p,
#                                  size = fixed-point count → f64. Encodes the
#                                  Kalshi binary-market identity that a
#                                  no-bid at price p is an equivalent yes-ask
#                                  at price (1 − p) with the same contract
#                                  count. Without this transform the unified
#                                  surface would expose only one side of the
#                                  Kalshi book.
#   polymarket_levels            — Polymarket {price, size} string pairs →
#                                  Vec<PriceLevel> via string_to_f64 on each
#                                  field. Filters out price/size <= 0.
fields:
  # ---- Identity ----
  - name: asset_id
    sources:
      kalshi:
        ref: "#/components/schemas/MarketOrderbookFp/properties/ticker"
        transform: direct
        notes: |
          Kalshi binary markets carry exactly one orderbook per market, so
          the unified `asset_id` is the Kalshi market_ticker. Two REST
          surfaces source it: the batch endpoint
          (`GET /markets/orderbooks`) echoes `ticker` on each
          `MarketOrderbookFp` entry — that's the ref above. The single
          endpoint (`GET /markets/{ticker}/orderbook`) doesn't echo the
          ticker at all (caller already has it from the URL path), so the
          parser stamps the path parameter onto the unified Orderbook. The
          WS surface uses `orderbookSnapshotPayload.msg.market_ticker` /
          `orderbookDeltaPayload.msg.market_ticker` (same string).
      polymarket:
        ref: "#/components/schemas/OrderBookSummary/properties/asset_id"
        transform: direct
        notes: |
          Polymarket's CLOB orderbook is keyed by `asset_id` (the on-chain
          ERC-1155 token id of one outcome). The parent market is recoverable
          via the sibling `market` field (condition_id) on the same response
          but is not surfaced on the unified Orderbook — the relationship is
          recoverable from `Market.outcomes[i].token_id == Orderbook.asset_id`.

  # ---- Levels ----
  - name: bids
    sources:
      kalshi:
        ref: "#/components/schemas/OrderbookCountFp/properties/yes_dollars"
        transform: kalshi_yes_levels
        notes: |
          Kalshi exposes only YES bids and NO bids on the wire (no asks);
          the unified `bids` are the YES bids directly. Each upstream level
          is `[price_in_dollars_string, contract_count_fp_string]` (e.g.
          `["0.1500", "100.00"]`). The parser converts price → f64 in [0,1],
          size → f64 from the fixed-point count, drops levels with non-positive
          price/size, and sorts descending. The WS surface
          (`orderbookSnapshotPayload.msg.yes_dollars_fp`) uses the identical
          [price_$, count_fp] tuple format.
      polymarket:
        ref: "#/components/schemas/OrderBookSummary/properties/bids"
        transform: polymarket_levels
        notes: |
          Each entry is `OrderSummary { price: string, size: string }`. Parser
          converts both to f64, drops non-positive, sorts descending. Spec
          asserts the response is already sorted by price descending; we re-
          sort defensively. WS surface (`BookEvent.bids` /
          `PriceChangeEvent.price_changes[].side == "BUY"`) uses the same
          `OrderSummary` element shape.

  - name: asks
    sources:
      kalshi:
        ref: "#/components/schemas/OrderbookCountFp/properties/no_dollars"
        transform: kalshi_no_levels_to_asks
        notes: |
          Kalshi has no native ask side; we synthesize the YES asks from the
          NO bids via the binary-market identity: a NO bid at price p is
          equivalent to a YES ask at price (1 − p) with the same contract
          count. Element format matches `yes_dollars`
          (`[price_$_string, count_fp_string]`). The parser inverts price,
          converts size from fixed-point, drops non-positive, and sorts
          ascending. WS delta (`orderbookDeltaPayload.msg`) carries `side`
          (yes/no) explicitly; the same inversion applies on the NO side.
      polymarket:
        ref: "#/components/schemas/OrderBookSummary/properties/asks"
        transform: polymarket_levels
        notes: |
          Same `OrderSummary` element shape as `bids`; sorted ascending.
          WS surface (`BookEvent.asks` / `PriceChangeEvent.price_changes[]`
          with `side == "SELL"`) carries the same shape.

  # ---- Versioning ----
  - name: last_update_id
    sources:
      kalshi:
        synthetic: "WS `seq` (sequenceNumber) on orderbook_snapshot / orderbook_delta"
        notes: |
          Kalshi's REST `/markets/{ticker}/orderbook` does NOT carry a
          sequence number — `last_update_id` is None on REST-fetched books.
          On the WS stream we read the top-level `seq`
          (kalshi.asyncapi.yaml#/components/schemas/orderbookSnapshotPayload/
          properties/seq, same on `orderbookDeltaPayload`) which is a
          per-subscription monotonic u64 — usable for gap detection. See
          `engine/exchanges/kalshi/src/websocket.rs::handle_snapshot`.
      polymarket:
        omitted: true
        notes: |
          Polymarket emits no per-message sequence; book integrity is
          verified via the `hash` field instead (see below).

  - name: timestamp
    sources:
      kalshi:
        synthetic: "WS `ts_ms` on orderbook_delta; REST stamps local Utc::now() at receive"
        notes: |
          Kalshi REST has no timestamp on the orderbook response — the
          fetcher stamps it with local `Utc::now()` at receive time so
          downstream consumers always see a non-None value. WS deltas carry
          `ts_ms`
          (kalshi.asyncapi.yaml#/components/schemas/orderbookDeltaPayload/
          properties/msg/properties/ts_ms, integer unix millis); the
          deprecated `ts` RFC3339 string is ignored. The snapshot message
          has no timestamp so we again fall back to local time.
      polymarket:
        ref: "#/components/schemas/OrderBookSummary/properties/timestamp"
        transform: parse_unix_ms_string
        notes: |
          Spec types this as `string` with example `"1234567890"`; in
          practice it's a unix-millis integer encoded as a string. Parser
          accepts both numeric and string-numeric inputs and rejects
          anything that doesn't parse to i64. WS `BookEvent.timestamp` and
          `PriceChangeEvent.timestamp` use the same encoding.

  - name: hash
    sources:
      kalshi:
        omitted: true
        notes: Kalshi exposes no orderbook hash on REST or WS.
      polymarket:
        ref: "#/components/schemas/OrderBookSummary/properties/hash"
        transform: direct
        notes: |
          Exchange-provided hash of the canonical book contents — used to
          verify integrity during replay and to detect divergence between
          the streamed delta state and a fresh REST snapshot. WS
          `BookEvent.hash` carries the same value at snapshot boundaries.
          `PriceChangeMessage.hash` is per-level (the order hash that caused
          the delta) and is NOT mapped here — that's a different surface
          and intentionally not surfaced on the unified Orderbook.
