# Schema mapping for the unified `Position`.
# Each field declares, per exchange, exactly one of three entry types:
#   type: direct     — value is taken from upstream at the given $ref.
#   type: synthetic  — value is computed by OpenPX, not present upstream.
#   type: omitted    — upstream does not expose this concept.
unified_type: Position
unified_schema: schema/openpx.schema.json#/definitions/Position
upstream_specs:
  kalshi: schema/upstream/kalshi.openapi.yaml
  polymarket: schema/upstream/polymarket-data.openapi.yaml

fields:
  - name: market_ticker
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/MarketPosition/properties/ticker"
        note: "Kalshi market ticker; round-trips through `fetch_markets`."
      polymarket:
        type: direct
        ref: "#/components/schemas/Position/properties/slug"
        note: "Polymarket market slug; matches `Market.ticker`."

  - name: outcome
    sources:
      kalshi:
        type: synthetic
        note: "Title-cased from the sign of `position_fp` (positive → `Yes`, negative → `No`)."
      polymarket:
        type: direct
        ref: "#/components/schemas/Position/properties/outcome"
        note: "Outcome label as published by Polymarket."

  - name: size
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/MarketPosition/properties/position_fp"
        note: "Absolute value of the signed `position_fp` FixedPointCount string."
      polymarket:
        type: direct
        ref: "#/components/schemas/Position/properties/size"
        note: "Non-negative size in contracts."

  - name: average_price
    sources:
      kalshi:
        type: synthetic
        note: "`total_traded_dollars / |position_fp|` — cost basis per contract."
      polymarket:
        type: direct
        ref: "#/components/schemas/Position/properties/avgPrice"
        note: "Decimal probability in [0, 1]."

  - name: current_price
    sources:
      kalshi:
        type: synthetic
        note: "`market_exposure_dollars / |position_fp|` — mark per contract."
      polymarket:
        type: direct
        ref: "#/components/schemas/Position/properties/curPrice"
        note: "Decimal probability in [0, 1]."
