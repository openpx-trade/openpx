# Schema mapping for the unified `Event`.
# Each field declares, per exchange, exactly one of three entry types:
#   type: direct     — value is taken from upstream at the given $ref.
#   type: synthetic  — value is computed by OpenPX, not present upstream.
#   type: omitted    — upstream does not expose this concept.
unified_type: Event
unified_schema: schema/openpx.schema.json#/definitions/Event
upstream_specs:
  kalshi: schema/upstream/kalshi.openapi.yaml
  polymarket: schema/upstream/polymarket-gamma.openapi.yaml

fields:
  - name: ticker
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/EventData/properties/event_ticker"
        note: "Native Kalshi event ticker."
      polymarket:
        type: direct
        ref: "#/components/schemas/Event/properties/slug"
        note: "Polymarket event slug; numeric id lives in `numeric_id`."

  - name: numeric_id
    sources:
      kalshi:
        type: omitted
        note: "Kalshi has no separate numeric event id."
      polymarket:
        type: direct
        ref: "#/components/schemas/Event/properties/id"
        note: "Polymarket numeric event id."

  - name: title
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/EventData/properties/title"
        note: "Kalshi event title."
      polymarket:
        type: direct
        ref: "#/components/schemas/Event/properties/title"
        note: "Polymarket event title."

  - name: description
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/EventData/properties/sub_title"
        note: "Kalshi `sub_title` carries the disambiguating prose; empty strings become null."
      polymarket:
        type: direct
        ref: "#/components/schemas/Event/properties/description"
        note: "Polymarket event description."

  - name: category
    sources:
      kalshi:
        type: omitted
        note: "Kalshi events have no category; the category lives on the parent Series."
      polymarket:
        type: direct
        ref: "#/components/schemas/Event/properties/category"
        note: "Polymarket event category."

  - name: series_ticker
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/EventData/properties/series_ticker"
        note: "Native Kalshi series ticker."
      polymarket:
        type: synthetic
        note: "Read from the embedded `series[0].ticker` (falls back to `series[0].slug`)."

  - name: market_tickers
    sources:
      kalshi:
        type: synthetic
        note: "Read from the nested `markets[*].ticker` when `with_nested_markets=true`."
      polymarket:
        type: synthetic
        note: "Read from the embedded `markets[*].slug`."

  - name: status
    sources:
      kalshi:
        type: omitted
        note: "Kalshi has no event-level status; lifecycle is per-market."
      polymarket:
        type: direct
        ref: "#/components/schemas/Event/properties/closed"
        note: "Derived `closed`/`open` string from the boolean `closed` flag."

  - name: start_ts
    sources:
      kalshi:
        type: omitted
        note: "Kalshi events expose only `strike_date`, no separate start."
      polymarket:
        type: direct
        ref: "#/components/schemas/Event/properties/startDate"
        note: "ISO 8601 string parsed to UTC."

  - name: end_ts
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/EventData/properties/strike_date"
        note: "Kalshi `strike_date` is the resolution time."
      polymarket:
        type: direct
        ref: "#/components/schemas/Event/properties/endDate"
        note: "ISO 8601 string parsed to UTC."

  - name: last_updated_ts
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/EventData/properties/last_updated_ts"
        note: "RFC3339 string parsed to UTC."
      polymarket:
        type: direct
        ref: "#/components/schemas/Event/properties/updatedAt"
        note: "ISO 8601 string parsed to UTC."

  - name: volume
    sources:
      kalshi:
        type: omitted
        note: "Kalshi does not aggregate volume at the event level."
      polymarket:
        type: direct
        ref: "#/components/schemas/Event/properties/volume"
        note: "Polymarket event lifetime volume in USD."

  - name: open_interest
    sources:
      kalshi:
        type: omitted
        note: "Kalshi does not aggregate open interest at the event level."
      polymarket:
        type: direct
        ref: openInterest
        note: "Spec gap: live event payloads return a flat `openInterest`, but the gamma OpenAPI types only `openInterestAmm`."

  - name: mutually_exclusive
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/EventData/properties/mutually_exclusive"
        note: "True when only one child market resolves YES (e.g. races)."
      polymarket:
        type: direct
        ref: "#/components/schemas/Event/properties/negRisk"
        note: "`negRisk` flag carries the same semantics for pick-one-of-N events."
