# Schema mapping for the unified `Market`.
# Each field declares, per exchange, exactly one of three entry types:
#   type: direct     — value is taken from upstream at the given $ref.
#   type: synthetic  — value is computed by OpenPX, not present upstream.
#   type: omitted    — upstream does not expose this concept.
unified_type: Market
unified_schema: schema/openpx.schema.json#/definitions/Market
upstream_specs:
  kalshi: schema/upstream/kalshi.openapi.yaml
  polymarket: schema/upstream/polymarket-gamma.openapi.yaml

fields:
  - name: openpx_id
    sources:
      kalshi:
        type: synthetic
        note: "Composite key `{exchange}:{ticker}`."
      polymarket:
        type: synthetic
        note: "Composite key `{exchange}:{ticker}`."

  - name: exchange
    sources:
      kalshi:
        type: synthetic
        note: "Literal string `\"kalshi\"`."
      polymarket:
        type: synthetic
        note: "Literal string `\"polymarket\"`."

  - name: ticker
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Market/properties/ticker"
        note: "Native Kalshi market ticker."
      polymarket:
        type: direct
        ref: "#/components/schemas/Market/properties/slug"
        note: "Polymarket slug; stable, human-readable identifier (numeric id lives in `numeric_id`)."

  - name: numeric_id
    sources:
      kalshi:
        type: omitted
        note: "Kalshi has no separate numeric id surface."
      polymarket:
        type: direct
        ref: "#/components/schemas/Market/properties/id"
        note: "Polymarket numeric DB id used for REST deep-links."

  - name: event_ticker
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Market/properties/event_ticker"
        note: "Native Kalshi event ticker."
      polymarket:
        type: synthetic
        note: "Read from the embedded `events[0].slug` (falls back to `events[0].id`)."

  - name: title
    sources:
      kalshi:
        type: synthetic
        note: "Composed as `{yes_sub_title} | {no_sub_title}`."
      polymarket:
        type: direct
        ref: "#/components/schemas/Market/properties/question"
        note: "Polymarket market question text."

  - name: rules
    sources:
      kalshi:
        type: synthetic
        note: "Composed as `{rules_primary} | {rules_secondary}`."
      polymarket:
        type: direct
        ref: "#/components/schemas/Market/properties/description"
        note: "Polymarket market description."

  - name: status
    sources:
      kalshi:
        type: synthetic
        note: "Mapped from Kalshi's `status` enum (initialized/active/closed/determined/...) to unified `MarketStatus`."
      polymarket:
        type: synthetic
        note: "Combined from the `active`/`closed`/`archived` booleans into unified `MarketStatus`."

  - name: market_type
    sources:
      kalshi:
        type: synthetic
        note: "Mapped from Kalshi's `market_type` enum (binary/scalar) to unified `MarketType`."
      polymarket:
        type: synthetic
        note: "Derived from `outcomes.len()` — binary if 2, otherwise categorical."

  - name: outcomes
    sources:
      kalshi:
        type: synthetic
        note: "Two entries (`Yes`/`No`); price computed from `yes_ask_dollars`/`last_price_dollars`."
      polymarket:
        type: synthetic
        note: "Zipped element-wise from the stringified-JSON arrays `outcomes`, `outcomePrices`, `clobTokenIds`."

  - name: condition_id
    sources:
      kalshi:
        type: omitted
        note: "Kalshi has no CTF condition id."
      polymarket:
        type: direct
        ref: "#/components/schemas/Market/properties/conditionId"
        note: "On-chain CTF condition id."

  - name: volume
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Market/properties/volume_fp"
        note: "FixedPointCount string parsed to f64 USD."
      polymarket:
        type: direct
        ref: "#/components/schemas/Market/properties/volumeNum"
        note: "Lifetime volume in USD."

  - name: volume_24h
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Market/properties/volume_24h_fp"
        note: "FixedPointCount string parsed to f64 USD."
      polymarket:
        type: direct
        ref: "#/components/schemas/Market/properties/volume24hr"
        note: "24-hour volume in USD."

  - name: last_trade_price
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Market/properties/last_price_dollars"
        note: "Fixed-point dollar string parsed to YES probability in [0, 1]."
      polymarket:
        type: direct
        ref: "#/components/schemas/Market/properties/lastTradePrice"
        note: "Already a YES probability in [0, 1]."

  - name: best_bid
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Market/properties/yes_bid_dollars"
        note: "Fixed-point dollar string parsed to YES probability in [0, 1]."
      polymarket:
        type: direct
        ref: "#/components/schemas/Market/properties/bestBid"
        note: "Already a YES probability in [0, 1]."

  - name: best_ask
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Market/properties/yes_ask_dollars"
        note: "Fixed-point dollar string parsed to YES probability in [0, 1]."
      polymarket:
        type: direct
        ref: "#/components/schemas/Market/properties/bestAsk"
        note: "Already a YES probability in [0, 1]."

  - name: tick_size
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Market/properties/price_ranges"
        note: "Smallest `step` across all tiers in the `price_ranges` array."
      polymarket:
        type: direct
        ref: "#/components/schemas/Market/properties/orderPriceMinTickSize"
        note: "Single scalar tick size."

  - name: min_order_size
    sources:
      kalshi:
        type: synthetic
        note: "1.0 by default, 0.01 when `fractional_trading_enabled`."
      polymarket:
        type: direct
        ref: "#/components/schemas/Market/properties/orderMinSize"
        note: "Polymarket minimum order size in contracts."

  - name: open_time
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Market/properties/open_time"
        note: "RFC3339 string parsed to UTC."
      polymarket:
        type: direct
        ref: "#/components/schemas/Market/properties/startDate"
        note: "ISO 8601 string parsed to UTC."

  - name: close_time
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Market/properties/close_time"
        note: "RFC3339 string parsed to UTC."
      polymarket:
        type: direct
        ref: "#/components/schemas/Market/properties/endDate"
        note: "ISO 8601 string parsed to UTC."

  - name: created_at
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Market/properties/created_time"
        note: "RFC3339 string parsed to UTC."
      polymarket:
        type: direct
        ref: "#/components/schemas/Market/properties/createdAt"
        note: "ISO 8601 string parsed to UTC."

  - name: settlement_time
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Market/properties/settlement_ts"
        note: "RFC3339 string parsed to UTC."
      polymarket:
        type: direct
        ref: "#/components/schemas/Market/properties/closedTime"
        note: "On-chain settlement time, populated only after the market resolves."

  - name: neg_risk
    sources:
      kalshi:
        type: omitted
        note: "Kalshi has no neg-risk concept."
      polymarket:
        type: direct
        ref: negRisk
        note: "Spec gap: `negRisk` is present on every live `/markets` row but undeclared on `Market` in the gamma OpenAPI."

  - name: neg_risk_market_id
    sources:
      kalshi:
        type: omitted
        note: "Kalshi has no neg-risk concept."
      polymarket:
        type: direct
        ref: negRiskMarketID
        note: "Spec gap: present on every live `/markets` row but undeclared on `Market` in the gamma OpenAPI."

  - name: result
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Market/properties/result"
        note: "Native Kalshi resolution enum string."
      polymarket:
        type: synthetic
        note: "Winning `outcomes[i]` where `outcomePrices[i] == 1.0` after settlement."
