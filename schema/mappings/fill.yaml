# Schema mapping for the unified `Fill`.
# Each field declares, per exchange, exactly one of three entry types:
#   type: direct     — value is taken from upstream at the given $ref.
#   type: synthetic  — value is computed by OpenPX, not present upstream.
#   type: omitted    — upstream does not expose this concept.
unified_type: Fill
unified_schema: schema/openpx.schema.json#/definitions/Fill
upstream_specs:
  kalshi: schema/upstream/kalshi.openapi.yaml
  polymarket: schema/upstream/polymarket-data.openapi.yaml

fields:
  - name: fill_id
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Fill/properties/fill_id"
        note: "Kalshi-issued unique fill id."
      polymarket:
        type: direct
        ref: "#/components/schemas/Trade/properties/transactionHash"
        note: "Polygon transaction hash; doubles as fill id since one trade lands per tx."

  - name: order_id
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Fill/properties/order_id"
        note: "Kalshi-issued order id that produced this fill."
      polymarket:
        type: omitted
        note: "Public-tape `Trade` does not expose order ids; live WebSocket events do via `liquidity_role`."

  - name: market_ticker
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Fill/properties/ticker"
        fallback_ref: "#/components/schemas/Fill/properties/market_ticker"
        note: "Prefers canonical `ticker`, falls back to legacy alias `market_ticker`."
      polymarket:
        type: direct
        ref: "#/components/schemas/Trade/properties/conditionId"
        note: "On-chain condition id; `Position.market_ticker` (slug) intentionally diverges from this surface."

  - name: outcome
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Fill/properties/side"
        note: "Title-cased from the YES/NO `side` field (buy/sell lives on `action`)."
      polymarket:
        type: direct
        ref: "#/components/schemas/Trade/properties/outcome"
        note: "Outcome label as published by Polymarket."

  - name: side
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Fill/properties/action"
        note: "Buy/Sell sourced from `action` (the YES/NO `side` field is unrelated)."
      polymarket:
        type: direct
        ref: "#/components/schemas/Trade/properties/side"
        note: "BUY/SELL enum, 1:1 with unified `OrderSide`."

  - name: price
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Fill/properties/yes_price_dollars"
        fallback_ref: "#/components/schemas/Fill/properties/no_price_dollars"
        note: "Outcome-aware: uses `yes_price_dollars` on YES fills and `no_price_dollars` on NO fills."
      polymarket:
        type: direct
        ref: "#/components/schemas/Trade/properties/price"
        note: "Decimal probability for the row's outcome token in [0, 1]."

  - name: size
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Fill/properties/count_fp"
        note: "FixedPointCount string parsed to f64."
      polymarket:
        type: direct
        ref: "#/components/schemas/Trade/properties/size"
        note: "Non-negative size in contracts."

  - name: is_taker
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Fill/properties/is_taker"
        note: "Boolean: `true` if the fill removed liquidity, `false` if it added."
      polymarket:
        type: omitted
        note: "Public tape lacks per-fill maker/taker flag; the WebSocket user channel carries `liquidity_role`."

  - name: fee
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Fill/properties/fee_cost"
        note: "Per-fill fee in FixedPointDollars."
      polymarket:
        type: omitted
        note: "Polymarket does not expose a per-fill fee on the Data API; defaults to 0.0."

  - name: created_at
    sources:
      kalshi:
        type: direct
        ref: "#/components/schemas/Fill/properties/created_time"
        note: "RFC3339 string parsed to UTC."
      polymarket:
        type: direct
        ref: "#/components/schemas/Trade/properties/timestamp"
        note: "Unix seconds (not milliseconds) parsed to UTC."
