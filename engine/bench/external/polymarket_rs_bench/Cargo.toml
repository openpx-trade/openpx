# Standalone crate — intentionally NOT part of the main openpx workspace.
# `polymarket-rs-client` pins pkcs8 in a way that conflicts with our kalshi
# crate's alloy stack, so it lives in its own resolver context with its
# own Cargo.lock. The main openpx/engine/bench/src/bin/network_bench.rs
# subprocess-invokes this binary to get a comparable latency sample.
[workspace]

[package]
name = "polymarket_rs_bench"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
polymarket-rs-client = "0.1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time"] }
clap = { version = "4", features = ["derive"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "http2"] }
serde_json = "1"
anyhow = "1"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
